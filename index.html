    .school{font-size:22px;font-weight:800;text-transform:uppercase;color:#1a3c2a}
    .sub{font-size:12px;color:#555;margin-top:3px}
    .date{text-align:right;font-size:11px;color:#555}
    h2{font-size:15px;margin:18px 0 8px;color:#1a3c2a}
    table{width:100%;border-collapse:collapse;margin-bottom:12px;page-break-inside:avoid}
    th{background:#1a3c2a;color:#fff;text-align:left;padding:7px;font-size:11px}
    td{border:1px solid #d8ded8;padding:7px;vertical-align:top}
    tr:nth-child(even) td{background:#f7fbf7}
    .time{font-weight:700;white-space:nowrap}
    .empty{border:1px dashed #aaa;padding:20px;text-align:center;color:#777}
    @media(max-width:700px){body{font-size:11px}.school{font-size:17px}th,td{padding:5px}}
  </style></head><body>
    <div class="head">
      <div><div class="school">${esc(school.name||'School Timetable')}</div><div class="sub">Printable weekly timetable</div></div>
      <div class="date">Generated ${new Date().toLocaleDateString('en-KE',{day:'numeric',month:'long',year:'numeric'})}</div>
    </div>
    ${Object.keys(groups).length?Object.entries(groups).map(([klass,items])=>`
      <h2>${esc(klass)}</h2>
      <table>
        <thead><tr><th>Day</th><th>Time</th><th>Learning Area</th><th>Teacher</th></tr></thead>
        <tbody>${items.map(r=>`<tr>
          <td>${esc(r.day_of_week||'')}</td>
          <td class="time">${esc(r.start_time||'')} - ${esc(r.end_time||'')}</td>
          <td>${esc(r.subject||'')}</td>
          <td>${esc(r.teachers?.full_name||'')}</td>
        </tr>`).join('')}</tbody>
      </table>`).join(''):'<div class="empty">No timetable entries yet.</div>'}
    <script>window.onload=()=>setTimeout(()=>window.print(),300)<\/script>
  </body></html>`;
  const w=window.open('','_blank');
  w.document.write(html);
  w.document.close();
}

function csvParts(value){
  return String(value||'').split(',').map(x=>x.trim()).filter(Boolean);
}
function selectedCsv(value){
  return new Set(csvParts(value).map(x=>x.toLowerCase()));
}
function allSchoolSubjects(){
  const areas = Object.values(CBC_LEARNING_AREAS || {}).flat();
  return [...new Set(areas)].sort((a,b)=>a.localeCompare(b));
}
function multiOptions(items, selectedValue){
  const selected=selectedCsv(selectedValue);
  return items.map(x=>`<option value="${esc(x)}" ${selected.has(String(x).toLowerCase())?'selected':''}>${esc(x)}</option>`).join('');
}
function checkPicker(items, name, selectedValue, id){
  const selected=selectedCsv(selectedValue);
  return `<input id="${id}Search" placeholder="Search..." autocomplete="off">
    <div class="check-picker" id="${id}">
      ${items.map(x=>`<label data-text="${esc(String(x).toLowerCase())}"><input type="checkbox" name="${esc(name)}" value="${esc(x)}" ${selected.has(String(x).toLowerCase())?'checked':''}> <span>${esc(x)}</span></label>`).join('')}
    </div>
    <div class="check-picker-count" id="${id}Count">0 selected</div>`;
}
function wireCheckPicker(id){
  const box=$('#'+id), search=$('#'+id+'Search'), count=$('#'+id+'Count');
  if(!box) return;
  const update=()=>{
    if(count) count.textContent=`${box.querySelectorAll('input:checked').length} selected`;
  };
  box.querySelectorAll('input').forEach(ch=>ch.onchange=update);
  if(search) search.oninput=()=>{
    const q=search.value.trim().toLowerCase();
    box.querySelectorAll('label').forEach(l=>l.style.display=(!q||l.dataset.text.includes(q))?'flex':'none');
  };
  update();
}
function wireMultiSelectSearch(inputSel, selectSel, countSel){
  const inp=$(inputSel), sel=$(selectSel), count=$(countSel);
  if(!inp||!sel) return;
  const all=[...sel.options].map(o=>({value:o.value,text:o.textContent,selected:o.selected}));
  const updateCount=()=>{
    if(count) count.textContent=`${[...sel.selectedOptions].length} selected`;
  };
  const render=()=>{
    const selected=new Set([...sel.selectedOptions].map(o=>o.value));
    const q=inp.value.trim().toLowerCase();
    sel.innerHTML=all
      .filter(o=>!q || o.text.toLowerCase().includes(q))
      .map(o=>`<option value="${esc(o.value)}" ${selected.has(o.value)||o.selected?'selected':''}>${esc(o.text)}</option>`)
      .join('');
    all.forEach(o=>o.selected=selected.has(o.value)||o.selected);
    updateCount();
  };
  sel.onchange=()=>{
    const selected=new Set([...sel.selectedOptions].map(o=>o.value));
    all.forEach(o=>o.selected=selected.has(o.value));
    updateCount();
  };
  inp.oninput=render;
  updateCount();
}
function roleLabel(role){
  return role==='headteacher'?'Head teacher':role==='admin'?'School admin':role==='finance'?'Finance officer':'Teacher';
}

/* --- FEES --- */
function feeAccountReference(student={}, balance={}, school=state.school||{}){
  const mode=school.fee_account_mode||'admission_number';
  const prefix=school.fee_account_prefix||'';
  const base = mode==='student_id' ? student.id : (student.admission_number||student.id||'');
  return `${prefix}${base}`.trim();
}
function feeStatusText(balance){
  const bal=+balance||0;
  return bal>0 ? `KSh ${bal.toLocaleString()} outstanding` : 'Cleared';
}
function normalizeKePhone(phone){
  let p=(phone||'').replace(/\D/g,'');
  if(p.startsWith('0')) p='254'+p.slice(1);
  if(p.startsWith('7')||p.startsWith('1')) p='254'+p;
  return p;
}
async function startParentFeePayment({fee_balance_id, student_id, amount, phone}){
  const cleanPhone=normalizeKePhone(phone);
  if(!/^254(7|1)\d{8}$/.test(cleanPhone)){
    toast('Enter a valid Safaricom phone number, for example 0712345678.', true);
    return;
  }
  const {data,error}=await sb.functions.invoke('start-fee-payment',{
    body:{fee_balance_id, student_id, amount:Number(amount), phone:cleanPhone}
  });
  if(error){
    toast('Payment prompt failed: '+(error.message||'Edge Function error'), true);
    return;
  }
  if(!data?.ok){
    toast(data?.message||'Payment prompt was not accepted.', true);
    return;
  }
  toast('M-Pesa prompt sent. Enter PIN on the phone, then refresh Fees after confirmation.');
}

function moneyNumber(value){
  const n=Number(String(value??'').replace(/[^\d.-]/g,''));
  return isNaN(n)?0:n;
}

async function importFeeBalancesFile(file, schoolId){
  try{
    const rawRows=await readStudentImportRows(file);
    const admissions=[...new Set(rawRows.map(r=>pick(r,['admission_no','admission_number','adm','adm_no','adm_number'])).filter(Boolean))];
    if(!admissions.length){ toast('No admission numbers found in the file.',true); return; }
    const {data:students=[],error:stuErr}=await sb.from('students').select('id,admission_number,full_name').eq('school_id',schoolId).in('admission_number',admissions);
    if(stuErr){ toast(stuErr.message,true); return; }
    const byAdm=Object.fromEntries(students.map(s=>[String(s.admission_number||'').trim().toLowerCase(),s]));
    let saved=0, skipped=0;
    for(const r of rawRows){
      const adm=pick(r,['admission_no','admission_number','adm','adm_no','adm_number']);
      const stu=byAdm[String(adm||'').trim().toLowerCase()];
      const term=Number(pick(r,['term','school_term']));
      const year=Number(pick(r,['year','academic_year']));
      const amount_due=moneyNumber(pick(r,['amount_due','due','fee','fees','term_fee']));
      const amount_paid=moneyNumber(pick(r,['amount_paid','paid','paid_amount']));
      if(!stu||!term||!year||!amount_due){ skipped++; continue; }
      const {data:existing}=await sb.from('fee_balances').select('id').eq('student_id',stu.id).eq('term',term).eq('year',year).maybeSingle();
      const payload={student_id:stu.id,school_id:schoolId,term,year,amount_due,amount_paid};
      const res=existing?.id
        ? await sb.from('fee_balances').update(payload).eq('id',existing.id)
        : await sb.from('fee_balances').insert(payload);
      if(res.error){ skipped++; } else { saved++; }
    }
    toast(`Imported ${saved} fee balance${saved===1?'':'s'}${skipped?`; skipped ${skipped} row${skipped===1?'':'s'}.`:'.'}`, skipped>0);
  }catch(e){
    toast('Fee import failed: '+(e.message||e), true);
  }
}

function openCreateTermBalances(m, schoolId, structs=[]){
  const year=new Date().getFullYear();
  m.innerHTML=`<div class="card" style="max-width:560px">
    <a href="#" id="bkTerm" class="small"><i class="ti ti-arrow-left"></i> Back to fees</a>
    <h2 style="margin-top:1rem">Create term balances</h2>
    <p class="muted small">Use this when a school moves to a new term. Radari will create one fee balance per learner using the fee structure for that learner's grade and the selected term/year. Existing balances for the same term are left unchanged.</p>
    <form id="termBalanceForm" class="stack">
      <div class="row">
        <div class="col field"><label>Term</label><select name="term"><option>1</option><option>2</option><option>3</option></select></div>
        <div class="col field"><label>Year</label><input type="number" name="year" value="${year}"></div>
      </div>
      <button class="btn primary"><i class="ti ti-calendar-plus"></i> Create balances</button>
    </form>
  </div>`;
  $('#bkTerm').onclick=(e)=>{e.preventDefault();navigate('fees');};
  $('#termBalanceForm').onsubmit=async(e)=>{
    e.preventDefault();
    const fd=new FormData(e.target);
    const term=Number(fd.get('term')), y=Number(fd.get('year'));
    const {data:students=[],error:stuErr}=await sb.from('students').select('id,grade,full_name').eq('school_id',schoolId);
    if(stuErr){ toast(stuErr.message,true); return; }
    const {data:existing=[]}=await sb.from('fee_balances').select('student_id').eq('school_id',schoolId).eq('term',term).eq('year',y);
    const {data:credits=[]}=await sb.from('fee_credits').select('id,student_id,remaining_amount').eq('school_id',schoolId).gt('remaining_amount',0).order('created_at');
    const has=new Set(existing.map(x=>x.student_id));
    const matchingStructs=structs.filter(s=>Number(s.term)===term && Number(s.year)===y);
    const byGrade=Object.fromEntries(matchingStructs.map(s=>[String(s.grade||'').trim().toLowerCase(),s]));
    const rows=[];
    const creditUpdates=[];
    students.forEach(st=>{
      if(has.has(st.id)) return;
      const fs=byGrade[String(st.grade||'').trim().toLowerCase()];
      if(fs){
        const due=+fs.amount||0;
        let need=due;
        let creditPaid=0;
        credits.filter(c=>c.student_id===st.id && need>0).forEach(c=>{
          const available=+c.remaining_amount||0;
          const use=Math.min(available,need);
          if(use>0){
            creditPaid+=use;
            need-=use;
            creditUpdates.push({id:c.id,remaining_amount:available-use});
          }
        });
        rows.push({student_id:st.id,school_id:schoolId,term,year:y,amount_due:due,amount_paid:creditPaid});
      }
    });
    if(!rows.length){ toast('No new balances created. Check fee structures or existing balances.', true); return; }
    const {error}=await sb.from('fee_balances').insert(rows);
    if(error){ toast(error.message,true); return; }
    for(const c of creditUpdates){
      await sb.from('fee_credits').update({remaining_amount:c.remaining_amount,status:c.remaining_amount>0?'open':'used'}).eq('id',c.id);
    }
    toast(`Created ${rows.length} term balance${rows.length===1?'':'s'}.`);
    navigate('fees');
  };
}

function filterBals(bals,grade,term,year,status,query){
  return bals.filter(b=>{
    const name=(b.students?.full_name||'').toLowerCase();
    const adm=(b.students?.admission_number||'').toLowerCase();
    return (grade==='All'||b.students?.grade===grade)
      &&(term==='All'||String(b.term)===term)
      &&(year==='All'||String(b.year)===year)
      &&(status==='All'||(status==='Defaulters'&&+b.balance>0)||(status==='Cleared'&&+b.balance<=0))
      &&(!query||name.includes(query)||adm.includes(query));
  });
}

/* --- REPORTS --- */
modules.reports = async (m)=>{
  const sid=state.profile.school_id;
  const role=state.profile.role;
  if(isSchoolTeacher() && !isClassTeacher()){
    toast('Report cards are available to class teachers and school admins.', true);
    navigate('dashboard');
    return;
  }
  let students=[];
  if(role==='parent'){
    ({data:students=[]}=await sb.from('students').select('id,full_name,grade,stream,admission_number').eq('parent_id',state.profile.id));
  } else {
    ({data:students=[]}=await sb.from('students').select('id,full_name,grade,stream,admission_number').eq('school_id',sid).order('grade').order('full_name'));
    students=filterStudentsForTeacher(students);
  }

  m.innerHTML=`
    <h1>Report cards</h1>
    <div class="card" style="max-width:760px">
      <h3>Select learner and period</h3>
      <div class="toolbar" style="margin-bottom:1rem">
        <div class="field" style="flex:2;min-width:220px">
          <label>Search learner</label>
          <input id="stuSearch" placeholder="Type name or admission number..." autocomplete="off">
        </div>
        <div class="field"><label>Term</label>
          <select id="t"><option value="1">Term 1</option><option value="2">Term 2</option><option value="3">Term 3</option></select></div>
        <div class="field"><label>Year</label>
          <input id="y" type="number" value="${new Date().getFullYear()}" style="width:90px"></div>
      </div>
      <div id="stuResults"></div>
      <div id="selectedStu" style="display:none;margin-bottom:1rem;padding:.6rem .85rem;background:var(--green-50);border-radius:var(--radius);display:flex;justify-content:space-between;align-items:center">
        <span id="selectedName" style="font-weight:500"></span>
        <button class="btn secondary" style="height:28px;font-size:.78rem" id="clearStu">Change</button>
      </div>
      <input type="hidden" id="stuId">
      <div style="display:flex;gap:.5rem">
        <button class="btn primary" id="gen" disabled><i class="ti ti-file-text"></i> Generate report card</button>
        <button class="btn secondary" id="prn"><i class="ti ti-printer"></i> Print</button>
      </div>
    </div>
    <div id="rep" style="margin-top:1.5rem"></div>`;

  // Student search
  let selectedId=null;
  function renderResults(query){
    const q=(query||'').toLowerCase().trim();
    if(!q){ $('#stuResults').innerHTML=''; return; }
    const filtered=students.filter(s=>
      (s.full_name||'').toLowerCase().includes(q)||
      (s.admission_number||'').toLowerCase().includes(q)||
      (s.grade||'').toLowerCase().includes(q)
    ).slice(0,10);
    if(!filtered.length){ $('#stuResults').innerHTML=`<div class="muted small" style="padding:.4rem 0">No learners match.</div>`; return; }
    $('#stuResults').innerHTML=`<div style="border:1px solid var(--stone);border-radius:var(--radius);overflow:hidden;margin-bottom:.5rem">
      ${filtered.map(s=>`<div class="strand-opt" data-id="${s.id}" data-name="${esc(s.full_name)} — ${esc(s.grade||'')} ${esc(s.stream||'')}">
        <b>${esc(s.full_name)}</b>
        <span class="small muted" style="margin-left:.5rem">${esc(s.grade||'')} ${esc(s.stream||'')} &middot; ${esc(s.admission_number||'')}</span>
      </div>`).join('')}
    </div>`;
    $('#stuResults').querySelectorAll('.strand-opt[data-id]').forEach(el=>el.onclick=()=>{
      selectedId=el.dataset.id; $('#stuId').value=selectedId;
      $('#selectedName').textContent=el.dataset.name;
      $('#selectedStu').style.display='flex';
      $('#stuResults').innerHTML=''; $('#stuSearch').style.display='none';
      $('#gen').disabled=false;
    });
  }
  $('#stuSearch').oninput=e=>renderResults(e.target.value);
  $('#clearStu').onclick=()=>{
    selectedId=null; $('#stuId').value='';
    $('#selectedStu').style.display='none';
    $('#stuSearch').style.display=''; $('#stuSearch').value=''; $('#stuSearch').focus();
    $('#gen').disabled=true; $('#rep').innerHTML='';
  };
  if(role==='parent'&&students.length===1){
    selectedId=students[0].id; $('#stuId').value=selectedId;
    $('#selectedName').textContent=`${students[0].full_name} — ${students[0].grade||''} ${students[0].stream||''}`;
    $('#selectedStu').style.display='flex'; $('#stuSearch').style.display='none'; $('#gen').disabled=false;
  }

  $('#gen').onclick=async()=>{
    const sidu=$('#stuId').value, term=+$('#t').value, year=+$('#y').value;
    if(!sidu){ toast('Select a learner first.',true); return; }
    $('#rep').innerHTML=`<div class="muted small" style="padding:1rem">Generating report card...</div>`;

    // Load student first so we can use grade/stream for ranking query
    const {data:s}=await sb.from('students').select('*').eq('id',sidu).single();
    if(!s){ toast('Could not load learner record.',true); $('#rep').innerHTML=''; return; }

    const [{data:allAss=[]},{data:att=[]},{data:health=[]},{data:allStudents=[]},{data:allStrands=[]}]=await Promise.all([
      sb.from('assessments').select('learning_area,cat1,cat2,endterm_score,weighted_score,score,remarks,teachers(full_name)')
        .eq('student_id',sidu).eq('term',term).eq('year',year).is('strand_id',null)
        .not('learning_area','is',null),
      sb.from('student_attendance').select('status').eq('student_id',sidu),
      sb.from('student_health').select('condition_name,severity').eq('student_id',sidu),
      sb.from('students').select('id,full_name').eq('school_id',sid).eq('grade',s.grade||'').eq('stream',s.stream||''),
      sb.from('cbc_strands').select('grade,subject,instructor_name,teacher_id').eq('school_id',sid),
    ]);

    const daysPresent=att.filter(x=>x.status==='present').length;
    const daysAbsent=att.filter(x=>x.status==='absent').length;

    // Build per-learning-area scores
    const laMap={};
    allAss.forEach(a=>{ laMap[a.learning_area]=a; });
    const instructorMap=subjectInstructorMap(s.grade||'', allStrands);

    const laOrder=(schoolLearningAreas(s.grade||'', allStrands).length?schoolLearningAreas(s.grade||'', allStrands):Object.keys(laMap));
    const laRows=laOrder.map(la=>{
      const a=laMap[la];
      if(!a) return {la,t1:null,t2:null,t3:null,avg:null,rc:null,pts:null,remarks:'',instructor:''};
      const t1=a.cat1!=null?+a.cat1:null;
      const t2=a.cat2!=null?+a.cat2:null;
      const t3=a.endterm_score!=null?+a.endterm_score:null;
      const parts=[t1,t2,t3].filter(v=>v!=null);
      const avg=parts.length?Math.round(parts.reduce((p,c)=>p+c,0)/parts.length*10)/10:null;
      const rc=avg!=null?pctToRubricCode(avg):null;
      const pts=rc?RUBRIC_BANDS.find(b=>b.code===rc)?.points||null:null;
      return {la,t1,t2,t3,avg,rc,pts,remarks:a.remarks||autoLearningAreaRemark(la, avg),instructor:instructorMap[la]||a.teachers?.full_name||''};
    }).filter(r=>r.avg!=null||r.t1!=null||r.t2!=null||r.t3!=null);

    // Summary stats
    const filledRows=laRows.filter(r=>r.avg!=null);
    const totalMarks=filledRows.reduce((a,r)=>a+(r.avg||0),0);
    const maxMarks=filledRows.length*100;
    const overallAvg=filledRows.length?Math.round(totalMarks/filledRows.length*10)/10:null;
    const overallRc=overallAvg!=null?pctToRubricCode(overallAvg):null;
    const overallPts=overallRc?RUBRIC_BANDS.find(b=>b.code===overallRc)?.points||null:null;

    // Ranking — compare this student's avg vs classmates (load their assessments)
    const classIds=allStudents.map(s=>s.id);
    const {data:classAss=[]}=classIds.length>1?await sb.from('assessments')
      .select('student_id,weighted_score').in('student_id',classIds)
      .eq('term',term).eq('year',year).is('strand_id',null):{data:[]};
    const classAvgs={};
    classAss.forEach(a=>{
      if(!classAvgs[a.student_id]) classAvgs[a.student_id]=[];
      if(a.weighted_score!=null) classAvgs[a.student_id].push(+a.weighted_score);
    });
    const classRanked=Object.entries(classAvgs)
      .map(([id,scores])=>({id,avg:scores.reduce((a,b)=>a+b,0)/scores.length}))
      .sort((a,b)=>b.avg-a.avg);
    const myRank=classRanked.findIndex(r=>r.id===sidu)+1||null;
    const streamSize=allStudents.length;

    // Print window HTML — Image 1 inspired modern layout
    const printHtml=buildReportCardHtml(s,laRows,{
      term,year,daysPresent,daysAbsent,totalMarks,maxMarks,
      overallAvg,overallRc,overallPts,myRank,streamSize,health,
      school:state.school||{}
    });

    $('#rep').innerHTML=`<div id="reportPreview">
      <div class="card" style="padding:0;overflow:hidden">
        <iframe id="reportFrame" style="width:100%;border:none;min-height:600px;display:block"></iframe>
      </div>
      <div style="margin-top:.75rem;display:flex;gap:.5rem;flex-wrap:wrap">
        <button class="btn primary" id="prn2"><i class="ti ti-printer"></i> Print / Save as PDF</button>
        <p class="small muted" style="align-self:center;margin:0">On phone: use your browser's Share &rarr; Print option</p>
      </div>
    </div>`;

    const frame=document.getElementById('reportFrame');
    frame.srcdoc=printHtml;
    frame.onload=()=>{ frame.style.height=(frame.contentDocument.body.scrollHeight+40)+'px'; };
    document.getElementById('prn2').onclick=()=>{
      const w=window.open('','_blank'); w.document.write(printHtml); w.document.close();
      setTimeout(()=>w.print(),600);
    };
  };
  $('#prn').onclick=()=>{ const f=document.getElementById('reportFrame'); if(f){ const w=window.open('','_blank'); w.document.write(f.srcdoc); w.document.close(); setTimeout(()=>w.print(),600); } };
};

function buildReportCardHtml(s,laRows,{term,year,daysPresent,daysAbsent,totalMarks,maxMarks,overallAvg,overallRc,overallPts,myRank,streamSize,health,school}){
  const BAND_COLOR={EE1:'#1b5e20',EE2:'#2e7d32',ME1:'#1565c0',ME2:'#1976d2',AE1:'#e65100',AE2:'#f57c00',BE1:'#b71c1c',BE2:'#c62828'};
  const rcColor=rc=>BAND_COLOR[rc]||'#333';
  const primaryColor=school.report_primary_color||'#1a3c2a';
  const accentColor=school.report_accent_color||'#e8f5e9';
  const classTeacherComment=autoOverallComment(overallAvg, s.full_name);
  const hoiComment=autoHoiComment(overallAvg);
  const fmt=v=>v!=null?v:'—';

  return `<!DOCTYPE html><html><head><meta charset="utf-8">
  <title>Report Card — ${s.full_name}</title>
  <style>
    @page{size:A4;margin:1.2cm}
    *{box-sizing:border-box;margin:0;padding:0}
    *{-webkit-print-color-adjust:exact;print-color-adjust:exact}
    body{font-family:Arial,Helvetica,sans-serif;font-size:11px;color:#111;background:#fff}

    /* Header */

    .school-info{flex:1;padding:0 14px}
    .school-name{font-size:17px;font-weight:900;color:${primaryColor};text-transform:uppercase;letter-spacing:.03em}
    .doc-title{font-size:10px;color:#555;font-style:italic;margin-top:1px}
    .photo-box{width:68px;height:78px;border:1.5px solid #bbb;display:flex;align-items:center;justify-content:center;font-size:8px;color:#aaa;flex-shrink:0;background:#f8f8f8}

    /* Info grid */
    .info-strip{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:8px;font-size:10.5px}
    .info-cell{display:flex;gap:4px}
    .info-cell .lbl{color:#666;white-space:nowrap}
    .info-cell .val{font-weight:700;color:#111}

    /* Performance summary box — Image 1 style */
    .perf-box{background:${primaryColor};color:#fff;border-radius:6px;padding:8px 12px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
    .perf-item{text-align:center}
    .perf-num{font-size:20px;font-weight:900;line-height:1}
    .perf-lbl{font-size:8px;opacity:.8;text-transform:uppercase;letter-spacing:.05em;margin-top:1px}
    .perf-badge{background:#fff;color:${primaryColor};font-size:16px;font-weight:900;border-radius:4px;padding:3px 10px}

    /* Exam details strip */
    .exam-strip{display:flex;gap:16px;font-size:10px;margin-bottom:10px;padding:6px 10px;background:#f5f5f5;border-radius:4px;border-left:4px solid ${primaryColor}}
    .exam-strip .lbl{color:#666}
    .exam-strip .val{font-weight:700}

    /* Main table */
    table{width:100%;border-collapse:collapse;margin-bottom:8px;font-size:10.5px}
    th{background:${primaryColor};color:#fff;padding:5px 6px;text-align:left;font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.03em}
    th.center,td.center{text-align:center}
    td{padding:4px 6px;border-bottom:1px solid #e0e0e0;vertical-align:middle}
    tr:nth-child(even) td{background:#f8fffe}
    .rc-pill{display:inline-block;padding:1px 6px;border-radius:3px;font-weight:700;font-size:10px;color:#fff}
    .pts-badge{display:inline-block;width:20px;height:20px;border-radius:50%;font-weight:700;font-size:10px;text-align:center;line-height:20px;color:#fff}
    .avg-row td{font-weight:700;background:${accentColor};border-top:2px solid ${primaryColor};font-size:11px}

    /* Levels legend — Image 1 style rounded badge */
    .legend-box{border:1px solid #ddd;border-radius:6px;padding:8px 12px;margin-bottom:10px;display:grid;grid-template-columns:1fr 1fr;gap:4px 20px;font-size:9.5px}
    .legend-row{display:flex;gap:4px;align-items:center}
    .legend-code{width:30px;font-weight:700}

    /* 3-column grouping (Arts/Social/STEM) */

    .group-cell{padding:5px 8px;border-right:1.5px solid ${primaryColor};text-align:center}
    .group-cell:last-child{border-right:none}
    .group-cell .g-lbl{font-size:8.5px;color:#666;text-transform:uppercase;letter-spacing:.04em}

    /* Remarks */

    .footer-row{display:flex;justify-content:space-between;font-size:9px;color:#666;margin-top:6px;border-top:1px solid #ddd;padding-top:5px}

    @media print{body{font-size:11px}@page{margin:1cm}}

  <!-- Header -->
  <div class="header">
    <div class="school-logo">${esc((school.name||'S').split(' ').map(w=>w[0]).join('').slice(0,4).toUpperCase())}</div>
    <div class="school-info">
      <div class="school-name">${esc(school.name||'School Name')}</div>
      <div class="doc-title">Learner Assessment Report</div>
    </div>
    <div class="photo-box">Photo</div>
  </div>

  <div class="info-strip">
    <div class="info-cell"><span class="lbl">NAME:</span><span class="val">${esc(s.full_name)}</span></div>

    <div class="info-cell"><span class="lbl">ADM No:</span><span class="val">${esc(s.admission_number||'—')}</span></div>
    <div class="info-cell"><span class="lbl">UPI / NEMIS:</span><span class="val">${esc(s.nemis_number||'—')}</span></div>

  </div>

  ${overallAvg!=null?`
  <div class="perf-box">
    <div class="perf-item"><div class="perf-num">${totalMarks.toFixed(1)}/${maxMarks}</div><div class="perf-lbl">Total Marks</div></div>

  ${health.length?`<div style="background:#fff8e1;border-left:4px solid #f9a825;border-radius:3px;padding:4px 8px;margin-bottom:8px;font-size:10px">
    <b>Health note:</b> ${health.map(h=>`${esc(h.condition_name)} (${esc(h.severity)})`).join(', ')}
  </div>`:''}

  <!-- Main results table — Image 1 style columns -->
  <table>
    <thead>
      <tr>
        <th style="width:22%">Learning Area</th>
        <th class="center" style="width:9%">1st Test</th>

modules.knec = async (m)=>{
  const sid = state.profile.school_id;
  const {data:allStudents=[]}=await sb.from('students').select('grade').eq('school_id',sid);
  const grades=sortGrades(allStudents.map(s=>s.grade));
  m.innerHTML = `<h1>KNEC SBA export</h1>
    <div class="card" style="max-width:640px">
      <p class="muted">Export learner CBC scores in the format expected by the KNEC SBA portal.</p>
      <div class="toolbar">
        <div class="field"><label>Grade / Class</label><select id="g">${grades.map(g=>`<option>${esc(g)}</option>`).join('')}</select></div>
        <div class="field"><label>Term</label><select id="t"><option>1</option><option>2</option><option>3</option></select></div>
        <div class="field"><label>Year</label><input id="y" type="number" value="${new Date().getFullYear()}"></div>
        <button class="btn primary" id="dl">Download CSV</button>
      </div>
    </div>`;
  $('#dl').onclick = async ()=>{
    const grade=$('#g').value, term=+$('#t').value, year=+$('#y').value;
    const { data:students=[] } = await sb.from('students').select('id,full_name,admission_number,gender,grade').eq('school_id',sid).eq('grade',grade);
    const ids = students.map(s=>s.id); if(!ids.length){ toast('No learners in that grade',true); return; }
    const { data:a=[] } = await sb.from('assessments')
      .select('student_id,learning_area,score,weighted_score,cat1,cat2,endterm_score')
      .in('student_id',ids).eq('term',term).eq('year',year)
      .is('strand_id',null).not('learning_area','is',null);
    const rows = [['KNEC_Code','Admission_No','Learner_Name','Gender','Grade','Learning_Area','Term','Year','First_Test','Second_Test','Third_Test','Average','Performance_Level']];
    a.forEach(x=>{
      const s = students.find(st=>st.id===x.student_id);
      rows.push([state.school?.knec_code||'',s?.admission_number||'',s?.full_name||'',s?.gender||'',s?.grade||'',x.learning_area||'',term,year,x.cat1??'',x.cat2??'',x.endterm_score??'',x.weighted_score??'',x.score||'']);
    });
    const csv = rows.map(r=>r.map(v=>`"${String(v??'').replace(/"/g,'""')}"`).join(',')).join('\n');
    const blob = new Blob([csv], {type:'text/csv'});
    const a2=document.createElement('a'); a2.href=URL.createObjectURL(blob); a2.download=`knec-sba-${grade}-T${term}-${year}.csv`; a2.click();
  };
};

// Paid revision papers per grade/subject, KCSE-Online style.
// Admin/teachers upload PDFs and set a price. Teachers/parents pay per-download via M-Pesa.
modules.revision = async (m)=>{
  const sid=state.profile.school_id;
  const role=state.profile.role;
  const canUpload=['admin','headteacher','teacher'].includes(role);

  const GRADES=['PP1','PP2','Grade 1','Grade 2','Grade 3','Grade 4','Grade 5','Grade 6','Grade 7','Grade 8','Grade 9'];

  const [{data:papers=[]},{data:myPurchases=[]}]=await Promise.all([
    sb.from('revision_papers').select('*').eq('school_id',sid).order('created_at',{ascending:false}),
    sb.from('revision_purchases').select('paper_id').eq('user_id',state.profile.id).eq('status','completed'),
  ]);
  const purchasedSet=new Set((myPurchases||[]).map(p=>p.paper_id));

  m.innerHTML=`
    <div class="section-title">
      <div>
        <h1 style="margin:0">Revision Hub</h1>
        <p class="muted small" style="margin-top:.2rem">Past papers and revision materials per grade and learning area. ${canUpload?'Upload and price your own materials.':'Pay a small fee per download via M-Pesa.'}</p>
      </div>
      ${canUpload?`<button class="btn primary" id="addPaper"><i class="ti ti-upload"></i> Upload paper</button>`:''}
    </div>

    <div class="toolbar" style="margin-bottom:1.25rem">
      <div class="field"><label>Grade</label><select id="fg"><option>All</option>${GRADES.map(g=>`<option>${g}</option>`).join('')}</select></div>
      <div class="field"><label>Learning area</label><select id="fla"><option>All</option></select></div>
      <div class="field" style="flex:2;min-width:200px"><label>Search</label><input id="fq" placeholder="Title, term, exam type..."></div>
    </div>

    <div id="paperGrid"></div>`;

  // populate learning area filter from all known areas
  const allLAs=[...new Set(Object.values(CBC_LEARNING_AREAS).flat())].sort();
  $('#fla').innerHTML='<option>All</option>'+allLAs.map(a=>`<option>${esc(a)}</option>`).join('');

  function renderGrid(){
    const fg=$('#fg').value, fla=$('#fla').value, fq=$('#fq').value.toLowerCase();
    const filtered=papers.filter(p=>
      (fg==='All'||p.grade===fg)&&
      (fla==='All'||p.learning_area===fla)&&
      (!fq||(p.title||'').toLowerCase().includes(fq)||(p.exam_type||'').toLowerCase().includes(fq))
    );
    if(!filtered.length){
      $('#paperGrid').innerHTML=`<div class="card empty"><i class="ti ti-files"></i><div>No revision papers match this filter.</div></div>`;
      return;
    }
    $('#paperGrid').innerHTML=`<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:1rem">
      ${filtered.map(p=>{
        const owned=purchasedSet.has(p.id)||p.price<=0;
        return `<div class="card" style="margin:0;display:flex;flex-direction:column;gap:.5rem">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:.5rem">
            <div>
              <div style="font-weight:600;font-size:.95rem;line-height:1.3">${esc(p.title)}</div>
              <div class="small muted" style="margin-top:.15rem">${esc(p.grade)} &middot; ${esc(p.learning_area)}</div>
            </div>
            <span class="badge ${owned?'':'amber'}" style="flex-shrink:0">${p.price>0?'KSh '+(+p.price).toLocaleString():'Free'}</span>
          </div>
          ${p.exam_type?`<div class="small muted">${esc(p.exam_type)}${p.term?' &middot; Term '+esc(p.term):''}${p.year?' &middot; '+esc(p.year):''}</div>`:''}
          ${p.description?`<div class="small" style="color:var(--ink-2)">${esc((p.description||'').slice(0,90))}</div>`:''}
          <div style="margin-top:auto;padding-top:.5rem">
            ${owned
              ?`<button class="btn primary block dl-btn" data-url="${esc(p.file_url)}" style="height:36px;font-size:.85rem"><i class="ti ti-download"></i> Download PDF</button>`
              :`<button class="btn primary block buy-btn" data-id="${p.id}" data-price="${p.price}" data-title="${esc(p.title)}" style="height:36px;font-size:.85rem"><i class="ti ti-lock"></i> Pay KSh ${(+p.price).toLocaleString()} to unlock</button>`}
          </div>
          ${canUpload?`<div style="display:flex;gap:.5rem;margin-top:.25rem">
            <a href="${esc(p.file_url)}" target="_blank" class="small">Preview</a>
            <a href="#" class="small del-paper" data-id="${p.id}" style="color:var(--terracotta);margin-left:auto">Delete</a>
          </div>`:''}
        </div>`;
      }).join('')}
    </div>`;

    $('#paperGrid').querySelectorAll('.dl-btn').forEach(b=>b.onclick=async()=>{
      b.disabled=true; b.textContent='Preparing download...';
      const signed=await getSignedUrl(b.dataset.url);
      b.disabled=false; b.innerHTML='<i class="ti ti-download"></i> Download PDF';
      window.open(signed,'_blank');
    });
    $('#paperGrid').querySelectorAll('.buy-btn').forEach(b=>b.onclick=()=>buyPaper(b.dataset.id,b.dataset.title,+b.dataset.price));
    $('#paperGrid').querySelectorAll('.del-paper').forEach(a=>a.onclick=async(e)=>{
      e.preventDefault();
      if(!confirm('Delete this paper?')) return;
      await sb.from('revision_papers').delete().eq('id',a.dataset.id);
      toast('Deleted'); navigate('revision');
    });
  }
  ['fg','fla'].forEach(id=>$('#'+id).onchange=renderGrid);
  $('#fq').oninput=renderGrid;
  renderGrid();

  async function buyPaper(paperId,title,price){
    m.innerHTML=`<div class="card" style="max-width:480px">
      <a href="#" id="bk" class="small"><i class="ti ti-arrow-left"></i> Back to Revision Hub</a>
      <h2 style="margin-top:1rem">Unlock revision paper</h2>
      <div style="padding:.85rem 1rem;background:var(--green-50);border-radius:var(--radius);margin-bottom:1.25rem">
        <div style="font-weight:600">${esc(title)}</div>
        <div class="small muted" style="margin-top:.2rem">One-time download fee</div>
        <div style="font-family:'Fraunces',serif;font-size:1.8rem;color:var(--green);margin-top:.3rem">KSh ${price.toLocaleString()}</div>
      </div>
      <form id="payForm" class="stack">
        <div class="field"><label>M-Pesa phone number *</label>
          <input name="phone" required placeholder="07XX XXX XXX" value="${esc(state.profile.phone||'')}"></div>
        <div><button type="submit" class="btn primary block"><i class="ti ti-device-mobile"></i> Pay KSh ${price.toLocaleString()} via M-Pesa</button></div>
      </form>
      <p class="muted small" style="margin-top:1rem">You will receive an M-Pesa prompt on your phone. Enter your PIN to complete the payment, then your download will unlock automatically.</p>
    </div>`;
    $('#bk').onclick=(e)=>{e.preventDefault();navigate('revision');};
    $('#payForm').onsubmit=async(e)=>{
      e.preventDefault();
      const f=Object.fromEntries(new FormData(e.target));
      const btn=e.target.querySelector('button');
      btn.disabled=true; btn.textContent='Sending STK push...';

      // Record a pending purchase
      const {data:purchase,error:pErr}=await sb.from('revision_purchases').insert({
        paper_id:paperId, user_id:state.profile.id, school_id:sid,
        amount:price, phone:f.phone, status:'pending',
      }).select().single();

      if(pErr){ toast('Could not start payment: '+pErr.message,true); btn.disabled=false; return; }

      // STUB: Daraja STK push will be wired here once sandbox credentials are added.
      // For now, simulate the flow so the UI is fully testable end-to-end.
      toast('M-Pesa STK push sent. Waiting for confirmation (demo mode auto-confirms in 2s)...');
      setTimeout(async()=>{
        await sb.from('revision_purchases').update({status:'completed',mpesa_ref:'DEMO-'+Date.now()}).eq('id',purchase.id);
        toast('Payment confirmed. Your download is now unlocked.');
        navigate('revision');
      },2000);
    };
  }

  if($('#addPaper')) $('#addPaper').onclick=()=>{
    m.innerHTML=`<div class="card" style="max-width:600px">
      <a href="#" id="bk2" class="small"><i class="ti ti-arrow-left"></i> Back</a>
      <h2 style="margin-top:1rem">Upload revision paper</h2>
      <form id="uf" class="stack">
        <div class="field"><label>Title *</label><input name="title" required placeholder="e.g. Grade 7 Mathematics End Term 1 2025"></div>
        <div class="row">
          <div class="col field"><label>Grade *</label><select name="grade">${GRADES.map(g=>`<option>${g}</option>`).join('')}</select></div>
          <div class="col field"><label>Learning area *</label><select name="learning_area">${allLAs.map(a=>`<option>${esc(a)}</option>`).join('')}</select></div>
        </div>
        <div class="row">
          <div class="col field"><label>Exam type</label><select name="exam_type"><option>End Term Exam</option><option>CAT 1</option><option>CAT 2</option><option>Mock Exam</option><option>Revision Booklet</option><option>Past Paper</option></select></div>
          <div class="col field"><label>Term</label><select name="term"><option value="">—</option><option>1</option><option>2</option><option>3</option></select></div>
          <div class="col field"><label>Year</label><input name="year" type="number" value="${new Date().getFullYear()}"></div>
        </div>
        <div class="field"><label>Description (optional)</label><textarea name="description" rows="2" placeholder="Brief description of what this paper covers"></textarea></div>
        <div class="field"><label>Price (KSh) *</label><input name="price" type="number" min="0" required placeholder="e.g. 30 — enter 0 for free"></div>
        <div class="field"><label>PDF file *</label>
          <input type="file" id="pdfUpload" accept="application/pdf" required style="padding:.5rem">
          <span class="small muted">Max 10MB.</span></div>
        <div id="upProgress" style="display:none" class="small muted">Uploading...</div>
        <div><button type="submit" class="btn primary">Upload</button> <button type="button" class="btn secondary" id="uc">Cancel</button></div>
      </form>
    </div>`;
    $('#bk2').onclick=(e)=>{e.preventDefault();navigate('revision');};
    $('#uc').onclick=()=>navigate('revision');
    $('#uf').onsubmit=async(e)=>{
      e.preventDefault();
      const f=Object.fromEntries(new FormData(e.target));
      const fileInput=$('#pdfUpload');
      if(!fileInput.files.length){ toast('Choose a PDF file.',true); return; }
      const file=fileInput.files[0];
      if(file.size>10*1024*1024){ toast('File too large. Max 10MB.',true); return; }

      $('#upProgress').style.display='block';
      const path=`revision/${sid}/${Date.now()}-${file.name.replace(/\s/g,'_')}`;
      const {error:upErr}=await sb.storage.from('school-files').upload(path,file,{contentType:'application/pdf'});
      if(upErr){ toast('Upload failed: '+upErr.message,true); $('#upProgress').style.display='none'; return; }
      const {data:pub}=sb.storage.from('school-files').getPublicUrl(path);

      f.school_id=sid; f.file_url=pub?.publicUrl||null; f.uploaded_by=state.profile.id;
      f.price=+f.price; f.term=f.term?+f.term:null; f.year=f.year?+f.year:null;

      const {error}=await sb.from('revision_papers').insert(f);
      if(error) toast('Save failed: '+error.message,true);
      else { toast('Revision paper uploaded.'); navigate('revision'); }
    };
  };
};

    <div class="card" style="max-width:720px"><div class="row"><div class="col"><div class="small muted">Current status</div><h3>${access?.locked?'Payment needed':'Active'}</h3></div><div class="col"><div class="small muted">Paid until</div><h3>${esc(access?.paidUntil||'Not active')}</h3></div><div class="col"><div class="small muted">Monthly price</div><h3>${serviceCurrency(monthly)}</h3></div></div></div>
    <div class="row" style="align-items:stretch">${plans.map(p=>`<div class="col card" style="min-width:190px"><h3>${p.label}</h3><div style="font-size:1.7rem;font-weight:800;color:var(--green)">${serviceCurrency(p.amount)}</div><div class="small muted">${p.note}</div><button class="btn primary block plan-pay" data-months="${p.months}" data-amount="${p.amount}" style="margin-top:1rem">Pay ${p.label}</button></div>`).join('')}</div>
    <div class="card" style="max-width:720px"><div class="field"><label>Safaricom phone number</label><input id="subPhone" placeholder="07XXXXXXXX" inputmode="tel"></div><p class="small muted">Your teacher account is designed for one browser/device at a time. If you need to move to another phone or laptop, ask support to reset device access.</p></div>`;
  $$('.plan-pay').forEach(btn=>btn.onclick=async()=>{
    const phone=$('#subPhone').value.trim();
    if(!/^(\+?254|0)?(7|1)\d{8}$/.test(phone.replace(/\s/g,''))){ toast('Enter a valid Safaricom phone number.', true); return; }
    btn.disabled=true; const old=btn.textContent; btn.textContent='Sending prompt...';
    try{ const res=await startServiceSubscriptionPayment(phone,+btn.dataset.months,+btn.dataset.amount); toast(res.message||'M-Pesa prompt sent. Enter PIN on the phone.'); }
    catch(e){ toast('Payment prompt failed: '+(e.message||String(e)), true); }
    finally{ btn.disabled=false; btn.textContent=old; }
  });
};

  if(!isPlatformOwner()){
    m.innerHTML = `<div class="card"><h3>Not available</h3><p class="muted small">This area is only for the platform owner.</p></div>`;
    return;
  }
  state.ownerTab = state.ownerTab || 'subscriptions';
  m.innerHTML = `<div class="section-title"><div><h1>Subscription Control</h1><p class="muted">Manage each school or individual teacher workspace from one place.</p></div></div>
    <div class="owner-tabs">
      <button class="btn secondary owner-tab ${state.ownerTab==='subscriptions'?'active':''}" data-tab="subscriptions"><i class="ti ti-users"></i> Subscriptions</button>
      <button class="btn secondary owner-tab ${state.ownerTab==='payments'?'active':''}" data-tab="payments"><i class="ti ti-cash"></i> Payments</button>
      <button class="btn secondary owner-tab ${state.ownerTab==='overview'?'active':''}" data-tab="overview"><i class="ti ti-chart-bar"></i> Overview</button>
    </div>
    <div class="toolbar">
      <div class="field" style="min-width:280px"><label>Search</label><input id="ownerSearch" placeholder="School, teacher workspace, code, or ID"></div>
      <div class="field"><label>Sort</label><select id="ownerSort"><option value="created_desc">Newest signup</option><option value="paid_desc">Latest paid</option><option value="expiry_asc">Expiry soon</option><option value="name_asc">Name A-Z</option></select></div>
      <div class="field"><label>Payments</label><select id="ownerPayRange"><option value="today">Today</option><option value="7">Last 7 days</option><option value="30">Last 30 days</option><option value="all">All time</option></select></div>
      <button class="btn secondary" id="ownerRefresh"><i class="ti ti-refresh"></i> Refresh</button>
    </div>
    <div id="ownerList"></div>`;

  const load=async()=>{
    const term=($('#ownerSearch')?.value||'').trim().toLowerCase();
    const sort=$('#ownerSort')?.value||'created_desc';
    const payRange=$('#ownerPayRange')?.value||'today';
    const [schoolRes,userRes,learnerRes,paymentRes] = await Promise.all([
      sb.from('schools').select(`
        id,name,type,school_code,created_at,
        teacher_subscription_amount,school_monthly_price,
        service_paid_until,service_status,service_last_paid_at,service_last_receipt,
        service_discount_note,service_customer_code
      `).order('created_at',{ascending:false}),
      sb.from('users').select('id,school_id,role,full_name,phone,email,created_at'),
      sb.from('students').select('id,school_id,created_at'),
      sb.from('service_subscription_payments').select('id,school_id,user_id,amount,status,paid_at,created_at,receipt_number,phone,result_description,paid_until').order('created_at',{ascending:false}),
    ]);
    const schools = schoolRes.data || [];
    const users = userRes.data || [];
    const learners = learnerRes.data || [];
    const payments = paymentRes.data || [];
    const error = schoolRes.error || userRes.error || learnerRes.error || paymentRes.error;
    if(error){ $('#ownerList').innerHTML=`<div class="card"><p class="muted">Could not load subscriptions. Run the owner SQL first: ${esc(error.message)}</p></div>`; return; }
    const schoolIds = new Set(schools.map(s=>s.id));
    const ownerUsers = users.filter(u=>schoolIds.has(u.school_id));
    const ownerLearners = learners.filter(s=>schoolIds.has(s.school_id));
    const completedPayments = payments.filter(p=>p.status==='completed');
    const thisMonth = new Date().toISOString().slice(0,7);
    const isIndividual = s=>String(s.type||'').toLowerCase().includes('individual');
    const isExpired = s=>{
      const status=String(s.service_status||'active').toLowerCase();
      const firstTeacherPayment = isIndividual(s) && !s.service_last_paid_at && !['trial','manual'].includes(status);
      return firstTeacherPayment || !s.service_paid_until || new Date(`${s.service_paid_until}T23:59:59`) < new Date() || status==='locked';
    };
    const planPrice = s=>isIndividual(s) ? Number(s.teacher_subscription_amount||450) : Number(s.school_monthly_price||5500);
    const activeCount = schools.filter(s=>!isExpired(s)).length;
    const expiredCount = schools.length - activeCount;
    const expectedRevenue = schools.reduce((sum,s)=>sum+planPrice(s),0);
    const revenueThisMonth = completedPayments
      .filter(p=>String(p.paid_at||p.created_at||'').slice(0,7)===thisMonth)
      .reduce((sum,p)=>sum+Number(p.amount||0),0);
    const signupsThisMonth = ownerUsers.filter(u=>String(u.created_at||'').slice(0,7)===thisMonth).length;
    const userCountBySchool = ownerUsers.reduce((acc,u)=>{ acc[u.school_id]=(acc[u.school_id]||0)+1; return acc; },{});
    const primaryUserBySchool = ownerUsers.reduce((acc,u)=>{
      const current=acc[u.school_id];
      const priority={admin:4,headteacher:3,teacher:2,parent:1};
      if(!current || (priority[u.role]||0)>(priority[current.role]||0)) acc[u.school_id]=u;
      return acc;
    },{});
    const learnerCountBySchool = ownerLearners.reduce((acc,s)=>{ acc[s.school_id]=(acc[s.school_id]||0)+1; return acc; },{});
    const latestPaymentBySchool = completedPayments.reduce((acc,p)=>{
      if(!p.school_id) return acc;
      if(!acc[p.school_id] || String(p.paid_at||p.created_at||'') > String(acc[p.school_id].paid_at||acc[p.school_id].created_at||'')) acc[p.school_id]=p;
      return acc;
    },{});
    const localDateKey=d=>new Date(d).toLocaleDateString('en-CA',{timeZone:'Africa/Nairobi'});
    const todayKey = new Date().toLocaleDateString('en-CA',{timeZone:'Africa/Nairobi'});
    const daysAgo=n=>{ const d=new Date(); d.setDate(d.getDate()-n); return d; };
    const inPaymentRange=p=>{
      const stamp=p.paid_at||p.created_at;
      if(!stamp) return false;
      if(payRange==='all') return true;
      if(payRange==='today') return localDateKey(stamp)===todayKey;
      return new Date(stamp)>=daysAgo(Number(payRange)||30);
    };
    let rows=schools.filter(s=>{
      if(!term) return true;
      const customer=primaryUserBySchool[s.id] || {};
      return [s.id,s.name,s.type,s.school_code,s.service_customer_code,customer.full_name,customer.email,customer.phone].some(v=>String(v||'').toLowerCase().includes(term));
    });
    rows=rows.sort((a,b)=>{
      if(sort==='name_asc') return String(a.name||'').localeCompare(String(b.name||''));
      if(sort==='expiry_asc') return String(a.service_paid_until||'9999-12-31').localeCompare(String(b.service_paid_until||'9999-12-31'));
      if(sort==='paid_desc') return String(latestPaymentBySchool[b.id]?.paid_at||latestPaymentBySchool[b.id]?.created_at||'').localeCompare(String(latestPaymentBySchool[a.id]?.paid_at||latestPaymentBySchool[a.id]?.created_at||''));
      return String(b.created_at||'').localeCompare(String(a.created_at||''));
    });
    const ownerKpis = `<div class="owner-kpis">
      <div class="metric"><div class="num">${schools.length}</div><div class="lbl">Workspaces</div></div>
      <div class="metric"><div class="num">${activeCount}</div><div class="lbl">Active</div></div>
      <div class="metric"><div class="num">${expiredCount}</div><div class="lbl">Expired or locked</div></div>
      <div class="metric"><div class="num">${schools.filter(isIndividual).length}</div><div class="lbl">Teachers</div></div>
      <div class="metric"><div class="num">${schools.filter(s=>!isIndividual(s)).length}</div><div class="lbl">Schools</div></div>
      <div class="metric"><div class="num">${serviceCurrency(revenueThisMonth)}</div><div class="lbl">Collected this month</div></div>
    </div>`;
    const renderSubscriptionRow=s=>{
      const individual = isIndividual(s);
      const price = planPrice(s);
      const expired = isExpired(s);
      const lastPayment = latestPaymentBySchool[s.id];
      const customer = primaryUserBySchool[s.id] || {};
      return `<tr>
        <td class="owner-line"><b>${esc(customer.full_name||s.name||'Unnamed customer')}</b><div class="small muted">${esc(customer.email||'No email')}</div><div class="small muted">${esc(customer.phone||'No phone added')} ${individual?'&middot; Teacher':''}</div></td>
        <td class="owner-line"><b>${esc(s.name||'Workspace')}</b><div class="small muted">ID: ${esc(s.service_customer_code||String(s.id).slice(0,8).toUpperCase())}</div><div class="small muted">Users: ${userCountBySchool[s.id]||0} &middot; Learners: ${learnerCountBySchool[s.id]||0}</div>${s.service_discount_note?`<div class="small muted">Note: ${esc(s.service_discount_note)}</div>`:''}</td>
        <td class="owner-line"><b>${serviceCurrency(price)}</b><div class="small muted">Paid until: ${esc(s.service_paid_until||'Not active')}</div>${lastPayment?`<div class="small muted">Last: ${serviceCurrency(lastPayment.amount)} on ${esc(new Date(lastPayment.paid_at||lastPayment.created_at).toLocaleString('en-KE'))}</div>`:''}</td>
        <td class="owner-line"><span class="badge ${expired||s.service_status==='locked'?'terra':''}">${expired?'expired':esc(s.service_status||'active')}</span><div class="small muted">${esc(String(s.service_last_paid_at||s.created_at||'').slice(0,10)||'')}</div></td>
        <td><div class="owner-actions"><button class="btn secondary owner-edit" data-id="${esc(s.id)}">Edit</button><button class="btn secondary reset-device" data-id="${esc(s.id)}">Reset device</button></div></td>
      </tr>`;
    };
    const renderSubscriptionCard=s=>{
      const individual = isIndividual(s);
      const price = planPrice(s);
      const expired = isExpired(s);
      const customer = primaryUserBySchool[s.id] || {};
      return `<div class="owner-mobile-card">
        <div class="top"><div><b>${esc(customer.full_name||s.name||'Unnamed customer')}</b><div class="small muted">${esc(customer.email||'No email')}</div><div class="small muted">${esc(customer.phone||'No phone added')} ${individual?'&middot; Teacher':''}</div></div><span class="badge ${expired||s.service_status==='locked'?'terra':''}">${expired?'expired':esc(s.service_status||'active')}</span></div>
        <div class="small muted" style="margin-top:.55rem"><b>${esc(s.name||'Workspace')}</b> &middot; ID ${esc(s.service_customer_code||String(s.id).slice(0,8).toUpperCase())}</div>
        <div class="small muted">Users: ${userCountBySchool[s.id]||0} &middot; Learners: ${learnerCountBySchool[s.id]||0}</div>
        <div style="margin-top:.5rem"><b>${serviceCurrency(price)}</b><div class="small muted">Paid until: ${esc(s.service_paid_until||'Not active')}</div></div>
        <div class="actions"><button class="btn secondary owner-edit" data-id="${esc(s.id)}">Edit</button><button class="btn secondary reset-device" data-id="${esc(s.id)}">Reset device</button></div>
      </div>`;
    };
    const paymentRows=completedPayments.filter(p=>{
      const school=schools.find(s=>s.id===p.school_id)||{};
      const customer=primaryUserBySchool[p.school_id]||{};
      if(!inPaymentRange(p)) return false;
      if(!term) return true;
      return [school.name,school.school_code,school.service_customer_code,customer.full_name,customer.email,customer.phone,p.phone,p.receipt_number,p.status,p.result_description].some(v=>String(v||'').toLowerCase().includes(term));
    });
    const todayPayments = completedPayments.filter(p=>inPaymentRange({...p, paid_at:p.paid_at||p.created_at}) && localDateKey(p.paid_at||p.created_at)===todayKey);
    const tab=state.ownerTab||'subscriptions';
    $('#ownerList').innerHTML = tab==='overview' ? `
      ${ownerKpis}
      <div class="card"><h3>Business snapshot</h3>
        <div class="analytics-grid">
          <div><div class="small muted">Expected monthly revenue</div><h2>${serviceCurrency(expectedRevenue)}</h2></div>
          <div><div class="small muted">Collected this month</div><h2>${serviceCurrency(revenueThisMonth)}</h2></div>
          <div><div class="small muted">User signups this month</div><h2>${signupsThisMonth}</h2></div>
          <div><div class="small muted">Total learners served</div><h2>${ownerLearners.length}</h2></div>
        </div>
      </div>` : tab==='payments' ? `
      <div class="owner-kpis">
        <div class="metric"><div class="num">${serviceCurrency(todayPayments.reduce((sum,p)=>sum+Number(p.amount||0),0))}</div><div class="lbl">Collected today</div></div>
        <div class="metric"><div class="num">${todayPayments.length}</div><div class="lbl">Payments today</div></div>
        <div class="metric"><div class="num">${serviceCurrency(revenueThisMonth)}</div><div class="lbl">Collected this month</div></div>
      </div>
      <div class="card">
        <h3>Subscription payments</h3>
        ${paymentRows.length?`<div class="owner-table-wrap"><table class="owner-table"><thead><tr><th>Paid by</th><th>Workspace</th><th>Amount</th><th>Time</th><th>Status</th></tr></thead><tbody>
          ${paymentRows.map(p=>{ const school=schools.find(s=>s.id===p.school_id)||{}; const customer=primaryUserBySchool[p.school_id]||{}; return `<tr>
            <td><b>${esc(customer.full_name||'Unknown')}</b><div class="small muted">${esc(customer.email||'')}</div><div class="small muted">${esc(p.phone||customer.phone||'')}</div></td>
            <td>${esc(school.name||'Workspace')}<div class="small muted">ID: ${esc(school.service_customer_code||String(p.school_id||'').slice(0,8).toUpperCase())}</div></td>
            <td><b>${serviceCurrency(p.amount)}</b><div class="small muted">${esc(p.receipt_number||'No receipt yet')}</div></td>
            <td class="small muted">${esc(new Date(p.paid_at||p.created_at).toLocaleString('en-KE'))}</td>
            <td><span class="badge ${p.status==='completed'?'':'amber'}">${esc(p.status||'pending')}</span><div class="small muted">${esc(p.result_description||'')}</div></td>
          </tr>`; }).join('')}
        </tbody></table></div>
        <div class="owner-mobile-list">${paymentRows.map(p=>{ const school=schools.find(s=>s.id===p.school_id)||{}; const customer=primaryUserBySchool[p.school_id]||{}; return `<div class="owner-mobile-card">
          <div class="top"><div><b>${esc(customer.full_name||'Unknown')}</b><div class="small muted">${esc(school.name||'Workspace')}</div><div class="small muted">${esc(p.phone||customer.phone||'')}</div></div><span class="badge ${p.status==='completed'?'':'amber'}">${esc(p.status||'pending')}</span></div>
          <div style="margin-top:.55rem"><b>${serviceCurrency(p.amount)}</b><div class="small muted">${esc(new Date(p.paid_at||p.created_at).toLocaleString('en-KE'))}</div><div class="small muted">${esc(p.receipt_number||p.result_description||'No receipt yet')}</div></div>
        </div>`; }).join('')}</div>`:`<div class="empty"><i class="ti ti-cash"></i><div>No matching payments.</div></div>`}
      </div>` : `
      <div class="card">
        ${rows.length?`<div class="owner-table-wrap"><table class="owner-table"><thead><tr><th>Customer</th><th>Workspace / School</th><th>Subscription</th><th>Status</th><th>Support</th></tr></thead><tbody>${rows.map(renderSubscriptionRow).join('')}</tbody></table></div>
        <div class="owner-mobile-list">${rows.map(renderSubscriptionCard).join('')}</div>`:`<div class="empty"><i class="ti ti-search"></i><div>No matching workspaces.</div></div>`}
      </div>`;
    $$('.owner-edit').forEach(btn=>btn.onclick=()=>openOwnerEdit(rows.find(s=>s.id===btn.dataset.id)));
    $$('.reset-device').forEach(btn=>btn.onclick=async()=>{
      if(!confirm('Reset active device access for this workspace?')) return;
      const {error}=await sb.from('teacher_device_sessions').update({status:'reset'}).eq('school_id',btn.dataset.id).eq('status','active');
      if(error){ toast('Device reset failed. Run the owner/device SQL update first: '+error.message,true); return; }
      toast('Device access reset. The teacher can sign in on a new device.');
    });
  };

  const openOwnerEdit=(s)=>{
    const individual = String(s.type||'').toLowerCase().includes('individual');
    const currentPrice = individual ? Number(s.teacher_subscription_amount||450) : Number(s.school_monthly_price||5500);
    const box=el(`<div class="modal-backdrop" style="position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:9998;display:flex;align-items:center;justify-content:center;padding:1rem">
      <div class="card" style="max-width:620px;width:100%;max-height:90vh;overflow:auto">
        <div class="section-title"><h3>Edit subscription</h3><button class="btn secondary" id="closeOwnerEdit">Close</button></div>
        <p class="small muted">${esc(s.name)} &middot; ID ${esc(s.service_customer_code||String(s.id).slice(0,8).toUpperCase())}</p>
        <form id="ownerEditForm" class="stack">
          <div class="row">
            <div class="col field"><label>${individual?'Teacher monthly price':'School monthly price'} (KSh)</label><input type="number" name="price" value="${esc(currentPrice)}"></div>
            <div class="col field"><label>Paid until</label><input type="date" name="service_paid_until" value="${esc(s.service_paid_until||'')}"></div>
          </div>
          <div class="row">
            <div class="col field"><label>Status</label><select name="service_status"><option value="active" ${s.service_status!=='locked'?'selected':''}>Active</option><option value="locked" ${s.service_status==='locked'?'selected':''}>Locked</option><option value="manual" ${s.service_status==='manual'?'selected':''}>Manual</option><option value="trial" ${s.service_status==='trial'?'selected':''}>Trial</option></select></div>
            <div class="col field"><label>Add free days</label><input type="number" name="free_days" placeholder="e.g. 30"></div>
          </div>
          <div class="field"><label>Discount / owner note</label><textarea name="service_discount_note" rows="2" placeholder="e.g. Discounted for first term">${esc(s.service_discount_note||'')}</textarea></div>
          <button class="btn primary">Save subscription</button>
        </form>
      </div>
    </div>`);
    document.body.appendChild(box);
    $('#closeOwnerEdit').onclick=()=>box.remove();
    $('#ownerEditForm').onsubmit=async(e)=>{
      e.preventDefault();
      const f=Object.fromEntries(new FormData(e.target));
      let paidUntil=f.service_paid_until||null;
      const freeDays=Number(f.free_days||0);
      if(freeDays>0){
        const base=paidUntil?new Date(`${paidUntil}T00:00:00`):new Date();
        const today=new Date(); today.setHours(0,0,0,0);
        const start=base>today?base:today;
        start.setDate(start.getDate()+freeDays);
        paidUntil=start.toISOString().slice(0,10);
      }
      const update={
        service_paid_until:paidUntil,
        service_status:f.service_status,
        service_discount_note:f.service_discount_note||null,
      };
      if(individual) update.teacher_subscription_amount=Number(f.price||450);
      else update.school_monthly_price=Number(f.price||5500);
      const {error}=await sb.from('schools').update(update).eq('id',s.id);
      if(error){ toast('Save failed. Run the owner SQL first: '+error.message,true); return; }
      toast('Subscription updated');
      box.remove();
      load();
    };
  };

  $$('.owner-tab').forEach(btn=>btn.onclick=()=>{
    state.ownerTab=btn.dataset.tab;
    $$('.owner-tab').forEach(b=>b.classList.toggle('active',b.dataset.tab===state.ownerTab));
    load();
  });
  $('#ownerRefresh').onclick=load;
  $('#ownerSearch').oninput=load;
  $('#ownerSort').onchange=load;
  $('#ownerPayRange').onchange=load;
  await load();
};

          <div class="col field"><label>Summary row colour</label><input type="color" name="report_accent_color" value="${esc(state.school.report_accent_color||'#e8f5e9')}"></div>
        </div>
        <button class="btn primary">Save report colours</button>
      </form>

              <option value="sandbox" ${state.school.daraja_environment==='sandbox'?'selected':''}>Sandbox testing</option>
              <option value="production" ${state.school.daraja_environment==='production'?'selected':''}>Production live</option>
            </select></div>

async function ensureTeacherDevicePolicy(){
  try{
    if(state.profile?.role!=='teacher') return true;
    if(state.school?.teacher_device_policy==='open') return true;
    const key='radari_browser_id';
    let browserId=localStorage.getItem(key);
    if(!browserId){ browserId=(crypto.randomUUID?crypto.randomUUID():String(Date.now())+Math.random()); localStorage.setItem(key,browserId); }
    const label=[navigator.platform,navigator.userAgent.split(')')[0].replace('(','')].filter(Boolean).join(' - ').slice(0,120);
    const {data:existing=[]}=await sb.from('teacher_device_sessions').select('*').eq('user_id',state.profile.id).eq('status','active');
    const mine=existing.find(x=>x.browser_id===browserId);
    if(existing.length && !mine){ toast('This teacher account is already active on another browser. Ask the admin to reset device access.', true); await sb.auth.signOut(); return false; }
    if(mine){ await sb.from('teacher_device_sessions').update({last_seen:new Date().toISOString(),device_label:label}).eq('id',mine.id); }
    else {
      const {error}=await sb.from('teacher_device_sessions').upsert({
        user_id:state.profile.id,
        school_id:state.profile.school_id,
        browser_id:browserId,
        device_label:label,
        status:'active',
        last_seen:new Date().toISOString()
      }, { onConflict:'user_id,browser_id' });
      if(error) console.warn('Device session update failed', error);
    }
  }catch(e){ console.warn('Device policy skipped', e); }
  return true;
}

function serviceCurrency(amount){
  return `KSh ${Number(amount||0).toLocaleString()}`;
}

function serviceAmountForProfile(){
  if(!state.school) return 5500;
  if(state.profile?.role==='teacher' && isIndividualTeacherWorkspace()) {
    const configured = Number(state.school.teacher_subscription_amount || 0);
    return configured > 0 ? configured : 450;
  }
  return Number(state.school.school_monthly_price||5500);
}

function serviceAccessStatus(){
  if(isPlatformOwner()){
    return { configured:true, locked:false, dueSoon:false, daysLeft:null, paidUntil:null, ownerBypass:true };
  }
  if(!state.school || !('service_paid_until' in state.school)) {
    return { configured:false, locked:false, dueSoon:false, daysLeft:null, paidUntil:null };
  }
  const paidUntilText = state.school.service_paid_until;
  const paidUntil = paidUntilText ? new Date(`${paidUntilText}T23:59:59`) : null;
  const today = new Date();
  const daysLeft = paidUntil ? Math.ceil((paidUntil - today) / 86400000) : -1;
  const status = String(state.school.service_status || 'active').toLowerCase();
  const hasActivePaidUntil = !!paidUntil && daysLeft >= 0;
  const firstTeacherPaymentRequired = isIndividualTeacher()
    && !state.school.service_last_paid_at
    && !hasActivePaidUntil
    && !['trial','manual'].includes(status);
  const locked = firstTeacherPaymentRequired || status === 'locked' || !paidUntil || daysLeft < 0;
  const dueSoon = !locked && daysLeft <= 7;
  return { configured:true, locked, dueSoon, daysLeft, paidUntil:paidUntilText, firstTeacherPaymentRequired };
}

async function refreshServiceAccess(){
  if(!state.profile?.school_id) return null;
  try{
    const {data}=await sb.from('schools').select('*').eq('id',state.profile.school_id).maybeSingle();
    if(data) state.school=data;
  }catch(e){ console.warn('Service access refresh skipped', e); }
  state.serviceAccess = serviceAccessStatus();
  return state.serviceAccess;
}

function serviceCheckoutKey(){
  return `radari_service_checkout_${state.profile?.school_id||'none'}`;
}

async function startServiceSubscriptionPayment(phone, months=1, amount=null){
  amount = amount || serviceAmountForProfile();
  const {data:{session}, error:sessionError}=await sb.auth.getSession();
  if(sessionError || !session?.access_token){
    throw new Error('Your login session has expired. Please sign out, sign in again, then try payment.');
  }
  const {data,error}=await sb.functions.invoke('start-service-subscription-payment',{
    headers:{ Authorization:`Bearer ${session.access_token}` },
    body:{
      school_id:state.profile.school_id,
      user_id:state.profile.id,
      phone,
      amount,
      months,
      role:state.profile.role
    }
  });
  if(error) throw error;
  if(data.checkout_request_id) localStorage.setItem(serviceCheckoutKey(), data.checkout_request_id);
  if(!data?.ok) throw new Error(data?.message||'Payment prompt was not accepted.');
  return data;
}

async function confirmServiceSubscriptionPayment(){
  const {data:{session}, error:sessionError}=await sb.auth.getSession();
  if(sessionError || !session?.access_token){
    throw new Error('Your login session has expired. Please sign out, sign in again, then try checking payment.');
  }
  const {data,error}=await sb.functions.invoke('confirm-service-subscription-payment',{
    headers:{ Authorization:`Bearer ${session.access_token}` },
    body:{
      school_id:state.profile.school_id,
      checkout_request_id:localStorage.getItem(serviceCheckoutKey()) || null
    }
  });
  if(error) throw error;
  if(!data?.ok) throw new Error(data?.message||'Payment has not been confirmed yet.');
  return data;
}

function readablePaymentError(error){
  if(!error) return 'Unknown payment error.';
  if(typeof error === 'string') return error;
  const ctx = error.context || error;
  const body = ctx.body || ctx.response || error.response || null;
  if(body?.message) return body.message;
  if(body?.error_description) return body.error_description;
  if(body?.errorMessage) return body.errorMessage;
  if(body?.ResponseDescription) return body.ResponseDescription;
  if(body?.ResultDesc) return body.ResultDesc;
  if(error.message) return error.message;
  try{ return JSON.stringify(error); }catch(_){ return String(error); }
}

function setServiceLockMessage(message, isError=false){
  const box=$('#serviceLockMessage');
  if(!box) return;
  box.textContent=message || '';
  box.classList.remove('error','ok');
  if(message) box.classList.add(isError?'error':'ok');
}

function removeServiceNotice(){
  $('#serviceLock')?.remove();
}

function showServiceNotice(access){
  if(isPlatformOwner() || access?.ownerBypass) return;
  if(!access?.configured || (!access.locked && !access.dueSoon)) return;
  removeServiceNotice();
  const canPay = ['admin','headteacher','teacher'].includes(state.profile?.role);
  const amount = serviceAmountForProfile();
  const title = access.firstTeacherPaymentRequired ? 'Activate your teacher subscription' : (access.locked ? 'Subscription renewal required' : 'Subscription renewal reminder');
  const message = access.firstTeacherPaymentRequired
    ? 'Please activate your teacher workspace before using Radari. After payment, your 30-day access starts immediately.'
    : access.locked
    ? 'This Radari account is locked because the access period has ended. Renew to continue using the system.'
    : `This Radari account has ${access.daysLeft} day${access.daysLeft===1?'':'s'} remaining. Renew now to reset another 30 days.`;
  const overlay = el(`<div class="service-lock" id="serviceLock">
    <div class="service-lock-card">
      <h2>${title}</h2>
      <p class="muted">${message}</p>
      <div class="amount">${serviceCurrency(amount)}</div>
      <div class="small muted">Paid until: ${esc(access.paidUntil||'Not active')}</div>
      ${canPay?`<div class="field" style="margin-top:1rem"><label>Safaricom phone number</label><input id="servicePhone" placeholder="07XXXXXXXX" inputmode="tel"></div>`:`<p class="muted small" style="margin-top:1rem">Please ask the school administrator to renew the account.</p>`}
      <div id="serviceLockMessage" class="service-lock-message"></div>
      <div class="service-lock-actions">
        ${canPay?`<button class="btn primary" id="servicePay"><i class="ti ti-device-mobile"></i> Pay ${serviceCurrency(amount)}</button>`:''}
        <button class="btn secondary" id="serviceCheck"><i class="ti ti-refresh"></i> Check payment</button>
        ${access.locked?'':`<button class="btn secondary" id="serviceLater">Later</button>`}
        <button class="btn secondary" id="serviceSignOut">Sign out</button>
      </div>
    </div>
  </div>`);
  document.body.appendChild(overlay);
  if($('#serviceLater')) $('#serviceLater').onclick=removeServiceNotice;
  $('#serviceSignOut').onclick=async()=>{ await sb.auth.signOut(); location.reload(); };
  $('#serviceCheck').onclick=async()=>{
    $('#serviceCheck').disabled=true;
    $('#serviceCheck').innerHTML='<i class="ti ti-refresh"></i> Checking...';
    setServiceLockMessage('Checking payment with Safaricom. Please wait...', false);
    try{
      const checked=await confirmServiceSubscriptionPayment();
      setServiceLockMessage(checked.message || 'Payment confirmed. Opening Radari...', false);
      toast(checked.message || 'Payment confirmed. Opening Radari...');
      await refreshServiceAccess();
      if(checked.paid_until){
        localStorage.removeItem(serviceCheckoutKey());
        state.school = {
          ...(state.school || {}),
          service_status:'active',
          service_paid_until:checked.paid_until,
          service_last_paid_at:state.school?.service_last_paid_at || new Date().toISOString(),
        };
        state.serviceAccess = serviceAccessStatus();
      }
      removeServiceNotice();
      render();
      return;
    }catch(e){
      console.warn('Direct payment confirmation skipped:', e);
      setServiceLockMessage(`Direct confirmation failed: ${readablePaymentError(e)}\n\nI will also check Radari records now.`, true);
    }
    const fresh = await refreshServiceAccess();
    if(!fresh?.locked){
      toast('Subscription is active.');
      removeServiceNotice();
      render();
    } else {
      const {data:latest=[]}=await sb.from('service_subscription_payments')
        .select('status,paid_at,paid_until,receipt_number,amount,created_at')
        .eq('school_id',state.profile.school_id)
        .order('created_at',{ascending:false})
        .limit(1);
      const p=latest[0];
      if(p?.status==='completed'){
        toast('Payment is confirmed. Refreshing access...');
        await refreshServiceAccess();
        if(p.paid_until){
          state.school = {
            ...(state.school || {}),
            service_status:'active',
            service_paid_until:p.paid_until,
            service_last_paid_at:p.paid_at || state.school?.service_last_paid_at || new Date().toISOString(),
            service_last_receipt:p.receipt_number || state.school?.service_last_receipt || null,
          };
          state.serviceAccess = serviceAccessStatus();
        }
        removeServiceNotice();
        render();
      } else {
        const lastStatus=p ? `\n\nLatest record: ${p.status || 'unknown'}${p.result_description ? ` - ${p.result_description}` : ''}` : '\n\nNo payment record was found.';
        setServiceLockMessage(`Payment has not opened the account yet.${lastStatus}`, true);
        toast('Payment has not reflected yet. Read the message inside the payment box.', true);
        const current=serviceAccessStatus();
        if(!$('#serviceLock')) showServiceNotice(current);
      }
    }
    if($('#serviceCheck')){
      $('#serviceCheck').disabled=false;
      $('#serviceCheck').innerHTML='<i class="ti ti-refresh"></i> Check payment';
    }
  };
  if($('#servicePay')) $('#servicePay').onclick=async()=>{
    const phone = $('#servicePhone').value.trim();
    if(!/^(\+?254|0)?(7|1)\d{8}$/.test(phone.replace(/\s/g,''))){
      setServiceLockMessage('Enter a valid Safaricom phone number.', true);
      toast('Enter a valid Safaricom phone number.', true);
      return;
    }
    $('#servicePay').disabled=true;
    setServiceLockMessage('Sending M-Pesa prompt to the phone...', false);
    try{
      await refreshServiceAccess();
      const res = await startServiceSubscriptionPayment(phone);
      setServiceLockMessage(`${res.message||'M-Pesa prompt sent. Enter PIN on the phone.'}\nAmount: ${serviceCurrency(res.amount||serviceAmountForProfile())}`, false);
      toast(`${res.message||'M-Pesa prompt sent. Enter PIN on the phone.'} Amount: ${serviceCurrency(res.amount||serviceAmountForProfile())}`);
    }catch(e){
      const msg=readablePaymentError(e);
      setServiceLockMessage(`Payment prompt failed: ${msg}`, true);
      toast('Payment prompt failed. Read the message inside the payment box.', true);
    }finally{
      if($('#servicePay')) $('#servicePay').disabled=false;
    }
  };
}

async function loadProfile(){
  const { data:{ user } } = await sb.auth.getUser();
  if(!user) return null;
  let { data:profile } = await sb.from('users').select('*').eq('id', user.id).maybeSingle();
  if(!profile){
    // backfill in case trigger did not run
    const md = user.user_metadata||{};
    let school_id = null;
    if(md.school_code){
      const { data:s } = await sb.from('schools').select('id').eq('school_code',md.school_code).maybeSingle();
      school_id = s?.id||null;
    }
    await sb.from('users').insert({ id:user.id, email:user.email, full_name:md.full_name, phone:md.phone, school_id, role:md.role||'parent' });
    ({ data:profile } = await sb.from('users').select('*').eq('id',user.id).maybeSingle());
  }
  return profile;
}

async function loadTeacherAssignment(){
  state.teacherAssignment=null;
  if(state.profile?.role!=='teacher' || !state.profile?.school_id) return null;
  const {data}=await sb.from('teachers')
    .select('id,full_name,email,subjects_taught,classes_taught,streams_taught,is_class_teacher,class_teacher_grade,class_teacher_stream,system_role')
    .eq('school_id',state.profile.school_id)
    .eq('user_id',state.profile.id)
    .maybeSingle();
  state.teacherAssignment=data||null;
  return state.teacherAssignment;
}

async function boot(){
  if(location.hash.includes('type=signup')){
    await sb.auth.signOut();
    history.replaceState(null,'',window.location.href.split('#')[0]);
    viewLogin();
    setTimeout(()=>toast('Email confirmed. Please sign in with your password.'),250);
    return;
  }
  if(location.hash.includes('type=recovery') || location.hash.includes('type=invite') || location.hash==='#reset'){
    viewSetPassword(); return;
  }
  const { data:{ session } } = await sb.auth.getSession();
  if(!session){ viewLogin(); return; }
  state.session = session;
  state.profile = await loadProfile();
  if(state.profile?.school_id){
    const { data:school } = await sb.from('schools').select('*').eq('id',state.profile.school_id).maybeSingle();
    state.school = school;
  }
  await loadTeacherAssignment();
  const deviceOk = await ensureTeacherDevicePolicy();
  if(!deviceOk) return;
  state.serviceAccess = serviceAccessStatus();
  const h = location.hash.replace('#','');
  if(h && findNavItem(h)) state.route = h;
  viewShell();
  showServiceNotice(state.serviceAccess);
}

/* ============================================================================
 * OFFLINE QUEUE — save grading scores locally when offline, sync when back
 * ==========================================================================*/
const OFFLINE_KEY = 'radari_offline_queue';

function offlineEnqueue(rows){
  const q = JSON.parse(localStorage.getItem(OFFLINE_KEY)||'[]');
  q.push(...rows);
  localStorage.setItem(OFFLINE_KEY, JSON.stringify(q));
  toast('No connection. Scores saved locally and will sync when online.');
}

async function syncOfflineQueue(){
  const q = JSON.parse(localStorage.getItem(OFFLINE_KEY)||'[]');
  if(!q.length) return;
  if(!navigator.onLine) return;
  const { error } = await sb.from('assessments').upsert(q, { onConflict:'student_id,learning_area,term,year' });
  if(!error){
    localStorage.removeItem(OFFLINE_KEY);
    toast(`Synced ${q.length} offline score(s) to the server.`);
  }
}
window.addEventListener('online', syncOfflineQueue);
