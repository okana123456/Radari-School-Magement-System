<!doctype html>
<!--
================================================================================
RADARI — CBC School Management System
Single-file HTML + Supabase application for Kenyan primary & junior secondary.
================================================================================

SUPABASE SETUP — Run the following SQL ONCE in the Supabase SQL editor.
After running, go to:
  Authentication > URL Configuration  -> set Site URL to your deployed URL
                                         and add it to Redirect URLs.
  Authentication > Email Templates    -> customise the Confirm signup,
                                         Magic link, and Reset password
                                         templates to mention "Radari".

--------------------------------------------------------------------------------
-- SCHEMA
--------------------------------------------------------------------------------
-- enums
do $$ begin
  create type app_role as enum ('admin','headteacher','teacher','finance','parent');
exception when duplicate_object then null; end $$;

create table if not exists public.schools (
  id uuid primary key default gen_random_uuid(),
  name text not null,
  knec_code text unique,
  county text, sub_county text, type text,
  phone text, email text, logo_url text,
  school_code text unique not null default substr(md5(random()::text),1,8),
  created_at timestamptz default now()
);

create table if not exists public.users (
  id uuid primary key references auth.users(id) on delete cascade,
  school_id uuid references public.schools(id) on delete set null,
  full_name text, email text, phone text,
  role app_role not null default 'parent',
  created_at timestamptz default now()
);

create table if not exists public.students (
  id uuid primary key default gen_random_uuid(),
  school_id uuid references public.schools(id) on delete cascade,
  full_name text not null,
  date_of_birth date, gender text,
  admission_number text, grade text, stream text,
  photo_url text,
  parent_id uuid references public.users(id) on delete set null,
  created_at timestamptz default now()
);

create table if not exists public.student_health (
  id uuid primary key default gen_random_uuid(),
  student_id uuid references public.students(id) on delete cascade,
  condition_name text, description text,
  severity text check (severity in ('mild','moderate','severe')),
  requires_medication boolean default false,
  medication_notes text, emergency_action text, diagnosed_by text,
  created_at timestamptz default now()
);

create table if not exists public.student_attendance (
  id uuid primary key default gen_random_uuid(),
  student_id uuid references public.students(id) on delete cascade,
  school_id uuid references public.schools(id) on delete cascade,
  date date not null,
  status text check (status in ('present','absent','late','excused')),
  noted_by uuid references public.users(id),
  created_at timestamptz default now(),
  unique(student_id, date)
);

create table if not exists public.teachers (
  id uuid primary key default gen_random_uuid(),
  school_id uuid references public.schools(id) on delete cascade,
  user_id uuid references public.users(id) on delete set null,
  tsc_number text, full_name text, gender text,
  phone text, email text, date_of_birth date, date_joined date,
  qualification text, specialisation text,
  employment_status text default 'active',
  created_at timestamptz default now()
);

create table if not exists public.teacher_history (
  id uuid primary key default gen_random_uuid(),
  teacher_id uuid references public.teachers(id) on delete cascade,
  school_id uuid references public.schools(id) on delete cascade,
  event_type text, description text, event_date date,
  recorded_by uuid references public.users(id),
  created_at timestamptz default now()
);

create table if not exists public.teacher_cpd (
  id uuid primary key default gen_random_uuid(),
  teacher_id uuid references public.teachers(id) on delete cascade,
  training_name text, provider text, date_attended date, certificate_url text,
  created_at timestamptz default now()
);

create table if not exists public.cbc_strands (
  id uuid primary key default gen_random_uuid(),
  school_id uuid references public.schools(id) on delete cascade,
  grade text, subject text, strand text, sub_strand text,
  teacher_id uuid references public.teachers(id) on delete set null,
  instructor_name text,
  created_at timestamptz default now()
);

create table if not exists public.assessments (
  id uuid primary key default gen_random_uuid(),
  student_id uuid references public.students(id) on delete cascade,
  teacher_id uuid references public.teachers(id),
  strand_id uuid references public.cbc_strands(id) on delete cascade,
  term int, year int,
  score text check (score in ('EE','ME','AE','BE')),
  remarks text,
  created_at timestamptz default now()
);

create table if not exists public.fee_structures (
  id uuid primary key default gen_random_uuid(),
  school_id uuid references public.schools(id) on delete cascade,
  grade text, term int, year int, amount numeric, description text,
  created_at timestamptz default now()
);

create table if not exists public.fee_balances (
  id uuid primary key default gen_random_uuid(),
  student_id uuid references public.students(id) on delete cascade,
  school_id uuid references public.schools(id) on delete cascade,
  term int, year int,
  amount_due numeric default 0, amount_paid numeric default 0,
  balance numeric generated always as (amount_due - amount_paid) stored,
  created_at timestamptz default now()
);

create table if not exists public.mpesa_payments (
  id uuid primary key default gen_random_uuid(),
  student_id uuid references public.students(id) on delete cascade,
  school_id uuid references public.schools(id) on delete cascade,
  mpesa_ref text, amount numeric, phone_number text,
  payment_date timestamptz default now(),
  status text,
  created_at timestamptz default now()
);

create table if not exists public.timetables (
  id uuid primary key default gen_random_uuid(),
  school_id uuid references public.schools(id) on delete cascade,
  teacher_id uuid references public.teachers(id),
  grade text, stream text, subject text,
  day_of_week text, start_time time, end_time time,
  created_at timestamptz default now()
);

create table if not exists public.lesson_plans (
  id uuid primary key default gen_random_uuid(),
  teacher_id uuid references public.teachers(id) on delete cascade,
  strand_id uuid references public.cbc_strands(id),
  grade text, term int, week_number int,
  planned_topic text, delivered_topic text,
  delivery_date date,
  status text check (status in ('planned','delivered','skipped')) default 'planned',
  created_at timestamptz default now()
);

create table if not exists public.assignments (
  id uuid primary key default gen_random_uuid(),
  teacher_id uuid references public.teachers(id) on delete cascade,
  grade text, stream text, strand_id uuid references public.cbc_strands(id),
  title text, description text, due_date date,
  created_at timestamptz default now()
);

create table if not exists public.assignment_submissions (
  id uuid primary key default gen_random_uuid(),
  assignment_id uuid references public.assignments(id) on delete cascade,
  student_id uuid references public.students(id) on delete cascade,
  status text check (status in ('pending','submitted','marked')) default 'pending',
  marks_awarded text, feedback text,
  created_at timestamptz default now()
);

create table if not exists public.incidents (
  id uuid primary key default gen_random_uuid(),
  student_id uuid references public.students(id) on delete cascade,
  school_id uuid references public.schools(id) on delete cascade,
  reported_by uuid references public.users(id),
  incident_type text check (incident_type in ('discipline','counseling','commendation','medical')),
  description text, action_taken text, incident_date date,
  created_at timestamptz default now()
);

create table if not exists public.notices (
  id uuid primary key default gen_random_uuid(),
  school_id uuid references public.schools(id) on delete cascade,
  title text, body text,
  audience text check (audience in ('all','teachers','parents')) default 'all',
  posted_by uuid references public.users(id),
  created_at timestamptz default now()
);

create table if not exists public.leave_requests (
  id uuid primary key default gen_random_uuid(),
  teacher_id uuid references public.teachers(id) on delete cascade,
  school_id uuid references public.schools(id) on delete cascade,
  start_date date, end_date date, reason text,
  status text check (status in ('pending','approved','rejected')) default 'pending',
  approved_by uuid references public.users(id),
  created_at timestamptz default now()
);

create table if not exists public.substitutions (
  id uuid primary key default gen_random_uuid(),
  leave_id uuid references public.leave_requests(id) on delete cascade,
  timetable_id uuid references public.timetables(id) on delete cascade,
  substitute_teacher_id uuid references public.teachers(id),
  date date,
  created_at timestamptz default now()
);

--------------------------------------------------------------------------------
-- GRANTS (required so the Data API can reach the tables)
--------------------------------------------------------------------------------
grant usage on schema public to anon, authenticated;
grant select on public.schools to anon, authenticated;
grant all on public.users, public.students, public.student_health,
              public.student_attendance, public.teachers, public.teacher_history,
              public.teacher_cpd, public.cbc_strands, public.assessments,
              public.fee_structures, public.fee_balances, public.mpesa_payments,
              public.timetables, public.lesson_plans, public.assignments,
              public.assignment_submissions, public.incidents, public.notices,
              public.leave_requests, public.substitutions
  to authenticated;

--------------------------------------------------------------------------------
-- RLS — security definer helpers to avoid recursion
--------------------------------------------------------------------------------
create or replace function public.current_school_id() returns uuid
language sql stable security definer set search_path = public as $$
  select school_id from public.users where id = auth.uid()
$$;

create or replace function public.current_role() returns app_role
language sql stable security definer set search_path = public as $$
  select role from public.users where id = auth.uid()
$$;

create or replace function public.has_role(_role app_role) returns boolean
language sql stable security definer set search_path = public as $$
  select exists(select 1 from public.users where id = auth.uid() and role = _role)
$$;

-- Enable RLS
do $$ declare t text; begin
  for t in select unnest(array['schools','users','students','student_health','student_attendance',
    'teachers','teacher_history','teacher_cpd','cbc_strands','assessments','fee_structures',
    'fee_balances','mpesa_payments','timetables','lesson_plans','assignments',
    'assignment_submissions','incidents','notices','leave_requests','substitutions'])
  loop
    execute format('alter table public.%I enable row level security;', t);
  end loop;
end $$;

-- schools: anyone can read schools (needed for join-by-school-code at signup);
-- only admins update their own school.
drop policy if exists schools_read on public.schools;
create policy schools_read on public.schools for select to anon, authenticated using (true);
drop policy if exists schools_write on public.schools;
create policy schools_write on public.schools for all to authenticated
  using (id = public.current_school_id() and public.current_role() in ('admin','headteacher'))
  with check (id = public.current_school_id() and public.current_role() in ('admin','headteacher'));

-- users: a user can read+update their own row, and admins/headteachers see their school
drop policy if exists users_self on public.users;
create policy users_self on public.users for all to authenticated
  using (id = auth.uid() or (school_id = public.current_school_id() and public.current_role() in ('admin','headteacher')))
  with check (id = auth.uid() or (school_id = public.current_school_id() and public.current_role() in ('admin','headteacher')));

-- generic per-school policy template
do $$ declare t text; begin
  for t in select unnest(array['students','student_attendance','teachers','teacher_history',
    'teacher_cpd','cbc_strands','assessments','fee_structures','fee_balances','mpesa_payments',
    'timetables','lesson_plans','assignments','notices','leave_requests'])
  loop
    execute format('drop policy if exists %I_school on public.%I;', t, t);
    execute format($p$create policy %I_school on public.%I for all to authenticated
      using (school_id = public.current_school_id())
      with check (school_id = public.current_school_id());$p$, t, t);
  end loop;
end $$;

-- student_health: restricted to admin/headteacher/teacher of the same school
drop policy if exists health_read on public.student_health;
create policy health_read on public.student_health for all to authenticated
  using (exists(select 1 from public.students s where s.id = student_id
         and s.school_id = public.current_school_id()
         and public.current_role() in ('admin','headteacher','teacher')))
  with check (exists(select 1 from public.students s where s.id = student_id
         and s.school_id = public.current_school_id()
         and public.current_role() in ('admin','headteacher','teacher')));

-- incidents: restricted similarly
drop policy if exists incidents_rw on public.incidents;
create policy incidents_rw on public.incidents for all to authenticated
  using (school_id = public.current_school_id()
         and public.current_role() in ('admin','headteacher','teacher'))
  with check (school_id = public.current_school_id()
         and public.current_role() in ('admin','headteacher','teacher'));

-- assignment_submissions: per-school via assignment
drop policy if exists subs_rw on public.assignment_submissions;
create policy subs_rw on public.assignment_submissions for all to authenticated
  using (exists(select 1 from public.assignments a where a.id = assignment_id
         and exists(select 1 from public.teachers t where t.id = a.teacher_id
                    and t.school_id = public.current_school_id())))
  with check (true);

-- substitutions
drop policy if exists subs2_rw on public.substitutions;
create policy subs2_rw on public.substitutions for all to authenticated
  using (exists(select 1 from public.leave_requests l where l.id = leave_id
         and l.school_id = public.current_school_id()))
  with check (true);

-- auto-create a users row when a new auth user signs up (links to school via metadata)
create or replace function public.handle_new_user() returns trigger
language plpgsql security definer set search_path = public as $$
declare _school uuid; _role app_role;
begin
  select id into _school from public.schools where school_code = new.raw_user_meta_data->>'school_code';
  _role := coalesce((new.raw_user_meta_data->>'role')::app_role, 'parent');
  insert into public.users (id, school_id, full_name, email, phone, role)
  values (new.id, _school, new.raw_user_meta_data->>'full_name', new.email,
          new.raw_user_meta_data->>'phone', _role);
  return new;
end $$;

drop trigger if exists on_auth_user_created on auth.users;
create trigger on_auth_user_created after insert on auth.users
for each row execute procedure public.handle_new_user();

-- Seed a demo school so the very first signup has a school_code to use.
insert into public.schools (name, county, sub_county, type, school_code)
values ('Radari Demo Primary', 'Nairobi', 'Westlands', 'Primary', 'RADARI01')
on conflict (school_code) do nothing;

<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Radari — CBC School Management</title>
  <meta name="application-name" content="Radari" />
  <meta name="apple-mobile-web-app-title" content="Radari" />
  <meta name="theme-color" content="#1f4434" />
  <meta name="msapplication-TileColor" content="#1f4434" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="icon" type="image/svg+xml" href="/assets/radari-icon.svg" />
  <link rel="icon" type="image/png" sizes="192x192" href="/assets/radari-icon-192.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="/assets/apple-touch-icon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Fraunces:wght@500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.7.0/dist/tabler-icons.min.css" />
  <style>
    :root{
      --green:#1f4434;          /* deep forest green */
      --green-700:#16382a;
      --green-50:#eaf1ec;
      --bg:#f7f4ee;             /* warm off-white */
      --surface:#ffffff;
      --stone:#e7e2d6;
      --stone-2:#d8d2c2;
      --ink:#1c1d1a;
      --ink-2:#4a4a44;
      --muted:#8a877d;
      --amber:#b9802a;
      --amber-bg:#f6e9c8;
      --terracotta:#a4452e;
      --terracotta-bg:#f4d7cc;
      --shadow:0 1px 2px rgba(28,29,26,.04), 0 8px 28px -16px rgba(28,29,26,.18);
      --radius:6px;
    }
    *{box-sizing:border-box}
    html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);
      font-family:'Inter',system-ui,-apple-system,sans-serif;font-size:15px;line-height:1.55;-webkit-font-smoothing:antialiased}
    h1,h2,h3,h4{font-family:'Fraunces',Georgia,serif;font-weight:500;letter-spacing:-.01em;margin:0 0 .4em}
    h1{font-size:1.8rem;line-height:1.15}
    h2{font-size:1.35rem}
    h3{font-size:1.05rem;font-family:'Inter',sans-serif;font-weight:600}
    a{color:var(--green);text-decoration:none}
    a:hover{text-decoration:underline}
    .muted{color:var(--muted)}
    .small{font-size:.85rem}
    .row{display:flex;gap:1rem;flex-wrap:wrap}
    .col{flex:1;min-width:200px}
    .stack > * + *{margin-top:.75rem}

    /* progress bar */
    #progress{position:fixed;top:0;left:0;height:3px;width:0;background:var(--green);z-index:1000;transition:width .25s ease}

    /* AUTH */
    .auth{min-height:100vh;display:grid;grid-template-columns:1fr 1fr}
    @media(max-width:860px){.auth{grid-template-columns:1fr}}
    .auth-brand{background:var(--green);color:#f1ece0;padding:3rem;display:flex;flex-direction:column;justify-content:space-between;position:relative;overflow:hidden}
    .auth-brand::before{content:"";position:absolute;inset:0;background-image:
      radial-gradient(circle at 20% 30%,rgba(255,255,255,.05) 0,transparent 35%),
      radial-gradient(circle at 80% 80%,rgba(255,255,255,.04) 0,transparent 30%),
      repeating-linear-gradient(135deg,rgba(255,255,255,.025) 0 2px,transparent 2px 28px);
      pointer-events:none}
    .auth-brand>*{position:relative}
    .auth-brand h1{font-size:2.4rem;color:#fbf7ec}
    .auth-brand .tag{opacity:.8;max-width:380px}
    .brand-mark{font-family:'Fraunces',serif;font-size:1.6rem;letter-spacing:.02em}
    @media(max-width:860px){.auth-brand{display:none}}
    .auth-form{background:var(--bg);padding:2rem 1.25rem;display:flex;flex-direction:column;justify-content:center;align-items:center}
    .auth-form .inner{width:100%;max-width:380px}
    .auth-form .mobile-brand{display:none;text-align:center;margin-bottom:2rem}
    @media(max-width:860px){.auth-form .mobile-brand{display:block}}

    label{display:block;font-size:.85rem;color:var(--ink-2);margin-bottom:.3rem}
    input,select,textarea{
      width:100%;padding:.75rem .85rem;border:1px solid var(--stone-2);
      background:#fff;border-radius:var(--radius);font:inherit;color:var(--ink);
      transition:border-color .15s,box-shadow .15s;-webkit-appearance:none;appearance:none
    }
    input:focus,select:focus,textarea:focus{outline:none;border-color:var(--green);box-shadow:0 0 0 3px rgba(31,68,52,.15)}
    .field{margin-bottom:1rem}
    .field .err{color:var(--terracotta);font-size:.8rem;margin-top:.3rem;display:block}
    .btn{display:inline-flex;align-items:center;justify-content:center;gap:.4rem;
      padding:0 1.1rem;height:44px;border-radius:var(--radius);font:inherit;font-size:.9rem;font-weight:500;cursor:pointer;
      border:1px solid transparent;background:transparent;color:var(--ink);
      transition:background .15s,border-color .15s;white-space:nowrap;flex-shrink:0}
    .btn.primary{background:var(--green);color:#fff;border-color:var(--green)}
    .btn.primary:hover{background:var(--green-700)}
    .btn.primary[disabled]{opacity:.7;cursor:wait}
    .btn.secondary{border-color:var(--green);color:var(--green);background:transparent}
    .btn.secondary:hover{background:var(--green-50)}
    .btn.danger{background:var(--terracotta);color:#fff;border-color:var(--terracotta)}
    .btn.block{width:100%;height:48px}
    .divider{display:flex;align-items:center;gap:.75rem;color:var(--muted);font-size:.8rem;margin:1.25rem 0}
    .divider::before,.divider::after{content:"";flex:1;height:1px;background:var(--stone-2)}
    .pwd-check{font-size:.78rem;color:var(--muted);margin-top:.4rem}
    .pwd-check span{display:inline-flex;align-items:center;gap:.25rem;margin-right:.85rem}
    .pwd-check span.ok{color:var(--green)}
    .form-link{font-size:.82rem;text-align:right;display:block;margin-top:-.4rem;margin-bottom:1rem}

    /* APP SHELL */
    .shell{display:flex;min-height:100vh;align-items:stretch}

    /* SIDEBAR */
    .sidebar{
      width:232px;flex-shrink:0;
      background:var(--surface);border-right:1px solid var(--stone);
      display:flex;flex-direction:column;
      position:sticky;top:0;height:100vh;overflow-y:auto;
    }
    .sidebar-inner{padding:1.25rem .75rem;display:flex;flex-direction:column;gap:.5rem;flex:1}
    .sidebar .brand{font-family:'Fraunces',serif;font-size:1.25rem;color:var(--green);padding:0 .5rem;margin-bottom:.15rem;line-height:1.2}
    .sidebar .school-name{font-size:.75rem;color:var(--muted);padding:0 .5rem;margin-top:-.15rem;margin-bottom:.4rem;font-weight:400}

    .nav-group{margin-bottom:.35rem}
    .nav-group-label{font-size:.66rem;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);padding:.2rem .75rem;margin-bottom:.1rem;font-weight:600}
    .nav{display:flex;flex-direction:column;gap:.02rem}
    .nav a{
      display:flex;align-items:center;gap:.5rem;
      padding:.48rem .75rem;border-radius:var(--radius);
      color:var(--ink-2);font-size:.85rem;line-height:1.3;
      transition:background .12s,color .12s;
    }
    .nav a:hover{background:var(--green-50);color:var(--green);text-decoration:none}
    .nav a.active{background:var(--green-50);color:var(--green);font-weight:500}
    .nav a .ti{font-size:.95rem;opacity:.75;flex-shrink:0}
    .nav a.active .ti{opacity:1}
    .sidebar .footer{padding:.85rem;border-top:1px solid var(--stone);font-size:.75rem;color:var(--muted)}
    .sidebar .footer strong{display:block;color:var(--ink);font-size:.8rem;margin-bottom:.1rem}

    /* TOPBAR — mobile only */
    .topbar{
      display:none;padding:.6rem 1rem;
      background:var(--surface);border-bottom:1px solid var(--stone);
      align-items:center;gap:.75rem;
      position:sticky;top:0;z-index:50;
    }
    .topbar .menu{background:none;border:none;padding:.25rem;color:var(--ink);cursor:pointer;font-size:1.3rem;line-height:1;display:flex;align-items:center}
    .topbar .school{font-weight:600;font-size:.9rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .topbar .mod{margin-left:auto;color:var(--muted);font-size:.78rem;white-space:nowrap}

    @media(max-width:860px){
      .shell{flex-direction:column}
      .topbar{display:flex}
      .sidebar{
        position:fixed;left:0;top:0;bottom:0;height:100vh;
        width:260px;transform:translateX(-100%);
        transition:transform .22s cubic-bezier(.4,0,.2,1);z-index:60;
      }
      .sidebar.open{transform:translateX(0);box-shadow:4px 0 24px rgba(28,29,26,.12)}
      .scrim{display:none;position:fixed;inset:0;background:rgba(28,29,26,.35);z-index:55}
      .scrim.show{display:block}
    }

    /* MAIN CONTENT */
    .content-wrap{flex:1;min-width:0;display:flex;flex-direction:column}
    main{flex:1;padding:1.5rem 1.75rem;max-width:1080px;width:100%}
    @media(max-width:860px){main{padding:.9rem .9rem 4rem}}

const progress = {

  done(){ clearInterval(this._t); const b=$('#progress'); b.style.width='100%'; setTimeout(()=>b.style.width='0',300); }
};
const toast = (msg, isErr=false) => {
  const t=$('#toast'); t.textContent=msg; t.classList.toggle('error',isErr); t.classList.add('show');
  clearTimeout(toast._t); toast._t=setTimeout(()=>t.classList.remove('show'),3000);
};

// Signed URL helper — always use this for downloading from school-files storage
// bucket is private so direct public URLs won't work after security hardening
// Usage: await getSignedUrl(fileUrl, expiresInSeconds)
async function getSignedUrl(fileUrl, expiresIn=300){
  if(!fileUrl) return null;
  try {
    // Extract the storage path from the full URL
    const url=new URL(fileUrl);
    const parts=url.pathname.split('/storage/v1/object/public/school-files/');
    const path=parts[1]||url.pathname.split('/school-files/')[1];
    if(!path) return fileUrl; // fallback to original if path extraction fails
    const {data,error}=await sb.storage.from('school-files').createSignedUrl(path, expiresIn);
    return error ? fileUrl : data?.signedUrl||fileUrl;
  } catch { return fileUrl; }
}

function buildStrandPicker(container, strands, selectedId, onChange){
  let current = strands.find(s=>s.id===selectedId)||null;
  const label = s=>s?`${s.grade||''} — ${s.subject} — ${s.strand}${s.sub_strand?' / '+s.sub_strand:''}`:'' ;

  container.innerHTML=`<div class="strand-picker">
    <input type="text" class="sp-input" autocomplete="off" placeholder="Type to search strand..." value="${current?esc(label(current)):''}">
    <input type="hidden" class="sp-val" value="${current?current.id:''}">
    <div class="strand-dropdown sp-drop"></div>
  </div>`;

  const inp=container.querySelector('.sp-input');
  const hid=container.querySelector('.sp-val');
  const drop=container.querySelector('.sp-drop');

  function renderDrop(q){
    const filtered=(q||'').trim()
      ? strands.filter(s=>label(s).toLowerCase().includes(q.toLowerCase()))
      : strands;
    drop.innerHTML=filtered.length
      ? filtered.map(s=>`<div class="strand-opt${current&&s.id===current.id?' selected':''}" data-id="${s.id}">
          <div>${esc(s.subject)} &mdash; ${esc(s.strand)}</div>
          <div class="strand-sub">${esc(s.grade||'')}${s.sub_strand?' &middot; '+esc(s.sub_strand):''}</div>
        </div>`).join('')
      : `<div class="strand-opt" style="color:var(--muted)">No strands match</div>`;
    drop.classList.add('open');
    drop.querySelectorAll('.strand-opt[data-id]').forEach(opt=>opt.onclick=()=>{
      current=strands.find(s=>s.id===opt.dataset.id)||null;
      inp.value=label(current);
      hid.value=current?.id||'';
      drop.classList.remove('open');
      if(onChange) onChange(current);
    });
  }
  inp.onfocus=()=>renderDrop(inp.value);
  inp.oninput=()=>renderDrop(inp.value);
  inp.onblur=()=>setTimeout(()=>drop.classList.remove('open'),200);
  container.getValue=()=>hid.value;
  container.setValue=(id)=>{ current=strands.find(s=>s.id===id)||null; inp.value=label(current); hid.value=current?.id||''; };
}

    const { error } = await sb.auth.updateUser({ password:f.get('password') });

async function ensurePasswordResetSession(){
  const rawHash = window.location.hash.startsWith('#') ? window.location.hash.slice(1) : window.location.hash;
  const params = new URLSearchParams(rawHash);
  const access_token = params.get('access_token');
  const refresh_token = params.get('refresh_token');
  if(access_token && refresh_token){
    const { error } = await sb.auth.setSession({ access_token, refresh_token });
    if(error) return error;
    history.replaceState(null,'',window.location.href.split('#')[0] + '#reset');
  }
  const { data:{ session } } = await sb.auth.getSession();
  return session ? null : new Error('This password reset link has expired. Please request a fresh reset link.');
}

function isIndividualTeacherWorkspace(){
  return String(state.school?.type||'').toLowerCase().includes('individual');

}

  return String(state.profile?.role||'').toLowerCase()==='finance';
}

const SUPPORT_PHONE = '0708095461';

function splitList(value){
  return String(value||'').split(',').map(x=>x.trim()).filter(Boolean);
}
function teacherAssignment(){
  return state.teacherAssignment || {};
}
function isSchoolTeacher(){
  return state.profile?.role==='teacher' && !isIndividualTeacherWorkspace();
}
function assignedTeacherGrades(){
  const t=teacherAssignment();
  const grades=[...splitList(t.classes_taught)];
  if(t.is_class_teacher && t.class_teacher_grade) grades.push(t.class_teacher_grade);
  return sortGrades([...new Set(grades)]);
}
function assignedTeacherStreams(){
  const t=teacherAssignment();
  const streams=[...splitList(t.streams_taught)];
  if(t.is_class_teacher && t.class_teacher_stream) streams.push(t.class_teacher_stream);
  return [...new Set(streams.map(s=>s.trim()).filter(Boolean))];
}
function isClassTeacher(){
  return !!teacherAssignment().is_class_teacher;
}
function teacherCanSeeStudent(s){
  if(!isSchoolTeacher()) return true;
  const grades=assignedTeacherGrades();
  const streams=assignedTeacherStreams();
  if(!grades.length) return false;
  if(!grades.includes(s.grade)) return false;
  if(streams.length && s.stream && !streams.some(st=>st.toLowerCase()===String(s.stream).toLowerCase())) return false;
  return true;
}
function filterStudentsForTeacher(students=[]){
  return isSchoolTeacher() ? students.filter(teacherCanSeeStudent) : students;
}
function teacherAccessNotice(){
  if(!isSchoolTeacher()) return '';
  const grades=assignedTeacherGrades();
  const streams=assignedTeacherStreams();
  if(!grades.length){
    return `<div class="card" style="border-color:var(--amber);margin-bottom:1rem"><b>No teaching assignment yet</b><p class="muted small">Ask the school admin to assign your classes and subjects under Staff Management.</p></div>`;
  }
  return `<div class="card" style="border-color:var(--green);margin-bottom:1rem"><b>Your assigned learners</b><p class="muted small">Showing ${esc(grades.join(', '))}${streams.length?' - streams '+esc(streams.join(', ')):''}. ${isClassTeacher()?'Class teacher tools are enabled.':'Report cards are hidden because you are not marked as a class teacher.'}</p></div>`;
}

      + '</nav></div>';

function navigate(route){
  state.route = route;
  location.hash = route;
  $$('.nav a').forEach(a=>a.classList.toggle('active', a.dataset.route===route));
  $('#sidebar')?.classList.remove('open'); $('#scrim')?.classList.remove('show');
  render();
}

function findNavItem(id){
  if(id==='subscription' && state.profile?.role==='teacher') return { id:'subscription', label:'Subscription', icon:'ti-credit-card', roles:['teacher'] };
  if(id==='owner' && isPlatformOwner()) return { id:'owner', label:'Subscriptions', icon:'ti-adjustments-dollar', roles:[state.profile?.role||'admin'] };
  const role=state.profile?.role;
  for(const g of NAV_GROUPS){
    const exact=g.items.find(n=>n.id===id && (!role || n.roles.includes(role)));
    if(exact) return exact;
  }
  for(const g of NAV_GROUPS){ const f=g.items.find(n=>n.id===id); if(f) return f; }
  return null;
}

function canAccessRoute(route){
  if(!state.profile) return false;
  if(isPlatformOwner()) return ['owner','settings','dashboard'].includes(route);
  if(isIndividualTeacher()) return ['dashboard','students','subjects','attendance','grading','analytics','reports','subscription','settings'].includes(route);
  if(isSchoolTeacher()){
    const allowed=['dashboard','students','attendance','grading','lessons','assignments','leave','settings'];
    if(isClassTeacher()) allowed.push('reports');
    return allowed.includes(route);
  }
  if(isFinanceRole()) return ['dashboard','fees','settings'].includes(route);
  const item=findNavItem(route);
  return !!item && item.roles.includes(state.profile.role);
}

async function render(){
  const main = $('#main'); if(!main) return;
  if(!canAccessRoute(state.route)){
    state.route='dashboard';
    if(location.hash.replace('#','')!=='dashboard') location.hash='dashboard';
  }
  const mod = findNavItem(state.route);
  if($('#modName')) $('#modName').textContent = mod?.label||'';
  main.innerHTML = `<div class="muted" style="padding:1rem">Loading\u2026</div>`;
  progress.start();
  try { await (modules[state.route]||modules.dashboard)(main); }
  catch(e){ console.error(e); main.innerHTML = `<div class="card"><h3>Something went wrong</h3><p class="muted small">${esc(e.message||e)}</p></div>`; }
  progress.done();
}

function teacherQuickClassKey(){

function getTeacherQuickClass(students=[]){
  try{
    const saved=JSON.parse(localStorage.getItem(teacherQuickClassKey())||'{}');
    if(saved.grade || saved.stream) return { grade:saved.grade||'', stream:saved.stream||'' };
  }catch(e){}
  const first=(students||[]).find(s=>s.grade || s.stream) || {};
  return { grade:first.grade||'', stream:first.stream||'' };
}
function setTeacherQuickClass(grade='', stream=''){
  const value={ grade:String(grade||'').trim(), stream:String(stream||'').trim() };
  localStorage.setItem(teacherQuickClassKey(), JSON.stringify(value));
  return value;
}

function normalizeHeader(h){
  return (h||'').toString().trim().toLowerCase().replace(/[^a-z0-9]+/g,'_').replace(/^_|_$/g,'');
}
function pick(row, names){
  for(const name of names){
    const v=row[name];
    if(v!==undefined && v!==null && String(v).trim()!=='') return String(v).trim();
  }
  return '';
}
function excelDateToISO(value){
  if(!value) return '';
  if(value instanceof Date && !isNaN(value)) return value.toISOString().slice(0,10);
  if(typeof value==='number' && window.XLSX){
    const d=XLSX.SSF.parse_date_code(value);
    if(d) return `${d.y}-${String(d.m).padStart(2,'0')}-${String(d.d).padStart(2,'0')}`;
  }
  const s=String(value).trim();
  const d=new Date(s);
  return isNaN(d) ? s : d.toISOString().slice(0,10);
}
function parseCsv(text){
  const rows=[]; let row=[], cur='', quoted=false;
  for(let i=0;i<text.length;i++){
    const ch=text[i], next=text[i+1];
    if(ch==='"' && quoted && next==='"'){ cur+='"'; i++; continue; }
    if(ch==='"'){ quoted=!quoted; continue; }
    if(ch===',' && !quoted){ row.push(cur); cur=''; continue; }
    if((ch==='\n'||ch==='\r') && !quoted){
      if(ch==='\r' && next==='\n') i++;
      row.push(cur); cur='';
      if(row.some(v=>String(v).trim()!=='')) rows.push(row);
      row=[]; continue;
    }
    cur+=ch;
  }
  row.push(cur);
  if(row.some(v=>String(v).trim()!=='')) rows.push(row);
  return rows;
}
async function readStudentImportRows(file){
  const ext=(file.name.split('.').pop()||'').toLowerCase();
  let rows=[];
  if(['xlsx','xls'].includes(ext)){
    if(!window.XLSX) throw new Error('Excel reader is still loading. Refresh and try again.');
    const buf=await file.arrayBuffer();
    const wb=XLSX.read(buf,{type:'array',cellDates:true});
    const ws=wb.Sheets[wb.SheetNames[0]];
    rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
  } else {
    rows=parseCsv(await file.text());
  }
  const headers=(rows.shift()||[]).map(normalizeHeader);
  return rows.map(r=>{
    const obj={};
    headers.forEach((h,i)=>obj[h]=r[i]);
    return obj;
  });
}
async function importStudentsFile(file, schoolId, existingStudents=[]){
  try{
    const rawRows=await readStudentImportRows(file);
    const existingAdm=new Set((existingStudents||[]).map(s=>(s.admission_number||'').trim().toLowerCase()).filter(Boolean));
    const rows=rawRows.map(r=>({
      school_id:schoolId,
      admission_number:pick(r,['admission_no','admission_number','adm','adm_no','adm_number']),
      full_name:pick(r,['full_name','name','learner_name','student_name','pupil_name']),
      grade:pick(r,['grade','class']),
      stream:pick(r,['stream','class_stream']),
      gender:pick(r,['gender','sex']),
      date_of_birth:excelDateToISO(r.date_of_birth||r.dob||r.birth_date),
      contact_phone:pick(r,['parent_phone','guardian_phone','contact_phone','phone']),
      contact_email:pick(r,['parent_email','guardian_email','contact_email','email']),
      home_county:pick(r,['home_county','county']),
    })).filter(r=>r.full_name);
    const newRows=rows.filter(r=>!r.admission_number || !existingAdm.has(r.admission_number.toLowerCase()));
    if(!newRows.length){ toast('No new learners found. Existing admission numbers were skipped.',true); return; }
    newRows.forEach(r=>Object.keys(r).forEach(k=>{ if(r[k]==='') delete r[k]; }));
    const {error}=await sb.from('students').insert(newRows);
    if(error){ toast('Import failed: '+error.message,true); return; }
    toast(`Imported ${newRows.length} learner${newRows.length!==1?'s':''}. You can edit details anytime.`);
  }catch(err){
    toast(err.message||String(err),true);
  }
}

async function showAttendanceHistory(student, from, to){
  if(!student) return;

    .lte('date',to)

/* --- CBC GRADING ENGINE --- */

// Official KICD dual-band rubric (matches official "School Term Summative Report" form)
// EE1=8 (90-99%), EE2=7 (75-89%), ME1=6 (58-74%), ME2=5 (41-57%),
// AE1=4 (31-40%), AE2=3 (21-30%), BE1=2 (11-20%), BE2=1 (1-10%)
const RUBRIC_BANDS = [
  {code:'EE1',band:'EE',points:8,min:90,max:99, color:'var(--green)'},
  {code:'EE2',band:'EE',points:7,min:75,max:89, color:'var(--green)'},
  {code:'ME1',band:'ME',points:6,min:58,max:74, color:'#2d6a4f'},
  {code:'ME2',band:'ME',points:5,min:41,max:57, color:'#2d6a4f'},
  {code:'AE1',band:'AE',points:4,min:31,max:40, color:'#b45309'},
  {code:'AE2',band:'AE',points:3,min:21,max:30, color:'#b45309'},
  {code:'BE1',band:'BE',points:2,min:11,max:20, color:'var(--terracotta)'},
  {code:'BE2',band:'BE',points:1,min:1, max:10, color:'var(--terracotta)'},
];
function pctToLevel(pct){
  const p=+pct;
  if(isNaN(p)||p<0||p>100) return null;
  if(p>=100) return {...RUBRIC_BANDS[0]};
  for(const b of RUBRIC_BANDS){ if(p>=b.min&&p<=b.max) return {...b, code:b.band, label:bandLabel(b.band)}; }
  return {...RUBRIC_BANDS[RUBRIC_BANDS.length-1], code:'BE', label:'Below Expectations'};
}
function pctToRubricCode(pct){
  const p=+pct;
  if(isNaN(p)||p<0) return null;
  if(p>=100) return RUBRIC_BANDS[0].code;
  for(const b of RUBRIC_BANDS){ if(p>=b.min&&p<=b.max) return b.code; }
  return 'BE2';
}
function bandLabel(band){ return {EE:'Exceeding Expectations',ME:'Meeting Expectations',AE:'Approaching Expectations',BE:'Below Expectations'}[band]||band; }
function levelColor(code){
  const band=(code||'').slice(0,2);
  return band==='EE'?'var(--green)':band==='ME'?'#2d6a4f':band==='AE'?'#b45309':'var(--terracotta)';
}
function isJuniorSecondary(grade){ return ['Grade 7','Grade 8','Grade 9'].includes(grade); }
function isLowerPrimary(grade){ return ['PP1','PP2','Grade 1','Grade 2','Grade 3'].includes(grade); }

// Official CBC Learning Areas per tier
const CBC_LEARNING_AREAS = {
  'PP1':    ['Language Activities','Mathematical Activities','Environmental Activities','Psychomotor and Creative Activities','Religious Education Activities'],
  'PP2':    ['Language Activities','Mathematical Activities','Environmental Activities','Psychomotor and Creative Activities','Religious Education Activities'],
  'Grade 1':['Indigenous Language / Literacy','English Language Activities','Kiswahili Language Activities','Mathematical Activities','Environmental Activities','Creative Activities','Religious Education'],
  'Grade 2':['Indigenous Language / Literacy','English Language Activities','Kiswahili Language Activities','Mathematical Activities','Environmental Activities','Creative Activities','Religious Education'],
  'Grade 3':['Indigenous Language / Literacy','English Language Activities','Kiswahili Language Activities','Mathematical Activities','Environmental Activities','Creative Activities','Religious Education'],
  'Grade 4':['English','Kiswahili / KSL','Mathematics','Science and Technology','Agriculture and Nutrition','Social Studies','Creative Arts and Sports','Religious Education'],
  'Grade 5':['English','Kiswahili / KSL','Mathematics','Science and Technology','Agriculture and Nutrition','Social Studies','Creative Arts and Sports','Religious Education'],
  'Grade 6':['English','Kiswahili / KSL','Mathematics','Science and Technology','Agriculture and Nutrition','Social Studies','Creative Arts and Sports','Religious Education'],
  'Grade 7':['English','Kiswahili / KSL','Mathematics','Integrated Science','Pre-Technical Studies','Agriculture and Nutrition','Social Studies','Creative Arts and Sports','Religious Education'],
  'Grade 8':['English','Kiswahili / KSL','Mathematics','Integrated Science','Pre-Technical Studies','Agriculture and Nutrition','Social Studies','Creative Arts and Sports','Religious Education'],
  'Grade 9':['English','Kiswahili / KSL','Mathematics','Integrated Science','Pre-Technical Studies','Agriculture and Nutrition','Social Studies','Creative Arts and Sports','Religious Education'],
};

const DEFAULT_GRADES = ['PP1','PP2','Grade 1','Grade 2','Grade 3','Grade 4','Grade 5','Grade 6','Grade 7','Grade 8','Grade 9'];
function gradeSortValue(grade){
  const g=(grade||'').trim();
  if(g==='PP1') return 1;
  if(g==='PP2') return 2;
  const m=g.match(/Grade\s+(\d+)/i);
  return m ? 10 + Number(m[1]) : 999;
}
function sortGrades(grades){
  return [...new Set((grades||[]).filter(Boolean))].sort((a,b)=>gradeSortValue(a)-gradeSortValue(b)||a.localeCompare(b));
}
function schoolGradeList(students=[], strands=[]){
  return sortGrades([...DEFAULT_GRADES, ...students.map(s=>s.grade), ...strands.map(s=>s.grade)]);
}
function gradeSubjectRows(grade, strands=[]){
  const custom=(strands||[])
    .filter(s=>!grade || s.grade===grade)
    .filter(s=>s.subject)
    .map(s=>({
      id:s.id,
      subject:s.subject,
      strand:s.strand||'General',
      sub_strand:s.sub_strand||'School configured',
      teacher_id:s.teacher_id||'',
      instructor_name:s.instructor_name||'',
      custom:true,
    }));
  if(custom.length) return custom;
  return (CBC_LEARNING_AREAS[grade]||[]).map(subject=>({
    id:`default:${subject}`,
    subject,
    strand:'General',
    sub_strand:'CBC default',
    teacher_id:'',
    instructor_name:'',
    custom:false,
  }));
}
function schoolLearningAreas(grade, strands=[]){
  return [...new Set(gradeSubjectRows(grade, strands).map(s=>s.subject).filter(Boolean))];
}
function subjectInstructorMap(grade, strands=[]){
  return Object.fromEntries(gradeSubjectRows(grade, strands)
    .filter(s=>s.instructor_name)
    .map(s=>[s.subject, s.instructor_name]));
}
function remarkVariant(seed, choices){
  const text=String(seed||'');
  const n=[...text].reduce((a,ch)=>a+ch.charCodeAt(0),0);
  return choices[n % choices.length];
}
function autoLearningAreaRemark(area, avg){
  if(avg==null) return '';
  const a=area||'this learning area';
  if(avg>=75) return remarkVariant(a+avg,[`Shows strong mastery in ${a} and can handle more challenging tasks.`,`Excellent progress in ${a}. Keep encouraging deeper practice and confidence.`,`Very good achievement in ${a}; the learner should maintain the same focus.`]);
  if(avg>=58) return remarkVariant(a+avg,[`Good progress in ${a}. More regular practice will strengthen mastery.`,`The learner is performing well in ${a} and should keep practising consistently.`,`Shows sound understanding in ${a}; a little more revision will improve confidence.`]);
  if(avg>=41) return remarkVariant(a+avg,[`Fair progress in ${a}. Guided practice and correction of mistakes are needed.`,`The learner is developing in ${a} but needs closer follow-up.`,`Some concepts in ${a} need reinforcement through regular revision.`]);
  if(avg>=21) return remarkVariant(a+avg,[`Approaching expectations in ${a}. Extra support and short daily practice are recommended.`,`The learner needs more confidence and teacher guidance in ${a}.`,`More remedial work is required in ${a} to build the basics.`]);
  return remarkVariant(a+avg,[`Needs targeted support in ${a}. Plan remedial activities and monitor closely.`,`Serious support is required in ${a}; involve the parent and class teacher.`,`The learner is struggling in ${a} and needs step-by-step reinforcement.`]);
}
function autoOverallComment(avg, learnerName='The learner'){
  const name=(learnerName||'The learner').split(' ')[0]||'The learner';
  if(avg==null) return 'Assessment records are incomplete. Please update the learner scores before issuing this report.';
  if(avg>=75) return remarkVariant(name+avg,[`${name} has performed very well and should keep up the discipline and confidence.`,`${name} shows excellent effort across the learning areas. Keep supporting this progress.`,`${name} has strong learning habits and should continue aiming higher.`]);
  if(avg>=58) return remarkVariant(name+avg,[`${name} is making good progress and should continue practising consistently.`,`${name} has worked well this term. More revision will improve the next results.`,`${name} is steadily improving and should maintain regular study habits.`]);
  if(avg>=41) return remarkVariant(name+avg,[`${name} has made fair progress but needs more support in weaker areas.`,`${name} can improve further with closer supervision and regular practice.`,`${name} needs to revise more consistently and seek help when work is difficult.`]);
  if(avg>=21) return remarkVariant(name+avg,[`${name} requires regular guidance and remedial practice to improve.`,`${name} is improving gradually but needs more support from both teacher and parent.`,`${name} should be supported with simple daily practice and close follow-up.`]);
  return remarkVariant(name+avg,[`${name} needs urgent academic support and close monitoring.`,`${name} should receive immediate remedial work and parent follow-up.`,`${name} is below the expected level and needs a clear support plan.`]);
}
function autoHoiComment(avg){
  if(avg==null) return 'Report reviewed. Complete assessment data is required for final issuance.';
  if(avg>=75) return remarkVariant(avg,['Excellent work. Maintain discipline, confidence and consistency.','A strong result. Keep working hard and supporting others positively.','Very good performance. Continue with the same commitment.']);
  if(avg>=58) return remarkVariant(avg,['Good effort. Maintain the positive attitude and keep improving steadily.','A good report. More revision will lead to even better achievement.','Well tried. Continue working closely with your teachers.']);
  if(avg>=41) return remarkVariant(avg,['Fair effort. More commitment and guided practice will improve the next results.','Improvement is possible with better preparation and regular revision.','The learner should make better use of teacher support and study time.']);
  if(avg>=21) return remarkVariant(avg,['More support is needed. The school will work with the learner and parent to improve outcomes.','The learner needs close follow-up and a consistent remedial plan.','Regular support at school and home is recommended.']);
  return remarkVariant(avg,['Immediate intervention is recommended. Parent, class teacher and school leadership should follow up closely.','A support meeting is recommended to agree on remedial action.','The learner requires urgent support and close monitoring.']);
}

const CORE_COMPETENCIES = [
  'Communication and Collaboration',
  'Critical Thinking and Problem Solving',
  'Creativity and Imagination',

  'Digital Literacy',
  'Learning to Learn',
  'Self-Efficacy',
];

// CBC Values
const CBC_VALUES = [
  'Love','Responsibility','Respect','Unity','Peace','Patriotism','Social Justice','Integrity',
];

// Official report form structure: First Test, Second Test, Third Test per learning area.
// Average Score row = simple average of the three test percentages.
// (The official paper form has no differential weighting between tests — all three
// contribute equally to the Average Score shown at the bottom of each learning area row.)
function averageScore(scores){
  if(!scores) return null;
  const {test1,test2,test3} = scores;
  const parts=[test1,test2,test3].filter(v=>v!==''&&v!=null&&!isNaN(+v)).map(v=>+v);
  if(!parts.length) return null;
  return Math.round((parts.reduce((a,b)=>a+b,0)/parts.length)*10)/10;
}

/* --- GRADING HELPERS --- */
function gradingOutOfKey(grade, testNum){
  const schoolId = state.profile?.school_id || 'school';
  return `radari_grading_outof_${schoolId}_${grade || 'grade'}_${testNum || 1}`;
}

function getGradingOutOf(grade, testNum, displayAreas){
  let saved = {};
  try{ saved = JSON.parse(localStorage.getItem(gradingOutOfKey(grade, testNum)) || '{}'); }catch(_){ saved = {}; }
  const out = {};
  displayAreas.forEach(la=>{
    const n = Number(saved[la] || 100);
    out[la] = n > 0 ? n : 100;
  });
  return out;
}

function saveGradingOutOf(grade, testNum, outOfMap){
  localStorage.setItem(gradingOutOfKey(grade, testNum), JSON.stringify(outOfMap || {}));
}

function pctFromRawMark(raw, outOf){
  const mark = Number(raw);
  const max = Number(outOf || 100);
  if(isNaN(mark) || isNaN(max) || max <= 0) return null;
  return Math.round((mark / max * 100) * 10) / 10;
}

function rawMarkFromPct(pct, outOf){
  const p = Number(pct);
  const max = Number(outOf || 100);
  if(isNaN(p) || isNaN(max) || max <= 0) return '';
  return Math.round((p * max / 100) * 10) / 10;
}

function renderGradeRows(students, displayAreas, amap, testCol, testNum, outOfMap={}){
  return students.map((stu,si)=>`
    <tr data-sid="${stu.id}">
      <td>
        <div class="grading-learner">
          <div class="grading-learner-name">${esc(stu.full_name)}</div>
          <div class="grading-learner-meta">${esc(stu.admission_number||'')}</div>
        </div>
      </td>
      ${displayAreas.map(la=>{
        const ex=amap[stu.id]?.[la];
        const val=ex?.[testCol]??'';
        const max=Number(outOfMap[la]||100);
        const rawVal=val!==''&&val!=null?rawMarkFromPct(val,max):'';
        const rc=val!==''&&val!=null?pctToRubricCode(+val):null;
        const pts=rc?RUBRIC_BANDS.find(b=>b.code===rc)?.points||'':'';
        return `<td class="grading-mark-cell">
          <input type="number" min="0" max="${max}" step="0.1"
            class="pct-inp" data-la="${esc(la)}"
            value="${rawVal}"
            placeholder="0-${max}">
          <div class="rc-badge" style="color:${rc?levelColor(rc):'var(--muted)'};font-size:.7rem">
            ${rc?`${rc}<span style="color:var(--muted);font-weight:400"> (${pts})</span><br><span style="color:var(--muted);font-weight:400">${Number(val).toFixed(1).replace('.0','')}%</span>`:''}
          </div>
        </td>`;
      }).join('')}
    </tr>`).join('');
}

function wireRubricBadges(){
  document.querySelectorAll('.pct-inp').forEach(inp=>inp.oninput=()=>{
    const v=inp.value.trim();
    const badge=inp.parentElement.querySelector('.rc-badge');
    const la=inp.dataset.la||'';
    const maxInp=document.querySelector(`.max-inp[data-la="${CSS.escape(la)}"]`);
    const max=Number(maxInp?.value||inp.max||100);
    const pct=pctFromRawMark(v,max);
    if(v===''||pct==null||isNaN(pct)){ badge.innerHTML=''; badge.style.color='var(--muted)'; return; }
    const rc=pctToRubricCode(pct);
    const pts=rc?RUBRIC_BANDS.find(b=>b.code===rc)?.points||'':'';
    badge.style.color=rc?levelColor(rc):'var(--muted)';
    badge.innerHTML=rc?`${rc} <span style="color:var(--muted)">(${pts})</span><br><span style="color:var(--muted)">${pct.toFixed(1).replace('.0','')}%</span>`:'';
  });
}

      let invalid=false;

      tableRows.forEach(tableRow=>{
        const studentId=tableRow.dataset.sid;
        if(!studentId) return;
        displayAreas.forEach(la=>{
          const inp=tableRow.querySelector(`.pct-inp[data-la="${CSS.escape(la)}"]`);

          const raw=inp.value.trim();
          if(raw==='') return;

          const outOf=Number(outOfMap[la]||100);
          const rawMark=Number(raw);
          if(isNaN(rawMark)||rawMark<0||rawMark>outOf){
            toast(`Invalid mark for ${la}: must be 0-${outOf}`,true);
            invalid=true;
            return;
          }
          const pct=pctFromRawMark(rawMark,outOf);
          if(pct==null||isNaN(pct)||pct<0||pct>100){
            toast(`Invalid mark for ${la}. Check the subject total.`,true);
            invalid=true;
            return;
          }
          const existingRow=amap[studentId]?.[la];

          const t1=testNum===1?pct:(existingRow?.cat1??null);
          const t2=testNum===2?pct:(existingRow?.cat2??null);
          const t3=testNum===3?pct:(existingRow?.endterm_score??null);
          const parts=[t1,t2,t3].filter(v=>v!=null);
          const avg=parts.length?Math.round(parts.reduce((a,b)=>a+b,0)/parts.length*10)/10:pct;

          toUpsert.push({
            student_id:studentId,
            teacher_id:tch?.id||null,
            grade_recorded:grade,
            learning_area:la,
            term, year,
            score:pctToRubricCode(avg),
            weighted_score:avg,
            cat1:t1,
            cat2:t2,
            endterm_score:t3,
            remarks:existingRow?.remarks||null,
          });
        });
      });

      if(invalid) return;
      saveGradingOutOf(grade,testNum,outOfMap);
      if(!toUpsert.length){ toast('No marks entered. Type at least one learner mark.',true); return; }

      const btn=$('#saveGrades');
      btn.disabled=true; btn.textContent='Saving...';

      let {error}=await sb.from('assessments')
        .upsert(toUpsert,{onConflict:'student_id,learning_area,term,year',ignoreDuplicates:false});
      if(error && String(error.message||'').toLowerCase().includes('grade_recorded')){
        const fallbackRows=toUpsert.map(({grade_recorded,...row})=>row);
        ({error}=await sb.from('assessments')
          .upsert(fallbackRows,{onConflict:'student_id,learning_area,term,year',ignoreDuplicates:false}));
      }

      btn.disabled=false; btn.innerHTML='<i class="ti ti-device-floppy"></i> Save scores';

      if(error){
        console.error('Save error:',error);
        toast('Save failed: '+error.message,true);
        return;
      }
      toast(`Saved ${toUpsert.length} score${toUpsert.length>1?'s':''} for ${testLabel}.`);
      $('#load').click();
    };
  };
  if($('#manageAreas')) $('#manageAreas').onclick=()=>openLearningAreaManager('grading');
};

  filters.stream=filters.stream||'all';
  filters.subject=filters.subject||'all';
  state.analyticsFilters=filters;
  const streamList=[...new Set(students.filter(s=>filters.grade==='all'||s.grade===filters.grade).map(s=>s.stream).filter(Boolean))].sort();
  const scoreRows=assessments
    .filter(a=>studentById[a.student_id] && a.weighted_score!=null)
    .filter(a=>filters.year==='all'||String(a.year)===String(filters.year))
    .filter(a=>filters.term==='all'||String(a.term)===String(filters.term))

    .filter(a=>filters.grade==='all'||studentById[a.student_id]?.grade===filters.grade)
    .filter(a=>filters.stream==='all'||studentById[a.student_id]?.stream===filters.stream);
  const avg=list=>list.length?Math.round(list.reduce((s,x)=>s+Number(x.weighted_score||0),0)/list.length*10)/10:0;
  const groupAvg=(items,keyFn)=>Object.values(items.reduce((acc,a)=>{
    const key=keyFn(a)||'Not set';
    if(!acc[key]) acc[key]={label:key,items:[]};
    acc[key].items.push(a);
    return acc;
  },{})).map(g=>({label:g.label,avg:avg(g.items),count:g.items.length})).sort((a,b)=>b.avg-a.avg);

  const teacherAvg=groupAvg(scoreRows.filter(a=>a.teacher_id),a=>teacherById[a.teacher_id]||'Teacher not linked');
  const termTrend=groupAvg(scoreRows,a=>`T${a.term} ${a.year}`).sort((a,b)=>String(a.label).localeCompare(String(b.label)));
  const learnerRows=Object.values(scoreRows.reduce((acc,a)=>{
    const s=studentById[a.student_id];
    if(!s) return acc;
    if(!acc[s.id]) acc[s.id]={student:s,items:[]};
    acc[s.id].items.push(a);
    return acc;
  },{})).map(x=>({student:x.student,avg:avg(x.items),count:x.items.length})).sort((a,b)=>a.avg-b.avg);
  const weak=learnerRows.filter(x=>x.avg<41).slice(0,15);
  const top=learnerRows.slice().sort((a,b)=>b.avg-a.avg).slice(0,10);
  const overall=avg(scoreRows);
  const selectedStudentIds=new Set(students.filter(s=>(filters.grade==='all'||s.grade===filters.grade)&&(filters.stream==='all'||s.stream===filters.stream)).map(s=>s.id));
  const attScope=attendance.filter(a=>selectedStudentIds.has(a.student_id));
  const present=attScope.filter(a=>['present','late'].includes(a.status)).length;
  const attRate=attScope.length?Math.round(present/attScope.length*100):0;
  const feeScope=fees.filter(f=>selectedStudentIds.has(f.student_id));
  const due=feeScope.reduce((s,f)=>s+Number(f.amount_due||0),0);
  const paid=feeScope.reduce((s,f)=>s+Number(f.amount_paid||0),0);
  const feeRate=due?Math.round(paid/due*100):0;
  const attendanceStatus=Object.values(attScope.reduce((acc,a)=>{
    const key=String(a.status||'not marked').replace(/_/g,' ');
    if(!acc[key]) acc[key]={label:key,count:0};
    acc[key].count++;
    return acc;
  },{})).sort((a,b)=>b.count-a.count);
  const feeBalanceByClass=Object.values(feeScope.reduce((acc,f)=>{
    const key=studentById[f.student_id]?.grade||'Not set';
    if(!acc[key]) acc[key]={label:key,amount:0,count:0};
    acc[key].amount+=Number(f.balance||0);

    return acc;
  },{})).sort((a,b)=>b.amount-a.amount);
  m.innerHTML=`<div class="section-title"><div><h1 style="margin:0">School Analytics</h1><p class="muted small">Academic, attendance, fee and teacher-performance analysis in one place.</p></div></div>
    <div class="card analytics-filter-card">

        <div class="field"><label>Term</label><select id="anaTerm"><option value="all">All terms</option>${termList.map(t=>`<option value="${t}" ${String(filters.term)===String(t)?'selected':''}>Term ${t}</option>`).join('')}</select></div>
        <div class="field"><label>Class</label><select id="anaGrade"><option value="all">All classes</option>${gradeList.map(g=>`<option ${filters.grade===g?'selected':''}>${esc(g)}</option>`).join('')}</select></div>
        <div class="field"><label>Stream</label><select id="anaStream"><option value="all">All streams</option>${streamList.map(s=>`<option ${filters.stream===s?'selected':''}>${esc(s)}</option>`).join('')}</select></div>
        <div class="field"><label>Subject</label><select id="anaSubject"><option value="all">All subjects</option>${subjectList.map(s=>`<option ${filters.subject===s?'selected':''}>${esc(s)}</option>`).join('')}</select></div>
      </div>
    </div>
    <div class="owner-kpis">
      <div class="metric"><div class="num">${overall||'--'}%</div><div class="lbl">Mean score</div></div>
      <div class="metric"><div class="num">${scoreRows.length}</div><div class="lbl">Score records</div></div>
      <div class="metric"><div class="num">${attRate}%</div><div class="lbl">Attendance rate</div></div>
      <div class="metric"><div class="num">${feeRate}%</div><div class="lbl">Fee collection</div></div>
      <div class="metric"><div class="num">${weak.length}</div><div class="lbl">Support cases</div></div>
    </div>
    ${scoreRows.length?`<div class="analytics-grid">
      <div class="card chart-box"><h3>Class mean scores</h3><canvas id="classChart"></canvas></div>
      <div class="card chart-box"><h3>Subject mean scores</h3><canvas id="subjectChart"></canvas></div>
      <div class="card chart-box"><h3>Stream comparison</h3><canvas id="streamChart"></canvas></div>
      <div class="card chart-box"><h3>Term trend</h3><canvas id="trendChart"></canvas></div>
      <div class="card chart-box"><h3>Teacher result entries</h3><canvas id="teacherChart"></canvas></div>
      <div class="card chart-box"><h3>Attendance pattern</h3><canvas id="attendanceChart"></canvas></div>
      <div class="card chart-box"><h3>Fee balance by class</h3><canvas id="feeChart"></canvas></div>
    </div>
    <div class="row" style="align-items:flex-start;margin-top:1rem">
      <div class="col card"><h3>Learners needing academic support</h3>${weak.length?`<table><thead><tr><th>Learner</th><th>Class</th><th>Mean</th><th>Action</th></tr></thead><tbody>${weak.map(x=>`<tr><td>${esc(x.student.full_name)}<div class="small muted">${esc(x.student.admission_number||'')}</div></td><td>${esc([x.student.grade,x.student.stream].filter(Boolean).join(' '))}</td><td><span class="badge terra">${x.avg}%</span></td><td class="small muted">Remedial work / parent follow-up</td></tr>`).join('')}</tbody></table>`:'<p class="muted small">No learner is below the support line.</p>'}</div>
      <div class="col card"><h3>Top learners</h3>${top.length?`<table><thead><tr><th>Learner</th><th>Class</th><th>Mean</th></tr></thead><tbody>${top.map(x=>`<tr><td>${esc(x.student.full_name)}</td><td>${esc([x.student.grade,x.student.stream].filter(Boolean).join(' '))}</td><td><span class="badge">${x.avg}%</span></td></tr>`).join('')}</tbody></table>`:'<p class="muted small">No scores yet.</p>'}</div>
    </div>`:`<div class="card empty"><i class="ti ti-chart-line"></i><div>No matching scores for these filters.</div></div>`}`;
  ['anaYear','anaTerm','anaGrade','anaStream','anaSubject'].forEach(id=>{
    const el=document.getElementById(id);
    if(el) el.onchange=()=>{ state.analyticsFilters={year:$('#anaYear').value,term:$('#anaTerm').value,grade:$('#anaGrade').value,stream:$('#anaStream').value,subject:$('#anaSubject').value}; modules.analytics(m); };

  },80);
};

function downloadGradedExamExcel(students, displayAreas, amap, testCol, term, year, testLabel){
  const header=['Admission No','Learner Name','Term','Year','Test'];
  displayAreas.forEach(la=>{ header.push(`${la} Score`,`${la} Level`,`${la} Comment`); });
  header.push('Overall Average','Overall Comment');
  const rows=[header];
  students.forEach(stu=>{
    const row=[stu.admission_number||'',stu.full_name||'',term,year,testLabel];
    const scores=[];
    displayAreas.forEach(la=>{
      const a=amap[stu.id]?.[la]||{};
      const score=a[testCol];
      const avg=a.weighted_score!=null?+a.weighted_score:(score!=null&&score!==''?+score:null);
      if(avg!=null&&!isNaN(avg)) scores.push(avg);
      row.push(score??'', avg!=null?pctToRubricCode(avg):'', avg!=null?autoLearningAreaRemark(la,avg):'');
    });
    const overall=scores.length?Math.round(scores.reduce((a,b)=>a+b,0)/scores.length*10)/10:null;
    row.push(overall??'', autoOverallComment(overall,stu.full_name));
    rows.push(row);
  });
  const ws=XLSX.utils.aoa_to_sheet(rows);
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,'Graded exam');
  XLSX.writeFile(wb,`graded-exam-${testLabel.replace(/\s+/g,'-')}-T${term}-${year}.xlsx`);
}

function downloadGradedExamPdf(students, displayAreas, amap, opts={}){
  const school=state.school||{};
  const mode=String(opts.mode||'1');
  const term=opts.term, year=opts.year;
  const grade=opts.grade||'Class';
  const stream=opts.stream||'';
  const testNames={1:'First Test',2:'Second Test',3:'Third Test'};
  const testCols={1:'cat1',2:'cat2',3:'endterm_score'};
  const title=mode==='summary'?'Three-test Summary':`${testNames[mode]||'Assessment'} Analysis`;
  const getCurrentPct=(studentId, la)=>{
    if(String(opts.currentTestNum)!==mode) return null;
    const row=document.querySelector(`#gradeTable tbody tr[data-sid="${CSS.escape(studentId)}"]`);
    const inp=row?.querySelector(`.pct-inp[data-la="${CSS.escape(la)}"]`);
    if(!inp || inp.value==='') return null;
    const outOf=Number(opts.currentOutOfMap?.[la]||100);
    return pctFromRawMark(inp.value,outOf);
  };
  const scoreFor=(stu, la, col)=>{
    const live = col===testCols[mode] ? getCurrentPct(stu.id, la) : null;
    if(live!=null && !isNaN(live)) return live;
    const saved=amap[stu.id]?.[la]?.[col];
    return saved!=='' && saved!=null && !isNaN(+saved) ? +saved : null;
  };
  const subjectAverage=(vals)=>{
    const clean=vals.filter(v=>v!=null&&!isNaN(+v)).map(Number);
    return clean.length?Math.round(clean.reduce((a,b)=>a+b,0)/clean.length*10)/10:null;
  };
  const areaHeaders=displayAreas.map(la=>`<th>${esc(la)}</th>`).join('');
  const rows=students.map((stu,i)=>{
    const subjectCells=[];
    const totalScores=[];
    displayAreas.forEach(la=>{
      if(mode==='summary'){
        const t1=scoreFor(stu,la,'cat1'), t2=scoreFor(stu,la,'cat2'), t3=scoreFor(stu,la,'endterm_score');
        const avg=subjectAverage([t1,t2,t3]);
        if(avg!=null) totalScores.push(avg);
        subjectCells.push(`<td><div class="mini">${[t1,t2,t3].map((v,idx)=>`T${idx+1}: ${v==null?'-':Math.round(v)}`).join(' | ')}</div><b>${avg==null?'-':Math.round(avg)+'%'}</b><div class="level">${avg==null?'':pctToRubricCode(avg)}</div></td>`);
      }else{
        const pct=scoreFor(stu,la,testCols[mode]||'cat1');
        if(pct!=null) totalScores.push(pct);
        const outOf=Number(opts.currentOutOfMap?.[la]||100);
        const raw=pct!=null?rawMarkFromPct(pct,outOf):'';
        subjectCells.push(`<td><b>${pct==null?'-':raw+'/'+outOf}</b><div class="mini">${pct==null?'':Math.round(pct)+'%'}</div><div class="level">${pct==null?'':pctToRubricCode(pct)}</div></td>`);
      }
    });
    const overall=subjectAverage(totalScores);
    return `<tr>
      <td class="idx">${i+1}</td>
      <td class="name">${esc(stu.full_name||'')}<div class="mini">${esc(stu.admission_number||'')}</div></td>
      ${subjectCells.join('')}
      <td class="total"><b>${overall==null?'-':Math.round(overall)+'%'}</b><div class="level">${overall==null?'':pctToRubricCode(overall)}</div></td>
      <td class="comment">${esc(autoOverallComment(overall,stu.full_name||'Learner'))}</td>
    </tr>`;
  }).join('');
  const html=`<!DOCTYPE html><html><head><meta charset="utf-8">
  <title>${esc(title)} - ${esc(grade)} ${esc(stream)}</title>
  <style>
    body{font-family:Arial,Helvetica,sans-serif;color:#1c1d1a;margin:0;padding:18px;background:#fff;font-size:11px}
    .header{display:flex;justify-content:space-between;gap:1rem;align-items:flex-start;border-bottom:3px solid #1f4434;padding-bottom:10px;margin-bottom:12px}
    .school{font-size:20px;font-weight:800;color:#1f4434}
    .muted{color:#666;font-size:10px;margin-top:2px}
    .title{text-align:right;font-size:15px;font-weight:800;color:#8f3d2d}
    .chips{display:flex;gap:6px;flex-wrap:wrap;margin:10px 0}
    .chip{border:1px solid #d9d0bf;background:#f7f4ee;border-radius:999px;padding:4px 8px;font-size:10px}
    table{width:100%;border-collapse:collapse;table-layout:fixed}
    th{background:#1f4434;color:#fff;padding:6px 4px;font-size:9px;text-transform:uppercase;letter-spacing:.03em;border:1px solid #173629;vertical-align:bottom}
    td{border:1px solid #e1dccf;padding:5px 4px;vertical-align:top;text-align:center;word-break:break-word}
    tr:nth-child(even) td{background:#fbfaf6}
    .idx{width:26px;color:#666}
    .name{text-align:left;width:130px;font-weight:700;color:#1f4434}
    .mini{font-size:9px;color:#666;font-weight:400;line-height:1.25}
    .level{font-size:9px;color:#8f3d2d;font-weight:800;margin-top:2px}
    .total{background:#f0f7f2!important;color:#1f4434;width:58px}
    .comment{text-align:left;width:180px;font-size:9px;line-height:1.25;color:#333}
    .footer{margin-top:12px;color:#777;font-size:9px;display:flex;justify-content:space-between;border-top:1px solid #e1dccf;padding-top:8px}
    @media print{body{padding:10mm}.no-print{display:none} @page{size:landscape;margin:8mm}}
  </style></head><body>
    <div class="header">
      <div>
        <div class="school">${esc(school.name||'Radari Teacher Workspace')}</div>
        <div class="muted">${esc(school.county||'')} ${school.phone?' | '+esc(school.phone):''}</div>
      </div>
      <div>
        <div class="title">${esc(title)}</div>
        <div class="muted">${esc(grade)}${stream?' '+esc(stream):''} | Term ${esc(term)} ${esc(year)} | Printed ${new Date().toLocaleDateString('en-KE')}</div>
      </div>
    </div>
    <div class="chips">
      <span class="chip">Learners: ${students.length}</span>
      <span class="chip">Learning areas: ${displayAreas.length}</span>
      <span class="chip">CBC levels: EE, ME, AE, BE</span>
      ${mode==='summary'?'<span class="chip">Shows Test 1, Test 2, Test 3 and average</span>':'<span class="chip">Raw mark and percentage shown per subject</span>'}
    </div>
    <table>
      <thead><tr><th class="idx">#</th><th class="name">Learner</th>${areaHeaders}<th class="total">Total</th><th class="comment">Auto comment</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
    <div class="footer"><span>Generated by Radari</span><span>Teacher filing copy</span></div>
    <script>window.onload=()=>setTimeout(()=>window.print(),250)<\/script>
  </body></html>`;
  const w=window.open('','_blank');
  w.document.write(html);
  w.document.close();
}

    $('#areaForm').strand.value=a.dataset.strand||'General';
    $('#areaForm').sub_strand.value=a.dataset.sub||'School configured';
    $('#areaSubmit').textContent='Save subject';
    $('#cancelAreaEdit').classList.remove('hide');
    $('#areaForm').subject.focus();
  });
  $('#subjectTeacher').onchange=()=>{
    const t=teachers.find(x=>x.id===$('#subjectTeacher').value);
    if(t && !$('#subjectInstructor').value.trim()) $('#subjectInstructor').value=t.full_name||'';
  };
  $('#cancelAreaEdit').onclick=()=>{
    $('#areaEditId').value='';
    $('#areaOriginalSubject').value='';
    $('#areaForm').reset();
    $('#areaSubmit').textContent='Add subject';
    $('#cancelAreaEdit').classList.add('hide');
  };
  $('#areaForm').onsubmit=async(e)=>{
    e.preventDefault();
    const f=Object.fromEntries(new FormData(e.target));
    const grade=state._areaGrade||$('#areaGrade')?.value||selected;
    const payload={
      school_id:sid,
      grade,
      subject:f.subject.trim(),
      strand:(f.strand||'General').trim(),
      sub_strand:(f.sub_strand||'School configured').trim(),
      teacher_id:f.teacher_id||null,
      instructor_name:(f.instructor_name||'').trim()||null,
    };
    let editId=String(f.id||'').trim();
    const originalSubject=String(f.original_subject||'').trim();
    const customRows=(strands||[]).filter(s=>s.grade===grade&&s.subject);
    if(!editId && !customRows.length){
      const defaults=(CBC_LEARNING_AREAS[grade]||[]);
      if(defaults.length){
        const seedRows=defaults.map(subject=>({school_id:sid,grade,subject,strand:'General',sub_strand:'CBC default'}));
        const {data:seeded=[],error:seedErr}=await sb.from('cbc_strands').insert(seedRows).select('*');
        if(seedErr){ toast('Could not prepare editable subjects: '+seedErr.message,true); return; }
        if(originalSubject){
          editId=(seeded||[]).find(s=>s.subject===originalSubject)?.id||'';
        }
      }
    }
    const req=editId
      ? sb.from('cbc_strands').update(payload).eq('id',editId)
      : sb.from('cbc_strands').insert(payload);
    const {error}=await req;
    if(error){ toast('Could not save subject: '+error.message,true); return; }
    toast(editId?'Subject updated':'Subject added'); openLearningAreaManager(backRoute);
  };
}

      <tbody>${rows.map(r=>`<tr>

        <td class="small">${esc(r.due_date||'')}</td>
        <td>${r.attachment_url?`<button class="btn secondary dl-asgn" data-url="${esc(r.attachment_url)}" style="height:28px;font-size:.8rem;padding:0 .6rem"><i class="ti ti-file-type-pdf"></i> Download PDF</button>`:'<span class="muted small">None</span>'}</td>
        <td>${canPost?`<a href="#" class="small del-assign" data-id="${r.id}" style="color:var(--terracotta)">Delete</a>`:''}</td>
      </tr>`).join('')}</tbody></table>`
    :`<div class="empty"><i class="ti ti-notebook"></i><div>No assignments posted yet.</div></div>`}</div>`;

  m.querySelectorAll('.dl-asgn').forEach(b=>b.onclick=async()=>{
    b.disabled=true; b.textContent='Preparing...';
    const signed=await getSignedUrl(b.dataset.url);
    b.disabled=false; b.innerHTML='<i class="ti ti-file-type-pdf"></i> Download PDF';
    window.open(signed,'_blank');
  });
  m.querySelectorAll('.del-assign').forEach(a=>a.onclick=async(e)=>{
    e.preventDefault();
    if(!confirm('Delete this assignment?')) return;
    await sb.from('assignments').delete().eq('id',a.dataset.id);
    toast('Deleted'); navigate('assignments');
  });

  if($('#add')) $('#add').onclick = async ()=>{
    const { data:strands=[] } = await sb.from('cbc_strands').select('id,subject,strand,grade').eq('school_id',sid).order('subject');
    m.innerHTML = `<div class="card" style="max-width:620px">
      <a href="#" id="bk" class="small"><i class="ti ti-arrow-left"></i> Back</a>
      <h2 style="margin-top:1rem">New assignment</h2>
      <form id="af" class="stack">
        <div class="field"><label>Title *</label><input name="title" required placeholder="e.g. Week 3 Mathematics Exercise"></div>
        <div class="field"><label>Description / Instructions</label><textarea name="description" rows="3" placeholder="Describe what learners need to do..."></textarea></div>
        <div class="row">
          <div class="col field"><label>Grade</label><input name="grade" placeholder="e.g. Grade 4"></div>
          <div class="col field"><label>Stream (optional)</label><input name="stream"></div>
          <div class="col field"><label>Due date</label><input name="due_date" type="date"></div>
        </div>
        <div class="field"><label>Strand</label>
          <select name="strand_id"><option value="">None</option>${strands.map(s=>`<option value="${s.id}">${esc(s.grade||'')} &mdash; ${esc(s.subject)} &mdash; ${esc(s.strand)}</option>`).join('')}</select></div>
        <div class="field">
          <label>Attach a PDF (optional)</label>
          <input type="file" name="pdf_file" accept="application/pdf" id="pdfFile" style="padding:.5rem">
          <span class="small muted">PDF will be stored in Supabase Storage. Max 5MB.</span>
        </div>
        <div id="uploadProg" style="display:none" class="small muted">Uploading PDF...</div>
        <div><button type="submit" class="btn primary">Post assignment</button> <button type="button" class="btn secondary" id="ac">Cancel</button></div>
      </form></div>`;
    $('#bk').onclick=(e)=>{e.preventDefault();navigate('assignments');};
    $('#ac').onclick=()=>navigate('assignments');
    $('#af').onsubmit = async (e)=>{
      e.preventDefault();
      const f=Object.fromEntries(new FormData(e.target));
      const { data:tch } = await sb.from('teachers').select('id').eq('school_id',sid).eq('user_id',state.profile.id).maybeSingle();
      if(!tch){ toast('Your user account is not linked to a teacher record. Ask admin.',true); return; }
      if(!f.strand_id) delete f.strand_id;
      if(!f.due_date) delete f.due_date;
      if(!f.stream) delete f.stream;

      // Handle PDF upload to Supabase Storage
      const pdfInput=$('#pdfFile');
      let attachment_url = null;
      if(pdfInput?.files?.length){
        const file=pdfInput.files[0];
        if(file.size>5*1024*1024){ toast('PDF too large. Max 5MB.',true); return; }
        $('#uploadProg').style.display='block';
        const path=`assignments/${sid}/${Date.now()}-${file.name.replace(/\s/g,'_')}`;
        const {error:upErr} = await sb.storage.from('school-files').upload(path, file, {contentType:'application/pdf'});
        if(upErr){ toast('PDF upload failed: '+upErr.message,true); $('#uploadProg').style.display='none'; return; }
        const {data:pub} = sb.storage.from('school-files').getPublicUrl(path);
        attachment_url = pub?.publicUrl||null;
        $('#uploadProg').style.display='none';
      }
      delete f.pdf_file;
      f.teacher_id=tch.id;
      if(attachment_url) f.attachment_url=attachment_url;
      const {error}=await sb.from('assignments').insert(f);
      if(error) toast(error.message,true); else {toast('Assignment posted'); navigate('assignments');}
    };
  };
};

function printTimetable(rows=[]){
  const school=state.school||{};
  const DAYS=['Mon','Tue','Wed','Thu','Fri'];
  const sorted=[...rows].sort((a,b)=>
    (a.grade||'').localeCompare(b.grade||'') ||
    (a.stream||'').localeCompare(b.stream||'') ||
    DAYS.indexOf(a.day_of_week)-DAYS.indexOf(b.day_of_week) ||
    (a.start_time||'').localeCompare(b.start_time||'')
  );
  const groups={};
  sorted.forEach(r=>{
    const key=`${r.grade||'Class'} ${r.stream||''}`.trim();
    if(!groups[key]) groups[key]=[];
    groups[key].push(r);
  });
  const html=`<!doctype html><html><head><meta charset="utf-8"><title>Timetable</title>
  <style>
    @page{size:A4 landscape;margin:1cm}
    *{box-sizing:border-box}
    body{font-family:Arial,Helvetica,sans-serif;color:#152018;margin:0;background:#fff;font-size:12px}
