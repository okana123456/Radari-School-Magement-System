<!doctype html>
<!--
================================================================================
RADARI v2 — CBC School Management System
================================================================================
IMPROVEMENTS in this version:
  ✅ Students tab: grade/stream/gender filter bar
  ✅ Report cards: print-only CSS hides all UI chrome; school-branded with colour
  ✅ Report card bulk-print for a whole class
  ✅ Timetable: full-school weekly grid view (all grades side by side)
  ✅ Lesson plans: proper CBC weekly format + downloadable PDF via print
  ✅ Teacher Excel export of their own class/students
  ✅ Fees: filter by grade/term/year/status; downloadable fee statement per student
  ✅ CBC promotion/retention policy note (Grade 9 only — KNEC decides)
  ✅ Lesson plan CBC compliance note & improved template
  ✅ School branding: settings lets admin pick accent colour stored in localStorage
================================================================================
SQL SCHEMA — same as v1, run in Supabase SQL editor first.
See the original file for full SQL.
================================================================================
-->
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Radari — CBC School Management</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Fraunces:ital,wght@0,500;0,600;1,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.7.0/dist/tabler-icons.min.css" />
  <style>
    /* ── TOKENS ─────────────────────────────────────────────────────────── */
    :root{
      --green:#1f4434;
      --green-700:#16382a;
      --green-50:#eaf1ec;
      --bg:#f7f4ee;
      --surface:#ffffff;
      --stone:#e7e2d6;
      --stone-2:#d8d2c2;
      --ink:#1c1d1a;
      --ink-2:#4a4a44;
      --muted:#8a877d;
      --amber:#b9802a;
      --amber-bg:#f6e9c8;
      --terracotta:#a4452e;
      --terracotta-bg:#f4d7cc;
      --shadow:0 1px 2px rgba(28,29,26,.04), 0 8px 28px -16px rgba(28,29,26,.18);
      --radius:6px;
      /* brand accent — overridable per school */
      --accent:var(--green);
      --accent-dark:var(--green-700);
      --accent-light:var(--green-50);
    }
    *{box-sizing:border-box}
    html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);
      font-family:'Inter',system-ui,-apple-system,sans-serif;font-size:15px;line-height:1.55;-webkit-font-smoothing:antialiased}
    h1,h2,h3,h4{font-family:'Fraunces',Georgia,serif;font-weight:500;letter-spacing:-.01em;margin:0 0 .4em}
    h1{font-size:2rem;line-height:1.15}
    h2{font-size:1.35rem}
    h3{font-size:1.05rem;font-family:'Inter',sans-serif;font-weight:600}
    a{color:var(--accent);text-decoration:none}
    a:hover{text-decoration:underline}
    .muted{color:var(--muted)}
    .small{font-size:.85rem}
    .row{display:flex;gap:1rem;flex-wrap:wrap}
    .col{flex:1;min-width:220px}
    .stack > * + *{margin-top:.75rem}

    /* progress bar */
    #progress{position:fixed;top:0;left:0;height:2px;width:0;background:var(--accent);z-index:1000;transition:width .25s ease}

    /* AUTH */
    .auth{min-height:100vh;display:grid;grid-template-columns:1fr 1fr}
    @media(max-width:860px){.auth{grid-template-columns:1fr}}
    .auth-brand{background:var(--green);color:#f1ece0;padding:3rem;display:flex;flex-direction:column;justify-content:space-between;position:relative;overflow:hidden}
    .auth-brand::before{content:"";position:absolute;inset:0;background-image:
      radial-gradient(circle at 20% 30%,rgba(255,255,255,.05) 0,transparent 35%),
      radial-gradient(circle at 80% 80%,rgba(255,255,255,.04) 0,transparent 30%),
      repeating-linear-gradient(135deg,rgba(255,255,255,.025) 0 2px,transparent 2px 28px);
      pointer-events:none}
    .auth-brand > *{position:relative}
    .auth-brand h1{font-size:2.6rem;color:#fbf7ec}
    .auth-brand .tag{opacity:.8;max-width:380px}
    .brand-mark{font-family:'Fraunces',serif;font-size:1.6rem;letter-spacing:.02em}
    @media(max-width:860px){.auth-brand{display:none}}
    .auth-form{background:var(--bg);padding:3rem 2rem;display:flex;flex-direction:column;justify-content:center;align-items:center}
    .auth-form .inner{width:100%;max-width:380px}
    .auth-form .mobile-brand{display:none;text-align:center;margin-bottom:2rem}
    @media(max-width:860px){.auth-form .mobile-brand{display:block}}
    label{display:block;font-size:.85rem;color:var(--ink-2);margin-bottom:.3rem}
    input,select,textarea{width:100%;padding:.75rem .85rem;border:1px solid var(--stone-2);
      background:#fff;border-radius:var(--radius);font:inherit;color:var(--ink);
      transition:border-color .15s,box-shadow .15s}
    input:focus,select:focus,textarea:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px color-mix(in srgb,var(--accent) 20%,transparent)}
    .field{margin-bottom:1rem}
    .field .err{color:var(--terracotta);font-size:.8rem;margin-top:.3rem;display:block}
    .btn{display:inline-flex;align-items:center;justify-content:center;gap:.4rem;
      padding:0 1.1rem;height:40px;border-radius:var(--radius);font:inherit;font-weight:500;cursor:pointer;border:1px solid transparent;background:transparent;color:var(--ink);transition:background .15s,border-color .15s}
    .btn.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
    .btn.primary:hover{background:var(--accent-dark,var(--green-700))}
    .btn.primary[disabled]{opacity:.7;cursor:wait}
    .btn.secondary{border-color:var(--accent);color:var(--accent);background:transparent}
    .btn.secondary:hover{background:var(--accent-light,var(--green-50))}
    .btn.danger{background:var(--terracotta);color:#fff;border-color:var(--terracotta)}
    .btn.block{width:100%;height:48px}
    .btn.sm{height:32px;font-size:.82rem;padding:0 .75rem}
    .divider{display:flex;align-items:center;gap:.75rem;color:var(--muted);font-size:.8rem;margin:1.25rem 0}
    .divider::before,.divider::after{content:"";flex:1;height:1px;background:var(--stone-2)}
    .pwd-check{font-size:.78rem;color:var(--muted);margin-top:.4rem}
    .pwd-check span{display:inline-flex;align-items:center;gap:.25rem;margin-right:.85rem}
    .pwd-check span.ok{color:var(--green)}
    .form-link{font-size:.82rem;text-align:right;display:block;margin-top:-.4rem;margin-bottom:1rem}

    /* SHELL */
    .shell{display:flex;min-height:100vh;align-items:stretch}
    .sidebar{width:232px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--stone);
      display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto}
    .sidebar-inner{padding:1.5rem 1rem;display:flex;flex-direction:column;gap:.75rem;flex:1}
    .sidebar .brand{font-family:'Fraunces',serif;font-size:1.35rem;color:var(--accent);padding:0 .5rem;margin-bottom:.25rem;line-height:1.2}
    .sidebar .school-name{font-size:.78rem;color:var(--muted);padding:0 .5rem;margin-top:-.2rem;margin-bottom:.5rem;font-weight:400}
    .nav-group{margin-bottom:.5rem}
    .nav-group-label{font-size:.68rem;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);padding:.25rem .75rem;margin-bottom:.15rem;font-weight:600}
    .nav{display:flex;flex-direction:column;gap:.05rem}
    .nav a{display:flex;align-items:center;gap:.55rem;padding:.52rem .75rem;border-radius:var(--radius);
      color:var(--ink-2);font-size:.875rem;line-height:1.3;transition:background .12s,color .12s}
    .nav a:hover{background:var(--accent-light,var(--green-50));color:var(--accent);text-decoration:none}
    .nav a.active{background:var(--accent-light,var(--green-50));color:var(--accent);font-weight:500}
    .nav a .ti{font-size:1rem;opacity:.75;flex-shrink:0}
    .nav a.active .ti{opacity:1}
    .sidebar .footer{padding:1rem;border-top:1px solid var(--stone);font-size:.78rem;color:var(--muted)}
    .sidebar .footer strong{display:block;color:var(--ink);font-size:.82rem;margin-bottom:.15rem}
    .topbar{display:none;padding:.7rem 1rem;background:var(--surface);border-bottom:1px solid var(--stone);
      align-items:center;gap:.75rem;position:sticky;top:0;z-index:50}
    .topbar .menu{background:none;border:none;padding:.25rem;color:var(--ink);cursor:pointer;font-size:1.25rem;line-height:1;display:flex;align-items:center}
    .topbar .school{font-weight:600;font-size:.95rem}
    .topbar .mod{margin-left:auto;color:var(--muted);font-size:.82rem}
    @media(max-width:860px){
      .shell{flex-direction:column}
      .topbar{display:flex}
      .sidebar{position:fixed;left:0;top:0;bottom:0;height:100vh;width:260px;
        transform:translateX(-100%);transition:transform .22s cubic-bezier(.4,0,.2,1);z-index:60}
      .sidebar.open{transform:translateX(0);box-shadow:4px 0 24px rgba(28,29,26,.12)}
      .scrim{display:none;position:fixed;inset:0;background:rgba(28,29,26,.35);z-index:55}
      .scrim.show{display:block}
    }
    .content-wrap{flex:1;min-width:0;display:flex;flex-direction:column}
    main{flex:1;padding:2rem 2.25rem;max-width:1120px;width:100%}
    @media(max-width:860px){main{padding:1.25rem}}
    .page-header{margin-bottom:1.75rem;padding-bottom:1rem;border-bottom:1px solid var(--stone)}
    .page-header h1{margin-bottom:.2rem;font-size:1.65rem}
    .page-header .sub{color:var(--muted);font-size:.88rem}
    .page-header-row{display:flex;align-items:flex-end;justify-content:space-between;gap:1rem;flex-wrap:wrap}
    .module-body{display:flex;flex-direction:column;gap:1.25rem}
    .card{background:var(--surface);padding:1.25rem;border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:1.25rem}
    .section-title{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:1rem;gap:.5rem;flex-wrap:wrap}
    .section-title .sub{color:var(--muted);font-size:.88rem}

    /* metrics */
    .metrics{display:grid;grid-template-columns:1.4fr 1fr 1fr;gap:1.25rem}
    @media(max-width:860px){.metrics{grid-template-columns:1fr 1fr}}
    .metric{padding:1.4rem;background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow)}
    .metric .num{font-family:'Fraunces',serif;font-size:2.8rem;line-height:1;color:var(--accent);font-weight:500}
    .metric.lg .num{font-size:4rem}
    .metric .lbl{color:var(--ink-2);margin-top:.5rem;font-size:.9rem}
    .metric.lg{grid-row:span 2}

    /* tables */
    table{width:100%;border-collapse:collapse}
    th,td{padding:.65rem .6rem;text-align:left;border-bottom:1px solid var(--stone);font-size:.9rem}
    th{font-weight:500;color:var(--ink-2);font-size:.8rem;border-bottom:1px solid var(--stone-2)}
    tbody tr:nth-child(even){background:rgba(231,226,214,.2)}
    tbody tr:hover{background:rgba(31,68,52,.04)}

    /* badges */
    .badge{display:inline-block;padding:.15rem .55rem;border-radius:999px;font-size:.75rem;background:var(--accent-light,var(--green-50));color:var(--accent)}
    .badge.amber{background:var(--amber-bg);color:var(--amber)}
    .badge.terra{background:var(--terracotta-bg);color:var(--terracotta)}
    .badge.muted{background:var(--stone);color:var(--ink-2)}

    /* grading grid */
    .grading td{padding:.4rem}
    .score-cell{display:flex;gap:.25rem}
    .score-btn{flex:1;padding:.45rem 0;border:1px solid var(--stone-2);background:#fff;border-radius:var(--radius);cursor:pointer;font-size:.8rem;color:var(--ink-2);transition:all .12s}
    .score-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
    .score-btn.active.be{background:var(--terracotta);border-color:var(--terracotta)}
    .score-btn.active.ae{background:var(--amber);border-color:var(--amber)}

    /* toast */
    .toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:.7rem 1.2rem;border-radius:var(--radius);box-shadow:var(--shadow);z-index:200;opacity:0;transition:opacity .2s;white-space:nowrap}
    .toast.show{opacity:1}
    .toast.error{background:var(--terracotta)}

    .empty{padding:2.5rem 1rem;text-align:center;color:var(--muted)}
    .empty .ti{font-size:2rem;display:block;margin-bottom:.5rem;color:var(--stone-2)}
    .health-card{padding:.85rem 1rem;border-radius:var(--radius);margin-bottom:.5rem}
    .health-card.mild,.health-card.moderate{background:var(--amber-bg);color:#5a3d11}
    .health-card.severe{background:var(--terracotta-bg);color:#5a1d10}
    .health-card .title{font-weight:600}
    .toolbar{display:flex;gap:.6rem;flex-wrap:wrap;margin-bottom:1rem;align-items:flex-end}
    .toolbar .field{margin:0;min-width:120px;flex:1}
    .hide{display:none !important}

    /* ── TIMETABLE GRID ─────────────────────────────────────────────────── */
    .tt-grid{display:grid;grid-template-columns:60px repeat(5,1fr);gap:2px;font-size:.78rem}
    .tt-grid .th{background:var(--stone);padding:.4rem;font-weight:600;text-align:center;border-radius:var(--radius)}
    .tt-slot{background:var(--surface);border:1px solid var(--stone);border-radius:var(--radius);padding:.35rem .5rem;min-height:56px;cursor:default}
    .tt-slot .subject{font-weight:600;font-size:.8rem;color:var(--accent)}
    .tt-slot .grade{font-size:.72rem;color:var(--muted)}
    .tt-time{display:flex;align-items:center;justify-content:flex-end;padding-right:.5rem;color:var(--muted);font-size:.72rem}
    .tt-empty{background:rgba(231,226,214,.3);border-radius:var(--radius);min-height:56px;border:1px dashed var(--stone-2)}

    /* ── LESSON PLAN TEMPLATE ───────────────────────────────────────────── */
    .lp-form .sub-section{background:var(--bg);border:1px solid var(--stone);border-radius:var(--radius);padding:1rem;margin-bottom:.75rem}
    .lp-form .sub-section h4{font-family:'Inter',sans-serif;font-size:.82rem;font-weight:600;color:var(--ink-2);text-transform:uppercase;letter-spacing:.06em;margin:0 0 .6rem}
    .activity-row{display:grid;grid-template-columns:40px 1fr 1fr auto;gap:.5rem;align-items:center;margin-bottom:.4rem}
    .activity-row label{font-size:.78rem;color:var(--muted)}

    /* ── PRINT STYLES ───────────────────────────────────────────────────── */
    @media print{
      /* hide everything that isn't the report */
      .sidebar,.topbar,.scrim,
      #progress,#toast,
      .toolbar,.section-title .btn,.btn,
      .page-header button, #printControls,
      .nav, #signOut,
      [data-noprint]{ display:none !important }

      body,html{background:#fff !important;color:#000 !important}
      main{padding:0 !important;max-width:100% !important}
      .content-wrap{padding:0}
      .shell{display:block}

      .print-report{
        page-break-after:always;
        border:none !important;
        box-shadow:none !important;
        padding:1.5cm 2cm !important;
        margin:0 !important;
      }
      .print-report:last-child{page-break-after:auto}

      .rpt-header{
        border-bottom:3px solid var(--print-accent,#1f4434) !important;
        margin-bottom:1rem;padding-bottom:.75rem
      }
      .rpt-school{color:var(--print-accent,#1f4434) !important}

      table,th,td{font-size:9pt !important}
      .badge{border:1px solid currentColor !important;background:none !important}
      canvas{display:none !important}

      /* lesson plan print */
      .lp-printable{page-break-after:always;padding:1.5cm 2cm}
      .lp-printable:last-child{page-break-after:auto}
    }
  </style>
</head>
<body>

<div id="progress"></div>
<div id="toast" class="toast"></div>
<div id="app"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script>
/* ============================================================
   CONFIG
   ============================================================ */
const SUPABASE_URL     = 'https://wxmryautvozlklebwdhj.supabase.co';
const SUPABASE_ANON_KEY= 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind4bXJ5YXV0dm96bGtsZWJ3ZGhqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE1NDc4MDMsImV4cCI6MjA5NzEyMzgwM30.tkI6I67tfqK9PbhspeOqRVbKgrvHNAqVeAXu4MrGvc8';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
const APP_NAME = 'Radari';
const TAGLINE  = 'A school management system built for Kenya\u2019s CBC classroom.';
const GRADES   = ['PP1','PP2','Grade 1','Grade 2','Grade 3','Grade 4','Grade 5','Grade 6','Grade 7','Grade 8','Grade 9'];
const DAYS     = ['Mon','Tue','Wed','Thu','Fri'];

/* ============================================================
   UTILS
   ============================================================ */
const $ = (s,r=document)=>r.querySelector(s);
const $$ = (s,r=document)=>[...r.querySelectorAll(s)];
const el = h=>{const t=document.createElement('template');t.innerHTML=h.trim();return t.content.firstElementChild};
const esc = s=>(s??'').toString().replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const fmt = n=>n==null?'—':Number(n).toLocaleString('en-KE');
const fmtKsh = n=>n==null?'—':'KSh '+fmt(n);

const progress={
  start(){const b=$('#progress');b.style.width='15%';this._t=setInterval(()=>{const w=parseFloat(b.style.width);if(w<85)b.style.width=(w+5)+'%'},250)},
  done(){clearInterval(this._t);const b=$('#progress');b.style.width='100%';setTimeout(()=>b.style.width='0',300)}
};
const toast=(msg,err=false)=>{
  const t=$('#toast');t.textContent=msg;t.classList.toggle('error',err);t.classList.add('show');
  clearTimeout(toast._t);toast._t=setTimeout(()=>t.classList.remove('show'),3500);
};
function debounce(fn,ms=300){let t;return(...a)=>{clearTimeout(t);t=setTimeout(()=>fn(...a),ms)}}

/* School brand accent colour */
function applyBrandAccent(){
  const c = localStorage.getItem('radari_accent');
  if(c){
    document.documentElement.style.setProperty('--accent',c);
    document.documentElement.style.setProperty('--accent-dark', shadeColor(c,-20));
    document.documentElement.style.setProperty('--accent-light', shadeColor(c,90)+'26');
    document.documentElement.style.setProperty('--print-accent',c);
  }
}
function shadeColor(hex,pct){
  const n=parseInt(hex.replace('#',''),16);
  const r=Math.min(255,Math.max(0,((n>>16)&0xFF)+Math.round(255*pct/100)));
  const g=Math.min(255,Math.max(0,((n>>8)&0xFF)+Math.round(255*pct/100)));
  const b=Math.min(255,Math.max(0,(n&0xFF)+Math.round(255*pct/100)));
  return '#'+[r,g,b].map(x=>x.toString(16).padStart(2,'0')).join('');
}
applyBrandAccent();

/* ============================================================
   STATE
   ============================================================ */
const state={session:null,profile:null,school:null,route:'dashboard'};

/* ============================================================
   AUTH VIEWS (unchanged from v1 — abbreviated for brevity)
   ============================================================ */
function brandPanel(){return `<div class="auth-brand">
  <div class="brand-mark">${APP_NAME}</div>
  <div><h1>School life, gathered in one place.</h1><p class="tag">${TAGLINE}</p></div>
  <div class="small" style="opacity:.7">Built for Kenyan primary &amp; junior secondary schools.</div>
</div>`}

function viewLogin(){
  document.body.innerHTML=`<div id="progress"></div><div id="toast" class="toast"></div>
  <div class="auth">${brandPanel()}
  <div class="auth-form"><div class="inner">
    <div class="mobile-brand"><div class="brand-mark" style="color:var(--accent)">${APP_NAME}</div><div class="muted small">${TAGLINE}</div></div>
    <h2 style="margin-bottom:1.25rem">Sign in</h2>
    <form id="loginForm" class="stack" novalidate>
      <div class="field"><label>Email address</label><input name="email" type="email" required></div>
      <div class="field"><label>Password</label><input name="password" type="password" required></div>
      <a href="#" id="toForgot" class="form-link">Forgot password</a>
      <button class="btn primary block" type="submit" id="loginBtn">Sign in</button>
    </form>
    <div class="divider">or</div>
    <button class="btn secondary block" id="toSignup">Create an account</button>
    <div style="margin-top:1.5rem;padding:1rem;background:var(--accent-light,var(--green-50));border-radius:var(--radius);font-size:.82rem">
      <div style="font-weight:600;margin-bottom:.35rem;color:var(--accent)">Demo access</div>
      <div class="muted">Sign up with school code <b>RADARI01</b>, role <b>Admin</b>. Then go to Settings → Seed demo data.</div>
    </div>
  </div></div></div>`;
  $('#toSignup').onclick=viewSignup;
  $('#toForgot').onclick=e=>{e.preventDefault();viewForgot()};
  $('#loginForm').onsubmit=async e=>{
    e.preventDefault();
    const btn=$('#loginBtn');btn.disabled=true;btn.textContent='Signing in…';
    const f=new FormData(e.target);
    const{error}=await sb.auth.signInWithPassword({email:f.get('email'),password:f.get('password')});
    btn.disabled=false;btn.textContent='Sign in';
    if(error){toast(/confirm/i.test(error.message)?'Please confirm your email first.':error.message,true);return}
    await boot();
  };
}

function pwdChecklist(p){return{len:p.length>=8,up:/[A-Z]/.test(p),num:/\d/.test(p)}}

function viewSignup(){
  document.body.innerHTML=`<div id="progress"></div><div id="toast" class="toast"></div>
  <div class="auth">${brandPanel()}
  <div class="auth-form"><div class="inner">
    <div class="mobile-brand"><div class="brand-mark" style="color:var(--accent)">${APP_NAME}</div></div>
    <h2 style="margin-bottom:1.25rem">Create an account</h2>
    <form id="signupForm" class="stack" novalidate>

function pctToKnec(pct){
  const p=+pct;if(isNaN(p)||p<0||p>100)return null;
  if(p>=90)return{code:'EE',label:'Exceeding Expectation',points:8};
  if(p>=80)return{code:'ME',label:'Meeting Expectation',points:7};
  if(p>=70)return{code:'ME',label:'Meeting Expectation',points:6};
  if(p>=60)return{code:'AE',label:'Approaching Expectation',points:5};
  if(p>=50)return{code:'AE',label:'Approaching Expectation',points:4};
  if(p>=40)return{code:'BE',label:'Below Expectation',points:3};
  if(p>=30)return{code:'BE',label:'Below Expectation',points:2};
  return{code:'BE',label:'Below Expectation',points:1};
}
function isJS(grade){return['Grade 7','Grade 8','Grade 9'].includes(grade)}

function exportStudentsExcel(students){
  if(!students.length){toast('No students to export.',true);return}
  const rows=[['Name','Admission No.','Grade','Stream','Gender','Date of Birth']];
  students.forEach(s=>rows.push([s.full_name||'',s.admission_number||'',s.grade||'',s.stream||'',s.gender||'',s.date_of_birth||'']));
  const ws=XLSX.utils.aoa_to_sheet(rows);
  ws['!cols']=[{wch:28},{wch:16},{wch:12},{wch:10},{wch:8},{wch:14}];
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,'Students');
  XLSX.writeFile(wb,`students-${state.school?.name||'school'}-${new Date().toISOString().slice(0,10)}.xlsx`);
  toast('Excel file downloaded.');
}

          <td><input class="rmk" value="${esc(map[s.id]?.remarks||'')}"></td>
        </tr>`}).join('')}</tbody></table>
        <div class="small muted" style="margin-top:.5rem">Default is ME — change only exceptions.</div>

      }).filter(r=>r.score!==null);
      await sb.from('assessments').delete().eq('strand_id',strand_id).eq('term',term).eq('year',year).in('student_id',rows.map(r=>r.student_id));
      const{error}=await sb.from('assessments').insert(rows);
      if(error)toast(error.message,true);else toast('Scores saved');
    };
  };
};

/* ── BULK PRINT REPORTS ─────────────────────────────────────── */
async function bulkPrintReports(grade,stream,term,year){
  if(!grade){toast('Select a grade first.',true);return}
  const sid=state.profile.school_id;
  const m=$('#main');
  m.innerHTML=`<div class="muted">Building report cards…</div>`;
  let q=sb.from('students').select('id,full_name,admission_number,gender,grade,stream').eq('school_id',sid).eq('grade',grade).order('full_name');
  if(stream) q=q.eq('stream',stream);
  const{data:students=[]}=await q;
  if(!students.length){toast('No students in that class.',true);navigate('grading');return}

  const ids=students.map(s=>s.id);
  const{data:allAssess=[]}=await sb.from('assessments').select('student_id,score,remarks, cbc_strands(subject,strand,sub_strand)').in('student_id',ids).eq('term',term).eq('year',year);
  const{data:allAtt=[]}=await sb.from('student_attendance').select('student_id,status').in('student_id',ids);
  const assessMap={};const attMap={};
  allAssess.forEach(a=>{if(!assessMap[a.student_id])assessMap[a.student_id]=[];assessMap[a.student_id].push(a)});
  allAtt.forEach(a=>{if(!attMap[a.student_id])attMap[a.student_id]=[];attMap[a.student_id].push(a)});
  const js=isJS(grade);
  const accent=localStorage.getItem('radari_accent')||'#1f4434';

  const cards=students.map(s=>{
    const assess=assessMap[s.id]||[];
    const att=attMap[s.id]||[];
    const attPct=att.length?Math.round(att.filter(x=>x.status==='present').length/att.length*100):null;
    return `<div class="print-report card">
      <div class="rpt-header" style="display:flex;justify-content:space-between;align-items:flex-end;border-bottom:3px solid ${accent};padding-bottom:.75rem;margin-bottom:1rem">
        <div>
          <div class="rpt-school" style="font-family:'Fraunces',serif;font-size:1.4rem;color:${accent};font-weight:500">${esc(state.school?.name||APP_NAME)}</div>
          <div class="muted small">${esc(state.school?.county||'')}${state.school?.sub_county?' — '+esc(state.school.sub_county):''}${state.school?.knec_code?' · KNEC: '+esc(state.school.knec_code):''}</div>
        </div>
        <div class="small muted" style="text-align:right">Term ${term} · ${year}<br>CBC Progress Report</div>
      </div>
      <h2 style="margin-bottom:.1rem">${esc(s.full_name)}</h2>
      <div class="muted small">${esc(s.grade||'')} ${esc(s.stream||'')} · Adm. ${esc(s.admission_number||'')} · ${esc(s.gender||'')}</div>
      <div style="margin-top:1rem">
        ${assess.length?`<table><thead><tr><th>Subject</th><th>Strand</th><th>Score</th>${js?'<th>Points</th>':''}<th>Remarks</th></tr></thead>
        <tbody>${assess.map(x=>{const k=js&&!isNaN(+x.score)?pctToKnec(+x.score):null;return`<tr>
          <td>${esc(x.cbc_strands?.subject||'')}</td>
          <td>${esc(x.cbc_strands?.strand||'')}${x.cbc_strands?.sub_strand?' / '+esc(x.cbc_strands.sub_strand):''}</td>
          <td><span class="badge ${x.score==='BE'||k?.code==='BE'?'terra':x.score==='AE'||k?.code==='AE'?'amber':''}">${js&&k?x.score+'%':esc(x.score)}</span></td>
          ${js?`<td><b>${k?.points??'—'}</b> — ${k?.label??''}</td>`:''}
          <td class="small muted">${esc(x.remarks||'')}</td>
        </tr>`}).join('')}</tbody></table>`:'<div class="muted small">No assessments recorded for this term.</div>'}
      </div>
      <div style="margin-top:.75rem;display:flex;gap:2rem">
        <div><span class="small muted">Attendance rate:</span> <b>${attPct===null?'—':attPct+'%'}</b>${attPct!==null&&attPct<75?' <span class="badge terra">Below 75%</span>':''}</div>
      </div>
      <div class="small muted" style="margin-top:.75rem;border-top:1px solid var(--stone);padding-top:.5rem">
        ${js?'EE ≥90% · ME 70–89% · AE 50–69% · BE <50% · Points 1–8':'EE Exceeding · ME Meeting · AE Approaching · BE Below Expectations'}
      </div>
      <div style="margin-top:1rem;display:grid;grid-template-columns:1fr 1fr;gap:1.5rem;border-top:1px solid var(--stone);padding-top:.75rem">
        <div><div class="small muted">Class teacher signature</div><div style="border-bottom:1px solid var(--stone-2);margin-top:1.5rem"></div></div>
        <div><div class="small muted">Headteacher signature</div><div style="border-bottom:1px solid var(--stone-2);margin-top:1.5rem"></div></div>
      </div>
    </div>`;
  }).join('');

  m.innerHTML=`<div id="printControls" data-noprint style="display:flex;gap:.5rem;margin-bottom:1.5rem;align-items:center">
    <button class="btn primary" onclick="window.print()"><i class="ti ti-printer"></i> Print all ${students.length} report cards</button>
    <button class="btn secondary" onclick="navigate('grading')">← Back</button>
    <span class="muted small" style="margin-left:.5rem">Each card will print on its own page.</span>
  </div>
  <div id="reportPages">${cards}</div>`;
}

      sb.from('students').select('*').eq('id',sidu).single(),

      subjectMap[subj].push(sc)});
    const rLabels=Object.keys(subjectMap);
    const rData=rLabels.map(k=>{const arr=subjectMap[k];return arr.length?Math.round(arr.reduce((a,b)=>a+b,0)/arr.length*10)/10:0});

modules.timetable=async m=>{
  const sid=state.profile.school_id;
  const{data:rows=[]}=await sb.from('timetables').select('*, teachers(full_name)').eq('school_id',sid);
  const canEdit=['admin','headteacher'].includes(state.profile.role);

  // Build time slot list from data
  const times=[...new Set(rows.map(r=>r.start_time).filter(Boolean))].sort();

  m.innerHTML=`<div class="section-title"><h1 style="margin:0">Timetable</h1>
    <div style="display:flex;gap:.5rem">
      ${canEdit?'<button class="btn primary" id="add">Add slot</button>':''}
      <button class="btn secondary" id="toggleView" data-view="grid"><i class="ti ti-layout-grid"></i> Grid view</button>
    </div>
  </div>
  <div id="tt_list"><div class="card">${rows.length?`
    <table><thead><tr><th>Day</th><th>Time</th><th>Grade</th><th>Stream</th><th>Subject</th><th>Teacher</th></tr></thead>
    <tbody>${rows.sort((a,b)=>DAYS.indexOf(a.day_of_week)-DAYS.indexOf(b.day_of_week)||(a.start_time||'').localeCompare(b.start_time||'')).map(r=>`
      <tr><td>${esc(r.day_of_week)}</td><td>${esc(r.start_time||'')} – ${esc(r.end_time||'')}</td><td>${esc(r.grade)}</td><td>${esc(r.stream||'')}</td><td>${esc(r.subject)}</td><td>${esc(r.teachers?.full_name||'')}</td></tr>`).join('')}</tbody></table>`
    :`<div class="empty"><i class="ti ti-calendar-time"></i><div>No timetable entries yet.</div></div>`}</div></div>
  <div id="tt_grid" class="hide"></div>`;

  $('#toggleView').onclick=()=>{
    const v=$('#toggleView').dataset.view;
    if(v==='grid'){
      $('#tt_list').classList.add('hide');$('#tt_grid').classList.remove('hide');
      $('#toggleView').dataset.view='list';$('#toggleView').innerHTML='<i class="ti ti-list"></i> List view';
      renderTTGrid(rows);
    } else {
      $('#tt_list').classList.remove('hide');$('#tt_grid').classList.add('hide');
      $('#toggleView').dataset.view='grid';$('#toggleView').innerHTML='<i class="ti ti-layout-grid"></i> Grid view';
    }
  };

  if(canEdit&&$('#add'))$('#add').onclick=async()=>{
    const{data:teachers=[]}=await sb.from('teachers').select('id,full_name').eq('school_id',sid);
    m.innerHTML=`<div class="card" style="max-width:560px"><h2>Add timetable slot</h2>
      <form id="f" class="stack">
        <div class="row">
          <div class="col field"><label>Day</label><select name="day_of_week">${DAYS.map(d=>`<option>${d}</option>`).join('')}</select></div>
          <div class="col field"><label>Start</label><input name="start_time" type="time" required></div>
          <div class="col field"><label>End</label><input name="end_time" type="time" required></div>
        </div>
        <div class="row">
          <div class="col field"><label>Grade</label><select name="grade">${GRADES.map(g=>`<option>${g}</option>`).join('')}</select></div>
          <div class="col field"><label>Stream</label><input name="stream"></div>
          <div class="col field"><label>Subject</label><input name="subject" required></div>
        </div>
        <div class="field"><label>Teacher</label><select name="teacher_id"><option value="">— unassigned —</option>${teachers.map(t=>`<option value="${t.id}">${esc(t.full_name)}</option>`).join('')}</select></div>
        <div><button class="btn primary">Save</button> <button type="button" class="btn secondary" id="c">Cancel</button></div>
      </form></div>`;
    $('#c').onclick=()=>navigate('timetable');
    $('#f').onsubmit=async e=>{
      e.preventDefault();
      const f=Object.fromEntries(new FormData(e.target));
      if(!f.teacher_id)delete f.teacher_id;
      if(f.teacher_id){
        const{data:clash=[]}=await sb.from('timetables').select('start_time,end_time').eq('teacher_id',f.teacher_id).eq('day_of_week',f.day_of_week);
        const conflict=clash.some(x=>!(f.end_time<=x.start_time||f.start_time>=x.end_time));
        if(conflict){toast('Clash: teacher already has a class at that time.',true);return}
      }
      f.school_id=sid;
      const{error}=await sb.from('timetables').insert(f);
      if(error)toast(error.message,true);else{toast('Saved');navigate('timetable')};
    };
  };
};

function renderTTGrid(rows){
  const g=$('#tt_grid');
  const times=[...new Set(rows.map(r=>r.start_time).filter(Boolean))].sort();
  if(!times.length){g.innerHTML='<div class="card empty"><i class="ti ti-calendar"></i><div>No timetable data to display.</div></div>';return}

  // Build lookup: day -> time -> slots[]
  const lookup={};
  rows.forEach(r=>{
    if(!lookup[r.day_of_week])lookup[r.day_of_week]={};
    if(!lookup[r.day_of_week][r.start_time])lookup[r.day_of_week][r.start_time]=[];
    lookup[r.day_of_week][r.start_time].push(r);
  });

  const accent=localStorage.getItem('radari_accent')||'#1f4434';
  let html=`<div class="card" style="overflow-x:auto">
    <div class="tt-grid" style="grid-template-columns:70px repeat(5,1fr);min-width:600px">
      <div></div>${DAYS.map(d=>`<div class="th">${d}</div>`).join('')}
      ${times.map(t=>`
        <div class="tt-time">${t}</div>
        ${DAYS.map(d=>{
          const slots=(lookup[d]||{})[t]||[];
          if(!slots.length)return`<div class="tt-empty"></div>`;
          return slots.map(s=>`<div class="tt-slot" style="border-left:3px solid ${accent}">
            <div class="subject">${esc(s.subject)}</div>
            <div class="grade">${esc(s.grade||'')} ${esc(s.stream||'')}${s.teachers?.full_name?' · '+esc(s.teachers.full_name):''}</div>
          </div>`).join('');
        }).join('')}`).join('')}
    </div></div>`;
  g.innerHTML=html;
}

/* ── ASSIGNMENTS ────────────────────────────────────────────── */
modules.assignments=async m=>{
  const{data:rows=[]}=await sb.from('assignments').select('*').order('due_date',{ascending:false});
  m.innerHTML=`<div class="section-title"><h1 style="margin:0">Assignments</h1>
    ${['admin','headteacher','teacher'].includes(state.profile.role)?`<button class="btn primary" id="add">New assignment</button>`:''}</div>
  <div class="card">${rows.length?`
    <table><thead><tr><th>Title</th><th>Grade</th><th>Stream</th><th>Due</th></tr></thead>
    <tbody>${rows.map(r=>`<tr><td>${esc(r.title)}<div class="small muted">${esc((r.description||'').slice(0,80))}</div></td><td>${esc(r.grade||'')}</td><td>${esc(r.stream||'')}</td><td>${esc(r.due_date||'')}</td></tr>`).join('')}</tbody></table>`
    :`<div class="empty"><i class="ti ti-notebook"></i><div>No assignments posted.</div></div>`}</div>`;
  if($('#add'))$('#add').onclick=()=>{
    m.innerHTML=`<div class="card" style="max-width:560px"><h2>New assignment</h2>
      <form id="f" class="stack">
        <div class="field"><label>Title</label><input name="title" required></div>
        <div class="field"><label>Description</label><textarea name="description"></textarea></div>
        <div class="row">
          <div class="col field"><label>Grade</label><select name="grade">${GRADES.map(g=>`<option>${g}</option>`).join('')}</select></div>
          <div class="col field"><label>Stream</label><input name="stream"></div>
          <div class="col field"><label>Due date</label><input name="due_date" type="date"></div>
        </div>
        <div><button class="btn primary">Post</button> <button type="button" class="btn secondary" id="c">Cancel</button></div>
      </form></div>`;
    $('#c').onclick=()=>navigate('assignments');
    $('#f').onsubmit=async e=>{
      e.preventDefault();
      const f=Object.fromEntries(new FormData(e.target));
      const{data:tch}=await sb.from('teachers').select('id').eq('user_id',state.profile.id).maybeSingle();
      if(!tch){toast('Your teacher record is not linked yet.',true);return}
      f.teacher_id=tch.id;if(!f.due_date)delete f.due_date;
      const{error}=await sb.from('assignments').insert(f);
      if(error)toast(error.message,true);else{toast('Posted');navigate('assignments')};
    };
  };
};

/* ── TEACHERS ───────────────────────────────────────────────── */

      </form></div>`;
    $('#c').onclick=()=>navigate('teachers');

  const canApprove=['admin','headteacher'].includes(state.profile.role);

    <table><thead><tr><th>Teacher</th><th>From</th><th>To</th><th>Reason</th><th>Status</th>${canApprove?'<th></th>':''}</tr></thead>

      const f=Object.fromEntries(new FormData(e.target));

      if(error)toast(error.message,true);else{toast('Submitted');navigate('leave')};
    };
  };

/* ── FEES (with filters + fee statement download) ───────────── */
modules.fees=async m=>{
  const sid=state.profile.school_id;
  const role=state.profile.role;

  if(role==='parent'){
    const{data:kids=[]}=await sb.from('students').select('id,full_name,grade').eq('parent_id',state.profile.id);
    const ids=kids.map(k=>k.id);
    const{data:bals=[]}=ids.length?await sb.from('fee_balances').select('*').in('student_id',ids):{data:[]};
    m.innerHTML=`<h1>School fees</h1>
    ${kids.length?kids.map(k=>{
      const b=bals.filter(x=>x.student_id===k.id);
      return`<div class="card"><h3>${esc(k.full_name)} <span class="small muted">${esc(k.grade||'')}</span></h3>
        ${b.length?`<table><thead><tr><th>Term</th><th>Year</th><th>Due</th><th>Paid</th><th>Balance</th><th></th></tr></thead>
        <tbody>${b.map(x=>`<tr><td>${esc(x.term)}</td><td>${esc(x.year)}</td><td>${fmtKsh(x.amount_due)}</td><td>${fmtKsh(x.amount_paid)}</td><td>${+x.balance>0?`<b class="badge terra">${fmtKsh(x.balance)}</b>`:'<span class="badge">Cleared</span>'}</td>
          <td><button class="btn secondary sm" data-kid="${k.id}" data-name="${esc(k.full_name)}" data-bals='${JSON.stringify(b)}'>Download statement</button></td></tr>`).join('')}</tbody></table>`
        :'<div class="muted small">No balances yet.</div>'}
      </div>`;}).join('')
    :`<div class="card empty"><i class="ti ti-user-question"></i><div>No learners linked to your account.</div></div>`}`;
    m.querySelectorAll('[data-bals]').forEach(btn=>btn.onclick=()=>{
      const{name,bals}=btn.dataset;
      downloadFeeStatement(name,JSON.parse(bals));
    });
    return;
  }

  const[{data:structs=[]},{data:bals=[]}]=await Promise.all([
    sb.from('fee_structures').select('*').eq('school_id',sid),
    sb.from('fee_balances').select('*, students(full_name,grade,stream)').eq('school_id',sid),
  ]);

  m.innerHTML=`<h1>Fees</h1>
  <div class="metrics" style="margin-bottom:1.5rem">
    <div class="metric lg"><div class="num">${fmtKsh(bals.reduce((a,b)=>a+(+b.amount_paid||0),0))}</div><div class="lbl">Collected</div></div>
    <div class="metric"><div class="num">${fmtKsh(bals.reduce((a,b)=>a+(+b.balance||0),0))}</div><div class="lbl">Outstanding</div></div>
    <div class="metric"><div class="num">${bals.filter(b=>+b.balance>0).length}</div><div class="lbl">Defaulters</div></div>
  </div>
  <div class="card"><div class="section-title"><h3>Fee structures</h3><button class="btn secondary" id="addS">Add structure</button></div>
    ${structs.length?`<table><thead><tr><th>Grade</th><th>Term</th><th>Year</th><th>Amount</th><th>Description</th></tr></thead>
    <tbody>${structs.map(s=>`<tr><td>${esc(s.grade)}</td><td>${esc(s.term)}</td><td>${esc(s.year)}</td><td>${fmtKsh(s.amount)}</td><td>${esc(s.description||'')}</td></tr>`).join('')}</tbody></table>`
    :'<div class="muted small">No fee structures yet.</div>'}</div>
  <div class="card">
    <div class="section-title"><h3>Balances</h3>
      <div style="display:flex;gap:.5rem">
        <button class="btn secondary sm" id="exportFees"><i class="ti ti-table-export"></i> Export Excel</button>
      </div>
    </div>
    <div class="toolbar" style="margin-bottom:1rem">
      <div class="field"><label>Grade</label><select id="ffg"><option value="">All grades</option>${GRADES.map(g=>`<option>${g}</option>`).join('')}</select></div>
      <div class="field"><label>Term</label><select id="fft"><option value="">All terms</option><option>1</option><option>2</option><option>3</option></select></div>
      <div class="field"><label>Year</label><input id="ffy" placeholder="All years" type="number"></div>
      <div class="field"><label>Status</label><select id="ffs"><option value="">All</option><option value="defaulter">Defaulters</option><option value="cleared">Cleared</option></select></div>
    </div>
    <div id="feesTable"></div>
  </div>`;

  const renderFees=()=>{
    const g=$('#ffg')?.value,t=$('#fft')?.value,y=$('#ffy')?.value,st=$('#ffs')?.value;
    let filtered=bals;
    if(g) filtered=filtered.filter(b=>b.students?.grade===g);
    if(t) filtered=filtered.filter(b=>String(b.term)===t);
    if(y) filtered=filtered.filter(b=>String(b.year)===y);
    if(st==='defaulter') filtered=filtered.filter(b=>+b.balance>0);
    if(st==='cleared') filtered=filtered.filter(b=>+b.balance<=0);
    const t2=$('#feesTable');
    t2.innerHTML=filtered.length?`
      <div class="small muted" style="margin-bottom:.5rem">${filtered.length} record${filtered.length!==1?'s':''}</div>
      <table><thead><tr><th>Learner</th><th>Grade</th><th>Term</th><th>Year</th><th>Due</th><th>Paid</th><th>Balance</th><th></th></tr></thead>
      <tbody>${filtered.map(b=>`<tr>
        <td>${esc(b.students?.full_name||'')}</td><td>${esc(b.students?.grade||'')}</td>
        <td>${esc(b.term)}</td><td>${esc(b.year)}</td>
        <td>${fmtKsh(b.amount_due)}</td><td>${fmtKsh(b.amount_paid)}</td>
        <td>${+b.balance>0?`<span class="badge terra">${fmtKsh(b.balance)}</span>`:'<span class="badge">Cleared</span>'}</td>
        <td><a href="#" class="small dl-stmt" data-name="${esc(b.students?.full_name||'')}" data-bal='${JSON.stringify([b])}'>Statement</a></td>
      </tr>`).join('')}</tbody></table>`
    :'<div class="empty"><i class="ti ti-wallet"></i><div>No balances match the selected filters.</div></div>';
    t2.querySelectorAll('.dl-stmt').forEach(a=>a.onclick=e=>{e.preventDefault();downloadFeeStatement(a.dataset.name,JSON.parse(a.dataset.bal))});
  };
  renderFees();
  ['#ffg','#fft','#ffs'].forEach(id=>$(id)?.addEventListener('change',renderFees));
  $('#ffy')?.addEventListener('input',debounce(renderFees));

  $('#exportFees').onclick=()=>{
    const g=$('#ffg')?.value,t=$('#fft')?.value,y=$('#ffy')?.value,st=$('#ffs')?.value;
    let filtered=bals;
    if(g) filtered=filtered.filter(b=>b.students?.grade===g);
    if(t) filtered=filtered.filter(b=>String(b.term)===t);
    if(y) filtered=filtered.filter(b=>String(b.year)===y);
    if(st==='defaulter') filtered=filtered.filter(b=>+b.balance>0);
    if(st==='cleared') filtered=filtered.filter(b=>+b.balance<=0);
    if(!filtered.length){toast('No data to export.',true);return}
    const rows=[['Name','Grade','Stream','Term','Year','Amount Due (KSh)','Amount Paid (KSh)','Balance (KSh)','Status']];
    filtered.forEach(b=>rows.push([b.students?.full_name||'',b.students?.grade||'',b.students?.stream||'',b.term,b.year,b.amount_due,b.amount_paid,b.balance,+b.balance>0?'Defaulter':'Cleared']));
    const ws=XLSX.utils.aoa_to_sheet(rows);
    ws['!cols']=[{wch:28},{wch:12},{wch:10},{wch:6},{wch:6},{wch:16},{wch:16},{wch:14},{wch:10}];
    const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,'Fee Balances');
    XLSX.writeFile(wb,`fee-balances-${new Date().toISOString().slice(0,10)}.xlsx`);
    toast('Excel downloaded.');
  };

  $('#addS').onclick=()=>{
    m.innerHTML=`<div class="card" style="max-width:520px"><h2>Add fee structure</h2>
      <form id="f" class="stack">
        <div class="row">
          <div class="col field"><label>Grade</label><select name="grade">${GRADES.map(g=>`<option>${g}</option>`).join('')}</select></div>
          <div class="col field"><label>Term</label><select name="term"><option>1</option><option>2</option><option>3</option></select></div>
          <div class="col field"><label>Year</label><input type="number" name="year" value="${new Date().getFullYear()}"></div>
        </div>
        <div class="field"><label>Amount (KSh)</label><input type="number" name="amount" required></div>
        <div class="field"><label>Description</label><input name="description"></div>
        <div><button class="btn primary">Save</button> <button type="button" class="btn secondary" id="c">Cancel</button></div>
      </form></div>`;
    $('#c').onclick=()=>navigate('fees');
    $('#f').onsubmit=async e=>{
      e.preventDefault();
      const f=Object.fromEntries(new FormData(e.target));
      f.school_id=sid;f.term=+f.term;f.year=+f.year;f.amount=+f.amount;
      const{error}=await sb.from('fee_structures').insert(f);
      if(error)toast(error.message,true);else{toast('Saved');navigate('fees')};
    };
  };
};

function downloadFeeStatement(studentName,balances){
  const school=state.school?.name||APP_NAME;
  const date=new Date().toLocaleDateString('en-KE',{day:'numeric',month:'long',year:'numeric'});
  const rows=[
    [school],
    ['Fee Statement'],
    ['Learner:',studentName],
    ['Date:',date],
    [''],
    ['Term','Year','Amount Due (KSh)','Amount Paid (KSh)','Balance (KSh)','Status'],
    ...balances.map(b=>[b.term,b.year,b.amount_due,b.amount_paid,b.balance,+b.balance>0?'Outstanding':'Cleared']),
    [''],
    ['Total Due','',(balances.reduce((a,b)=>a+(+b.amount_due||0),0))],
    ['Total Paid','',(balances.reduce((a,b)=>a+(+b.amount_paid||0),0))],
    ['Total Balance','',(balances.reduce((a,b)=>a+(+b.balance||0),0))],
  ];
  const ws=XLSX.utils.aoa_to_sheet(rows);
  ws['!cols']=[{wch:16},{wch:8},{wch:18},{wch:18},{wch:14},{wch:12}];
  const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,'Fee Statement');
  XLSX.writeFile(wb,`fee-statement-${(studentName||'student').replace(/\s+/g,'-')}-${new Date().toISOString().slice(0,10)}.xlsx`);
  toast('Fee statement downloaded.');
}

/* ── KNEC SBA EXPORT ────────────────────────────────────────── */
modules.knec=async m=>{
  const sid=state.profile.school_id;
  m.innerHTML=`<h1>KNEC SBA export</h1>
  <div class="card" style="max-width:640px">
    <p class="muted">Export learner CBC scores in the format expected by the KNEC SBA portal.</p>
    <div class="toolbar">
      <div class="field"><label>Grade</label><select id="g">${GRADES.map(g=>`<option>${g}</option>`).join('')}</select></div>
      <div class="field"><label>Term</label><select id="t"><option>1</option><option>2</option><option>3</option></select></div>
      <div class="field"><label>Year</label><input id="y" type="number" value="${new Date().getFullYear()}"></div>
      <button class="btn primary" id="dl">Download CSV</button>
    </div>
  </div>`;
  $('#dl').onclick=async()=>{
    const grade=$('#g').value,term=+$('#t').value,year=+$('#y').value;
    const{data:students=[]}=await sb.from('students').select('id,full_name,admission_number,gender,grade').eq('school_id',sid).eq('grade',grade);
    const ids=students.map(s=>s.id);if(!ids.length){toast('No learners in that grade.',true);return}
    const{data:a=[]}=await sb.from('assessments').select('student_id,score, cbc_strands(subject,strand,sub_strand)').in('student_id',ids).eq('term',term).eq('year',year);
    const rows=[['KNEC_Code','Admission_No','Learner_Name','Gender','Grade','Subject','Strand','Sub_Strand','Term','Year','Performance_Level']];
    a.forEach(x=>{const s=students.find(st=>st.id===x.student_id);
      rows.push([state.school?.knec_code||'',s.admission_number||'',s.full_name,s.gender||'',s.grade,x.cbc_strands?.subject||'',x.cbc_strands?.strand||'',x.cbc_strands?.sub_strand||'',term,year,x.score]);
    });
    const csv=rows.map(r=>r.map(v=>`"${String(v??'').replace(/"/g,'""')}"`).join(',')).join('\n');
    const blob=new Blob([csv],{type:'text/csv'});
    const a2=document.createElement('a');a2.href=URL.createObjectURL(blob);a2.download=`knec-sba-${grade}-T${term}-${year}.csv`;a2.click();
  };
};

/* ============================================================
   BOOT
   ============================================================ */
async function loadProfile(){
  const{data:{user}}=await sb.auth.getUser();if(!user)return null;
  let{data:profile}=await sb.from('users').select('*').eq('id',user.id).maybeSingle();
  if(!profile){
    const md=user.user_metadata||{};let school_id=null;
    if(md.school_code){const{data:s}=await sb.from('schools').select('id').eq('school_code',md.school_code).maybeSingle();school_id=s?.id||null}
    await sb.from('users').insert({id:user.id,email:user.email,full_name:md.full_name,phone:md.phone,school_id,role:md.role||'parent'});
    ({data:profile}=await sb.from('users').select('*').eq('id',user.id).maybeSingle());
  }
  return profile;
}

async function boot(){
  if(location.hash.includes('type=recovery')||location.hash==='#reset'){viewSetPassword();return}
  const{data:{session}}=await sb.auth.getSession();
  if(!session){viewLogin();return}
  state.session=session;
  state.profile=await loadProfile();
  if(state.profile?.school_id){
    const{data:school}=await sb.from('schools').select('*').eq('id',state.profile.school_id).maybeSingle();
    state.school=school;
  }
  const h=location.hash.replace('#','');
  if(h&&findNavItem(h))state.route=h;
  viewShell();
}

window.addEventListener('hashchange',()=>{
  const h=location.hash.replace('#','');
  if(h&&findNavItem(h)&&state.profile){state.route=h;render()}
});

sb.auth.onAuthStateChange(event=>{
  if(event==='SIGNED_OUT')viewLogin();
  if(event==='PASSWORD_RECOVERY')viewSetPassword();
});

/* ============================================================
   OFFLINE QUEUE
   ============================================================ */
const OFFLINE_KEY='radari_offline_queue';
function offlineEnqueue(rows){
  const q=JSON.parse(localStorage.getItem(OFFLINE_KEY)||'[]');
  q.push(...rows);localStorage.setItem(OFFLINE_KEY,JSON.stringify(q));
  toast('No connection. Scores saved locally and will sync when online.');
}
async function syncOfflineQueue(){
  const q=JSON.parse(localStorage.getItem(OFFLINE_KEY)||'[]');
  if(!q.length||!navigator.onLine)return;
  const{error}=await sb.from('assessments').upsert(q,{onConflict:'student_id,strand_id,term,year'});
  if(!error){localStorage.removeItem(OFFLINE_KEY);toast(`Synced ${q.length} offline score(s).`)}
}
window.addEventListener('online',syncOfflineQueue);
